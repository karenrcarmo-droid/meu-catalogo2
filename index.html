<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kn2 Catálogo | Oficial</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --bg: #0b0f17; --card: #111827; --text: #e5e7eb;
      --muted: #9ca3af; --border: rgba(255,255,255,.08);
      --accent: #22c55e; --danger: #ef4444;
    }
    * { margin:0; padding:0; box-sizing:border-box; font-family:system-ui; }
    body { background:var(--bg); color:var(--text); min-height: 100vh; display: flex; flex-direction: column; }
    .container { width:min(1200px,92vw); margin:auto; flex: 1; }

    /* HEADER */
    .topbar { position:sticky; top:0; z-index:1000; backdrop-filter:blur(10px); background:rgba(11,15,23,.9); border-bottom:1px solid var(--border); padding:16px 0; }
    .topbar__inner { display:flex; align-items:center; justify-content:space-between; }
    .logo-area img { max-width:180px; border-radius:10px; display:none; }
    .logo-text { font-size:24px; font-weight:900; color:var(--accent); }

    /* BOTÕES */
    .btn { border:none; cursor:pointer; border-radius:12px; padding:10px 16px; color:white; font-weight:700; transition:.2s; display:inline-flex; align-items:center; gap:8px; }
    .btn-primary { background:var(--accent); }
    .btn-dark { background:#1f2937; }

    /* GRID & CARDS */
    .categoryBlock { margin-bottom:40px; }
    .categoryHeading { margin-bottom:18px; border-bottom:1px solid var(--border); padding-bottom:10px; font-size:22px; }
    .productsGrid { display:grid; grid-template-columns:repeat(auto-fill,minmax(240px,1fr)); gap:16px; }
    .card { background:var(--card); border-radius:18px; overflow:hidden; border:1px solid var(--border); display:flex; flex-direction:column; }
    .productImage { width:100%; height:240px; object-fit:cover; }
    .card__body { padding:16px; flex:1; }

    /* FOOTER (Restaurado) */
    .siteFooter { margin-top:48px; padding:24px 16px; border-top:1px solid var(--border); background:#0b0f17; }
    .siteFooter__inner { max-width:1200px; margin:0 auto; display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; color:var(--muted); font-size:14px; }
    
    /* MODAIS */
    .modal { position:fixed; inset:0; background:rgba(0,0,0,.85); display:none; justify-content:center; align-items:center; z-index:9999; backdrop-filter:blur(5px); }
    .modal.active { display:flex; }
    .modal__content { width:min(600px,92vw); background:#111827; border-radius:20px; padding:24px; border:1px solid var(--border); }
    input, select { width:100%; padding:12px; border-radius:10px; border:1px solid var(--border); background:#0f172a; color:white; margin-top:8px; }
  </style>
</head>
<body>

  <header class="topbar">
    <div class="container topbar__inner">
      <div class="logo-area" id="logoContainer">
        <span class="logo-text">Kn2 Catálogo</span>
        <img src="" id="siteLogo">
      </div>
      <div style="display:flex; gap:10px">
        <button class="btn btn-dark" id="adminControlBtn">Painel Admin</button>
        <button class="btn btn-dark" id="logoutBtn" style="display:none" onclick="handleLogout()">Sair</button>
      </div>
    </div>
  </header>

  <main class="container">
    <div id="menuRow" style="display:flex; gap:10px; overflow-x:auto; padding:20px 0"></div>
    <input type="text" id="searchInput" placeholder="Pesquisar produto..." oninput="handleSearch(this.value)" style="margin-bottom:20px; width:100%; padding:15px; border-radius:10px; background:#111827; border:1px solid var(--border); color:white">
    <div id="catalogContainer"></div>
  </main>

  <div class="modal" id="loginModal">
    <div class="modal__content">
      <h2>Acesso Restrito</h2>
      <input type="email" id="email" placeholder="E-mail">
      <input type="password" id="password" placeholder="Senha">
      <button class="btn btn-primary" style="width:100%; margin-top:20px; justify-content:center" onclick="handleLogin()">Entrar</button>
      <button class="btn btn-dark" style="width:100%; margin-top:10px; justify-content:center" onclick="closeModal('loginModal')">Cancelar</button>
    </div>
  </div>

  <div class="modal" id="adminModal">
    <div class="modal__content">
      <h2>Gestão do Catálogo</h2>
      <div style="margin:20px 0; padding:15px; background:rgba(255,255,255,0.02); border-radius:10px">
        <label>Trocar Logo do Site</label>
        <input type="file" id="logoInput" accept="image/*">
        <button class="btn btn-primary" style="margin-top:10px; width:100%; justify-content:center" onclick="uploadLogo()">Salvar Logo</button>
      </div>
      <button class="btn btn-dark" style="width:100%" onclick="closeModal('adminModal')">Fechar</button>
    </div>
  </div>

  <footer class="siteFooter">
    <div class="siteFooter__inner">
      <p>&copy; <span id="footerYear"></span> Kn2 Personalizados</p>
      <a href="https://instagram.com/arteskn2" target="_blank" style="color:var(--accent); text-decoration:none">@arteskn2</a>
    </div>
  </footer>

  <script>
    const SUPABASE_URL = "https://kdoxzjdvpbdwpzyaqary.supabase.co";
    const SUPABASE_KEY = "sb_publishable_4WrcBi_Cy8yRg8v0D3_BQw_1XuBID4V";
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let products = [], activeCat = "Todos", searchQuery = "";

    async function init() {
      document.getElementById('footerYear').textContent = new Date().getFullYear();
      await loadLogo();
      await fetchProducts();
      checkUserStatus();
    }

    // CARREGAR LOGO DINÂMICA
    async function loadLogo() {
      const { data } = await _supabase.from('configuracoes_site').select('logo_url').eq('id', 'config_geral').single();
      if (data && data.logo_url) {
        const img = document.getElementById('siteLogo');
        img.src = data.logo_url;
        img.style.display = 'block';
        document.querySelector('.logo-text').style.display = 'none';
      }
    }

    // BLOQUEIO DE SEGURANÇA NO ADMIN
    document.getElementById('adminControlBtn').onclick = async () => {
      const { data: { user } } = await _supabase.auth.getUser();
      if (user) {
        document.getElementById('adminModal').classList.add('active');
      } else {
        document.getElementById('loginModal').classList.add('active');
      }
    };

    async function handleLogin() {
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const { error } = await _supabase.auth.signInWithPassword({ email, password });
      if (error) alert("Erro: " + error.message); else location.reload();
    }

    async function checkUserStatus() {
      const { data: { user } } = await _supabase.auth.getUser();
      if (user) document.getElementById('logoutBtn').style.display = 'block';
    }

    async function handleLogout() { await _supabase.auth.signOut(); location.reload(); }

    async function fetchProducts() {
      const { data } = await _supabase.from('produtos').select('*').order('category');
      products = data || [];
      renderGrid();
    }

    function renderGrid() {
      const container = document.getElementById('catalogContainer');
      container.innerHTML = "";
      const filtered = products.filter(p => (activeCat === "Todos" || p.category === activeCat) && p.title.toLowerCase().includes(searchQuery.toLowerCase()));
      
      const grouped = filtered.reduce((acc, p) => { (acc[p.category] = acc[p.category] || []).push(p); return acc; }, {});

      for (const cat in grouped) {
        container.innerHTML += `<div class="categoryBlock">
          <h2 class="categoryHeading">${cat}</h2>
          <div class="productsGrid">${grouped[cat].map(p => `
            <div class="card">
              <img src="${p.image_url}" class="productImage">
              <div class="card__body">
                <strong>${p.title}</strong><br>
                <span style="color:var(--accent); font-weight:900">R$ ${(Number(p.price) || 0).toFixed(2)}</span>
              </div>
            </div>`).join('')}
          </div>
        </div>`;
      }
    }

    window.closeModal = (id) => document.getElementById(id).classList.remove('active');
    window.handleSearch = (v) => { searchQuery = v; renderGrid(); };

    init();
  </script>
</body>
</html>
