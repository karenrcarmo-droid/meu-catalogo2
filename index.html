<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kn2 Personalizados</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg: #0b0f17; --accent: #22c55e; --card: #111827; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; margin: 0; }
        .topbar { background: #111827; padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; position: sticky; top:0; z-index:99; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; padding: 20px; }
        .card { background: var(--card); border-radius: 15px; border: 1px solid #333; overflow: hidden; }
        .img { width: 100%; height: 250px; object-fit: cover; }
        .btn { background: var(--accent); color: #000; border: none; padding: 12px; width: 100%; border-radius: 10px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <header class="topbar">
        <b style="font-size: 20px;">Kn2 <span style="color:var(--accent)">Artes</span></b>
        <button class="btn" style="width: auto;" onclick="location.reload()">🔄 Atualizar</button>
    </header>

    <div id="catalog" class="grid">Carregando catálogo...</div>

    <script>
        // Use as suas credenciais reais aqui
        const SUPABASE_URL = "https://kdoxzjdvpbdwpzyaqary.supabase.co";
    const SUPABASE_KEY = "sb_publishable_4WrcBi_Cy8yRg8v0D3_BQw_1XuBID4V"; 
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        let prods = [];

        async function carregar() {
            try {
                const { data } = await _supabase.from('produtos').select('*').order('created_at', { ascending: false });
                prods = data || [];
                render();
                
                // Tenta atualizar visitas, mas se der erro, NÃO TRAVA o site
                _supabase.from('estatisticas').select('visitas').eq('id', 1).single().then(({data}) => {
                    if(data) _supabase.from('estatisticas').update({visitas: data.visitas + 1}).eq('id', 1);
                }).catch(() => {});

            } catch (e) {
                document.getElementById('catalog').innerHTML = "Erro ao carregar banco.";
            }
        }

        function render() {
            const container = document.getElementById('catalog');
            container.innerHTML = prods.map(p => `
                <div class="card">
                    <img src="${p.image_url}" class="img">
                    <div style="padding: 15px;">
                        <h3 style="margin:0 0 10px 0">${p.title}</h3>
                        <p style="color:var(--accent); font-size: 20px; font-weight: bold;">R$ ${p.price.toFixed(2)}</p>
                        <button class="btn" onclick="comprar('${p.title}', ${p.price})">🛒 Pedir no Zap</button>
                        <button onclick="curtir('${p.id}', ${p.likes || 0})" style="background:none; border:none; color:gray; cursor:pointer; margin-top:10px;">❤️ Curtir (${p.likes || 0})</button>
                    </div>
                </div>
            `).join('');
        }

        window.comprar = (nome, preco) => {
            const msg = encodeURIComponent(`Olá! Quero pedir: ${nome} (R$ ${preco.toFixed(2)})`);
            window.open(`https://wa.me/5531999683959?text=${msg}`);
        };

        window.curtir = async (id, atual) => {
            await _supabase.from('produtos').update({ likes: atual + 1 }).eq('id', id);
            carregar(); // Recarrega só para atualizar o número
        };

        carregar();
    </script>
</body>
</html>
