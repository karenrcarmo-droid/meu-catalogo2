<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kn2 Personalizados - Catálogo Profissional</title>
  <meta name="theme-color" content="#0b0f17">
  
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    :root {
      --bg: #0b0f17;
      --card: #111827;
      --text: #e5e7eb;
      --muted: #9ca3af;
      --border: rgba(255, 255, 255, .08);
      --accent: #22c55e;
      --danger: #ef4444;
    }

    * { box-sizing: border-box; outline: none; }
    body { margin: 0; background: var(--bg); color: var(--text); font-family: system-ui, -apple-system, sans-serif; line-height: 1.5; }
    .container { width: min(1100px, 92vw); margin: auto; }

    /* Header */
    .topbar { position: sticky; top: 0; z-index: 999; background: rgba(11, 15, 23, .92); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); }
    .topbar__inner { padding: 14px 0; display: flex; justify-content: space-between; align-items: center; }
    .brand { font-size: 22px; font-weight: 800; background: linear-gradient(to right, #22c55e, #4ade80); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    
    .btn { border: none; padding: 10px 18px; border-radius: 10px; cursor: pointer; font-weight: 600; transition: 0.2s; font-size: 14px; }
    .btn-primary { background: var(--accent); color: white; }
    .btn-primary:hover { opacity: 0.9; transform: scale(1.02); }
    .btn-outline { background: transparent; border: 1px solid var(--border); color: white; }
    .btn-logout { background: #374151; color: white; display: none; margin-left: 8px; }

    /* Navegação de Categorias */
    .menu { margin-top: 25px; overflow-x: auto; white-space: nowrap; padding-bottom: 5px; }
    .menu__row { display: flex; gap: 8px; }
    .menu__btn { padding: 8px 20px; border-radius: 999px; border: 1px solid var(--border); background: #111827; color: var(--muted); cursor: pointer; transition: 0.3s; }
    .menu__btn.active { background: var(--accent); color: white; border-color: var(--accent); box-shadow: 0 4px 12px rgba(34, 197, 94, 0.3); }

    /* Busca */
    .search { margin: 20px 0; }
    .search input { width: 100%; padding: 15px; border-radius: 14px; border: 1px solid var(--border); background: var(--card); color: white; font-size: 16px; }

    /* Grid de Produtos */
    .categoryBlock { margin-bottom: 50px; }
    .categoryHeading { font-size: 26px; font-weight: 700; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
    .categoryHeading::after { content: ""; flex: 1; height: 1px; background: var(--border); }
    
    .productsGrid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }

    .card { border-radius: 20px; background: var(--card); border: 1px solid var(--border); display: flex; flex-direction: column; transition: 0.3s; overflow: hidden; }
    .card:hover { border-color: var(--accent); transform: translateY(-5px); }
    .productImage { width: 100%; height: 250px; object-fit: cover; cursor: zoom-in; background: #1f2937; }

    .card__body { padding: 18px; display: flex; flex-direction: column; flex-grow: 1; }
    .card__title { margin: 0 0 8px; font-size: 18px; font-weight: 600; }
    .card__price { font-size: 20px; font-weight: 800; color: var(--accent); margin-bottom: 15px; }
    .buyBtn { width: 100%; padding: 12px; border-radius: 12px; background: var(--accent); color: white; border: none; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; }

    /* Modais */
    .modal { position: fixed; inset: 0; background: rgba(0, 0, 0, .8); display: none; justify-content: center; align-items: center; z-index: 1000; backdrop-filter: blur(6px); }
    .modal.active { display: flex; }
    .modal__content { width: min(600px, 92vw); max-height: 85vh; overflow-y: auto; background: #111827; border-radius: 24px; padding: 30px; border: 1px solid var(--border); }

    .formGroup { margin-bottom: 18px; }
    .formGroup label { display: block; margin-bottom: 8px; color: var(--muted); font-size: 14px; font-weight: 500; }
    .formGroup input { width: 100%; padding: 14px; border-radius: 12px; border: 1px solid var(--border); background: #0f172a; color: white; font-size: 15px; }

    /* Admin List */
    .admin-category-section { margin-top: 25px; border-top: 1px solid var(--border); padding-top: 20px; }
    .adminItem { display: flex; gap: 15px; align-items: center; background: #0f172a; padding: 12px; border-radius: 16px; margin-bottom: 12px; border: 1px solid transparent; }
    .adminItem img { width: 60px; height: 60px; border-radius: 10px; object-fit: cover; }
    .adminItem__info { flex: 1; }
    .dangerBtn { background: rgba(239, 68, 68, 0.1); color: var(--danger); border: 1px solid var(--danger); padding: 8px 12px; border-radius: 8px; cursor: pointer; font-size: 12px; }

    /* CORREÇÃO DO ZOOM */
    .imagePreviewModal { 
      position: fixed; 
      inset: 0; 
      background: rgba(0, 0, 0, .9); 
      display: none; 
      justify-content: center; 
      align-items: center; 
      z-index: 99999; /* Maior que todos os outros modais */
      cursor: zoom-out;
      padding: 20px;
    }
    .imagePreviewModal.active { display: flex; }
    .imagePreviewModal img { 
      max-width: 100%; 
      max-height: 100%; 
      border-radius: 8px; 
      box-shadow: 0 0 30px rgba(0,0,0,0.5);
      animation: zoomIn 0.3s ease;
    }

    @keyframes zoomIn {
      from { transform: scale(0.8); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }

    @media(max-width:600px) { .productsGrid { grid-template-columns: 1fr; } }
  </style>
</head>

<body>

  <header class="topbar">
    <div class="container topbar__inner">
      <div class="brand">Kn2 Catálogo</div>
      <div>
        <button class="btn btn-primary" id="openAdminBtn">Gerenciar</button>
        <button class="btn btn-logout" id="logoutBtn">Sair</button>
      </div>
    </div>
  </header>

  <main class="container">
    <section class="menu">
      <div class="menu__row" id="menuRow"></div>
    </section>

    <section class="search">
      <input type="text" id="searchInput" placeholder="Pesquisar em todas as categorias..." />
    </section>

    <section id="catalogContainer"></section>
    <div id="emptyState" hidden style="text-align:center; padding:60px;">
      <p style="color:var(--muted); font-size: 18px;">Nenhum item encontrado.</p>
    </div>
  </main>

  <div class="modal" id="loginModal">
    <div class="modal__content">
      <h2 style="margin:0 0 20px">Acesso Administrativo</h2>
      <div class="formGroup">
        <label>E-mail</label>
        <input type="email" id="adminEmail" placeholder="admin@exemplo.com" />
      </div>
      <div class="formGroup">
        <label>Senha</label>
        <input type="password" id="adminPassword" />
      </div>
      <button class="btn btn-primary" style="width:100%" id="loginBtn">Entrar</button>
      <button class="btn btn-outline" style="width:100%; margin-top:10px;" id="closeLoginBtn">Voltar</button>
    </div>
  </div>

  <div class="modal" id="adminModal">
    <div class="modal__content">
      <h2 style="margin:0 0 20px">Adicionar Produto</h2>
      
      <div class="formGroup">
        <label>Nome do Produto</label>
        <input type="text" id="productTitle" placeholder="Ex: Copo Térmico 500ml" />
      </div>

      <div class="formGroup">
        <label>Categoria</label>
        <input list="categoriesList" id="productCategory" placeholder="Ex: Copos, Brindes...">
        <datalist id="categoriesList"></datalist>
      </div>

      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
        <div class="formGroup">
          <label>Preço (R$)</label>
          <input type="number" id="productPrice" step="0.01" />
        </div>
        <div class="formGroup">
          <label>Foto</label>
          <input type="file" id="productImage" accept="image/*" />
        </div>
      </div>

      <button class="btn btn-primary" style="width:100%" id="saveProductBtn">Publicar no Catálogo</button>
      
      <div class="admin-category-section">
        <h3>Produtos Cadastrados</h3>
        <div id="adminList"></div>
      </div>
      
      <button class="btn btn-outline" style="width:100%; margin-top:20px;" id="closeAdminBtn">Fechar Painel</button>
    </div>
  </div>

  <div class="imagePreviewModal" id="imagePreviewModal" onclick="this.classList.remove('active')">
    <img id="previewImage" src="" alt="Zoom" />
  </div>

  <script>
    const SUPABASE_URL = "https://kdoxzjdvpbdwpzyaqary.supabase.co/";
    const SUPABASE_KEY = "sb_publishable_4WrcBi_Cy8yRg8v0D3_BQw_1XuBID4V";
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    const WHATSAPP_NUMBER = "5531999683959";

    let products = [];
    let activeCategory = "Todos";
    let searchQuery = "";

    async function init() {
      await fetchProducts();
      checkUser();
      renderMenu();
      renderGrid();
      updateCategoryDatalist();
    }

    async function fetchProducts() {
      const { data, error } = await _supabase
        .from('produtos')
        .select('*')
        .order('category', { ascending: true });
      if (!error) products = data || [];
    }

    function updateCategoryDatalist() {
      const datalist = document.getElementById("categoriesList");
      const categories = [...new Set(products.map(p => p.category))];
      datalist.innerHTML = categories.map(cat => `<option value="${cat}">`).join('');
    }

    function renderMenu() {
      const menuRow = document.getElementById("menuRow");
      menuRow.innerHTML = "";
      const categories = ["Todos", ...new Set(products.map(p => p.category))];
      
      categories.forEach(cat => {
        const btn = document.createElement("button");
        btn.className = `menu__btn ${cat === activeCategory ? 'active' : ''}`;
        btn.textContent = cat;
        btn.onclick = () => {
          activeCategory = cat;
          renderMenu();
          renderGrid();
        };
        menuRow.appendChild(btn);
      });
    }

    function renderGrid() {
      const container = document.getElementById("catalogContainer");
      container.innerHTML = "";

      const filtered = products.filter(p => {
        const matchCat = activeCategory === "Todos" || p.category === activeCategory;
        const matchSearch = p.title.toLowerCase().includes(searchQuery.toLowerCase());
        return matchCat && matchSearch;
      });

      document.getElementById("emptyState").hidden = filtered.length > 0;

      const grouped = {};
      filtered.forEach(p => {
        if(!grouped[p.category]) grouped[p.category] = [];
        grouped[p.category].push(p);
      });

      for (const cat in grouped) {
        const section = document.createElement("div");
        section.className = "categoryBlock";
        section.innerHTML = `<h2 class="categoryHeading">${cat}</h2>`;
        
        const grid = document.createElement("div");
        grid.className = "productsGrid";

        grouped[cat].forEach(p => {
          const card = document.createElement("div");
          card.className = "card";
          card.innerHTML = `
            <img class="productImage" src="${p.image_url}" onclick="showImg('${p.image_url}')" alt="${p.title}">
            <div class="card__body">
              <h3 class="card__title">${p.title}</h3>
              <div class="card__price">R$ ${p.price.toFixed(2).replace('.',',')}</div>
              <button class="buyBtn" onclick="sendWhatapp('${p.title}', ${p.price})">
                Pedir agora
              </button>
            </div>
          `;
          grid.appendChild(card);
        });
        section.appendChild(grid);
        container.appendChild(section);
      }
    }

    document.getElementById("saveProductBtn").onclick = async () => {
      const title = document.getElementById("productTitle").value;
      const category = document.getElementById("productCategory").value;
      const price = document.getElementById("productPrice").value;
      const fileInput = document.getElementById("productImage");
      const btn = document.getElementById("saveProductBtn");

      if(!title || !category || !price || !fileInput.files[0]) return alert("Preencha todos os campos!");

      btn.disabled = true;
      btn.textContent = "Salvando...";

      try {
        const file = fileInput.files[0];
        const fileName = `${Date.now()}-${file.name}`;
        const { error: uploadError } = await _supabase.storage
          .from('imagens-produtos')
          .upload(`produtos/${fileName}`, file);

        if (uploadError) throw uploadError;

        const { data: { publicUrl } } = _supabase.storage
          .from('imagens-produtos')
          .getPublicUrl(`produtos/${fileName}`);

        const { error: insertError } = await _supabase
          .from('produtos')
          .insert([{ title, category, price: parseFloat(price), image_url: publicUrl }]);

        if (insertError) throw insertError;

        alert("Produto adicionado com sucesso!");
        location.reload();
      } catch (err) {
        alert("Erro: " + err.message);
      } finally {
        btn.disabled = false;
      }
    };

    async function deleteProd(id) {
      if(!confirm("Excluir este produto?")) return;
      const { error } = await _supabase.from('produtos').delete().eq('id', id);
      if(!error) location.reload();
    }

    async function checkUser() {
      const { data: { user } } = await _supabase.auth.getUser();
      if(user) document.getElementById("logoutBtn").style.display = "block";
    }

    document.getElementById("loginBtn").onclick = async () => {
      const email = document.getElementById("adminEmail").value;
      const password = document.getElementById("adminPassword").value;
      const { error } = await _supabase.auth.signInWithPassword({ email, password });
      if (error) alert("Dados incorretos!");
      else location.reload();
    };

    document.getElementById("logoutBtn").onclick = async () => {
      await _supabase.auth.signOut();
      location.reload();
    };

    function openAdminPanel() {
      document.getElementById("adminModal").classList.add("active");
      const list = document.getElementById("adminList");
      
      const grouped = {};
      products.forEach(p => {
        if(!grouped[p.category]) grouped[p.category] = [];
        grouped[p.category].push(p);
      });

      list.innerHTML = "";
      for(const cat in grouped) {
        const groupDiv = document.createElement('div');
        groupDiv.innerHTML = `<h4 style="margin: 15px 0 10px; color:var(--accent)">${cat}</h4>`;
        grouped[cat].forEach(p => {
          const item = document.createElement('div');
          item.className = 'adminItem';
          item.innerHTML = `
            <img src="${p.image_url}">
            <div class="adminItem__info">
              <strong>${p.title}</strong><br><small>R$ ${p.price.toFixed(2)}</small>
            </div>
            <button class="dangerBtn" onclick="deleteProd('${p.id}')">Excluir</button>
          `;
          groupDiv.appendChild(item);
        });
        list.appendChild(groupDiv);
      }
    }

    function sendWhatapp(nome, preco) {
      const msg = encodeURIComponent(`Olá Kn2! Gostaria de encomendar: ${nome} (R$ ${preco.toFixed(2)})`);
      window.open(`https://wa.me/${WHATSAPP_NUMBER}?text=${msg}`);
    }

    // FUNÇÃO DE ZOOM (CORRIGIDA)
    function showImg(url) {
      const modal = document.getElementById("imagePreviewModal");
      const img = document.getElementById("previewImage");
      img.src = url;
      modal.classList.add("active");
    }

    document.getElementById("openAdminBtn").onclick = async () => {
      const { data: { user } } = await _supabase.auth.getUser();
      if(user) openAdminPanel();
      else document.getElementById("loginModal").classList.add("active");
    };

    document.getElementById("closeLoginBtn").onclick = () => document.getElementById("loginModal").classList.remove("active");
    document.getElementById("closeAdminBtn").onclick = () => document.getElementById("adminModal").classList.remove("active");
    document.getElementById("searchInput").oninput = (e) => { searchQuery = e.target.value; renderGrid(); };

    init();
  </script>
</body>
</html>
