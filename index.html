<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kn2 Personalizados | Catálogo e Pedidos</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg: #0b0f17; --card: #111827; --text: #e5e7eb;
            --muted: #9ca3af; --border: rgba(255,255,255,.08);
            --accent: #22c55e; --danger: #ef4444;
        }
        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background: var(--bg); color: var(--text); line-height: 1.6; }
        .container { width: min(1200px, 92vw); margin: auto; }

        /* HEADER */
        .header { position: sticky; top:0; z-index: 1000; background: rgba(11,15,23,0.85); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); }
        .header-inner { padding: 15px 0; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 22px; font-weight: 800; background: linear-gradient(to right, #22c55e, #10b981); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        /* BOTÕES */
        .btn { border: none; cursor: pointer; border-radius: 10px; padding: 10px 18px; color: white; font-weight: 600; transition: 0.2s; display: inline-flex; align-items: center; gap: 8px; }
        .btn:hover { transform: translateY(-2px); opacity: 0.9; }
        .btn-primary { background: var(--accent); }
        .btn-dark { background: #1f2937; }
        .btn-danger { background: var(--danger); }

        /* FILTROS E BUSCA */
        .controls { margin: 30px 0; }
        .filter-row { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 20px; }
        .filter-btn { background: var(--card); border: 1px solid var(--border); color: var(--muted); padding: 8px 18px; border-radius: 20px; cursor: pointer; }
        .filter-btn.active { background: var(--accent); color: white; border-color: var(--accent); }
        .search-input { width: 100%; padding: 15px; border-radius: 12px; border: 1px solid var(--border); background: var(--card); color: white; outline: none; }

        /* GRID */
        .category-title { font-size: 20px; margin: 40px 0 20px; display: flex; align-items: center; gap: 15px; }
        .category-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 20px; }
        .card { background: var(--card); border-radius: 16px; border: 1px solid var(--border); overflow: hidden; transition: 0.3s; display: flex; flex-direction: column; }
        .card-img { width: 100%; height: 260px; object-fit: cover; cursor: zoom-in; }
        .card-body { padding: 18px; flex: 1; display: flex; flex-direction: column; }
        .card-price { color: var(--accent); font-size: 20px; font-weight: 800; margin: 10px 0 15px; }

        /* CARRINHO SIDEBAR */
        .cart-sidebar { position: fixed; top: 0; right: -400px; width: 400px; max-width: 100%; height: 100vh; background: var(--card); z-index: 1001; transition: 0.4s; border-left: 1px solid var(--border); display: flex; flex-direction: column; }
        .cart-sidebar.active { right: 0; }
        .cart-header { padding: 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; }
        .cart-body { flex: 1; overflow-y: auto; padding: 20px; }
        .cart-footer { padding: 20px; background: #0b0f17; border-top: 1px solid var(--border); }
        .cart-item { display: flex; gap: 12px; margin-bottom: 15px; background: rgba(255,255,255,0.03); padding: 10px; border-radius: 10px; }
        .cart-item img { width: 60px; height: 60px; border-radius: 8px; object-fit: cover; }

        /* ZOOM MODAL */
        .zoom-modal { position: fixed; inset:0; background:rgba(0,0,0,0.9); display:none; align-items:center; justify-content:center; z-index:5000; cursor: zoom-out; }
        .zoom-modal.active { display:flex; }
        .zoom-img { max-width: 90%; max-height: 90%; border-radius: 10px; }

        /* MODAIS ADMIN */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: none; align-items: center; justify-content: center; z-index: 2000; padding: 20px; }
        .modal.active { display: flex; }
        .modal-content { background: var(--card); padding: 30px; border-radius: 20px; width: 100%; max-width: 600px; max-height: 90vh; overflow-y: auto; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; color: var(--muted); font-size: 13px; margin-bottom: 5px; }
        .form-group input, .form-group select { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid var(--border); background: #0b0f17; color: white; }

        /* FOOTER */
        .footer { background: #080b11; border-top: 1px solid var(--border); padding: 60px 0 30px; margin-top: 80px; }
        .footer-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 40px; }
    </style>
</head>
<body>

    <header class="header">
        <div class="container header-inner">
            <div class="logo">Kn2 Personalizados</div>
            <div style="display:flex; gap:10px">
                <button class="btn btn-dark" onclick="toggleCart()">🛒 <span id="cartCount">0</span></button>
                <button class="btn btn-dark" id="adminBtn">Painel</button>
                <button class="btn btn-danger" id="logoutBtn" style="display:none">Sair</button>
            </div>
        </div>
    </header>

    <main class="container">
        <div class="controls">
            <div class="filter-row" id="filterRow"></div>
            <input type="text" class="search-input" id="searchInput" placeholder="O que você procura hoje?">
        </div>
        <div id="catalogContent"></div>
    </main>

    <aside class="cart-sidebar" id="cartSidebar">
        <div class="cart-header"><h2>Meu Carrinho</h2> <button class="btn" onclick="toggleCart()">✕</button></div>
        <div class="cart-body" id="cartItems"></div>
        <div class="cart-footer">
            <div style="display:flex; justify-content:space-between; margin-bottom:10px"><span>Total:</span> <strong id="cartTotal" style="color:var(--accent); font-size:20px">R$ 0,00</strong></div>
            <button class="btn btn-primary" style="width:100%; justify-content:center" onclick="sendWhatsApp()">Finalizar no WhatsApp</button>
        </div>
    </aside>

    <div class="zoom-modal" id="zoomModal" onclick="this.classList.remove('active')">
        <img class="zoom-img" id="zoomImg">
    </div>

    <div class="modal" id="adminModal">
        <div class="modal-content">
            <h2 id="modalTitle" style="margin-bottom:20px">Novo Produto</h2>
            <input type="hidden" id="editId">
            <div class="form-group"><label>Título</label><input type="text" id="title"></div>
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:15px">
                <div class="form-group">
                    <label>Categoria</label>
                    <div style="display:flex; gap:5px">
                        <select id="category"></select>
                        <button class="btn btn-dark" onclick="addNewCategory()">+</button>
                    </div>
                </div>
                <div class="form-group"><label>Preço (R$)</label><input type="number" id="price" step="0.01"></div>
            </div>
            <div class="form-group"><label>URL da Imagem</label><input type="text" id="imageUrl"></div>
            <div style="display:flex; gap:10px">
                <button class="btn btn-primary" style="flex:1" id="saveBtn">Salvar Produto</button>
                <button class="btn btn-dark" onclick="closeAdmin()">Fechar</button>
            </div>
            <div id="adminList" style="margin-top:30px"></div>
        </div>
    </div>

    <div class="modal" id="loginModal">
        <div class="modal-content" style="max-width:380px">
            <h2 style="margin-bottom:20px">Login Admin</h2>
            <div class="form-group"><label>E-mail</label><input type="email" id="email"></div>
            <div class="form-group"><label>Senha</label><input type="password" id="password"></div>
            <button class="btn btn-primary" style="width:100%" id="loginBtn">Entrar</button>
            <button class="btn btn-dark" style="width:100%; margin-top:10px" onclick="document.getElementById('loginModal').classList.remove('active')">Voltar</button>
        </div>
    </div>

    <footer class="footer">
        <div class="container footer-grid">
            <div><h3 class="logo">Kn2 Personalizados</h3><p style="color:var(--muted); font-size:14px; margin-top:10px">Sublimação profissional em BH.</p></div>
            <div><h3>Siga-nos</h3><a href="https://www.instagram.com/arteskn2" target="_blank" class="social-btn" style="margin-top:10px; display:inline-flex">Instagram @arteskn2</a></div>
        </div>
    </footer>

    <script>
        const SB_URL = "https://kdoxzjdvpbdwpzyaqary.supabase.co";
        const SB_KEY = "sb_publishable_4WrcBi_Cy8yRg8v0D3_BQw_1XuBID4V";
        const _supabase = supabase.createClient(SB_URL, SB_KEY);

        let products = [];
        let cart = JSON.parse(localStorage.getItem('kn2_cart')) || [];
        let activeCat = "Todos";
        let query = "";
        let customCategories = ["Canecas", "Botons", "Chaveiros", "Caixas"];

        async function init() {
            await loadProducts();
            checkUser();
            updateCart();
            renderAll();
        }

        async function loadProducts() {
            const { data } = await _supabase.from('produtos').select('*').order('created_at', {ascending:false});
            products = data || [];
            // Atualiza categorias baseadas nos produtos existentes
            const pCats = products.map(p => p.category);
            customCategories = [...new Set([...customCategories, ...pCats])];
            updateCategorySelect();
        }

        function renderAll() { renderFilters(); renderGrid(); }

        function renderFilters() {
            const cats = ["Todos", ...new Set(customCategories)];
            document.getElementById('filterRow').innerHTML = cats.map(c => `
                <button class="filter-btn ${c === activeCat ? 'active' : ''}" onclick="setCat('${c}')">${c}</button>
            `).join('');
        }

        function setCat(c) { activeCat = c; renderAll(); }

        function renderGrid() {
            const container = document.getElementById('catalogContent');
            const filtered = products.filter(p => (activeCat === "Todos" || p.category === activeCat) && p.title.toLowerCase().includes(query.toLowerCase()));
            const grouped = filtered.reduce((acc, p) => { (acc[p.category] = acc[p.category] || []).push(p); return acc; }, {});
            
            container.innerHTML = Object.entries(grouped).map(([cat, items]) => `
                <div class="category-block">
                    <h2 class="category-title">${cat}</h2>
                    <div class="grid">${items.map(p => `
                        <div class="card">
                            <img src="${p.image_url}" class="card-img" onclick="openZoom('${p.image_url}')">
                            <div class="card-body">
                                <h3>${p.title}</h3>
                                <div class="card-price">R$ ${p.price.toFixed(2).replace('.',',')}</div>
                                <button class="btn btn-primary" style="justify-content:center" onclick="addToCart('${p.id}')">🛒 Adicionar</button>
                            </div>
                        </div>
                    `).join('')}</div>
                </div>
            `).join('');
        }

        // --- FUNCIONALIDADES RESTAURADAS ---
        function openZoom(url) {
            document.getElementById('zoomImg').src = url;
            document.getElementById('zoomModal').classList.add('active');
        }

        function addNewCategory() {
            const n = prompt("Nome da nova categoria:");
            if (n) {
                customCategories.push(n);
                updateCategorySelect();
                document.getElementById('category').value = n;
            }
        }

        function updateCategorySelect() {
            const sel = document.getElementById('category');
            sel.innerHTML = customCategories.map(c => `<option value="${c}">${c}</option>`).join('');
        }

        // --- CARRINHO ---
        function toggleCart() { document.getElementById('cartSidebar').classList.toggle('active'); }

        function addToCart(id) {
            const p = products.find(x => x.id == id);
            const exists = cart.find(x => x.id == id);
            if (exists) exists.qty++; else cart.push({...p, qty: 1});
            updateCart();
            if(!document.getElementById('cartSidebar').classList.contains('active')) toggleCart();
        }

        function updateCart() {
            localStorage.setItem('kn2_cart', JSON.stringify(cart));
            const count = cart.reduce((acc, i) => acc + i.qty, 0);
            document.getElementById('cartCount').textContent = count;
            
            const list = document.getElementById('cartItems');
            let total = 0;
            list.innerHTML = cart.map(i => {
                total += i.price * i.qty;
                return `
                    <div class="cart-item">
                        <img src="${i.image_url}">
                        <div style="flex:1">
                            <div style="font-size:14px; font-weight:600">${i.title}</div>
                            <div style="font-size:12px; color:var(--accent)">${i.qty}x R$ ${i.price.toFixed(2)}</div>
                        </div>
                        <button class="btn btn-danger" style="padding:5px" onclick="removeCart('${i.id}')">✕</button>
                    </div>
                `;
            }).join('');
            document.getElementById('cartTotal').textContent = `R$ ${total.toFixed(2).replace('.',',')}`;
        }

        function removeCart(id) {
            cart = cart.filter(x => x.id != id);
            updateCart();
        }

        function sendWhatsApp() {
            if (cart.length === 0) return alert("Carrinho vazio!");
            let msg = "Olá Kn2! Gostaria de fazer este pedido:\n\n";
            cart.forEach(i => msg += `• ${i.title} (${i.qty}x) - R$ ${(i.price * i.qty).toFixed(2)}\n`);
            msg += `\n*Total: ${document.getElementById('cartTotal').textContent}*`;
            window.open(`https://wa.me/5531999683959?text=${encodeURIComponent(msg)}`);
        }

        // --- ADMIN ---
        async function checkUser() {
            const { data: { user } } = await _supabase.auth.getUser();
            if (user) {
                const { data: admin } = await _supabase.from('perfil_admin').select('email').eq('email', user.email).single();
                if (admin) { document.getElementById('logoutBtn').style.display = 'block'; return true; }
            }
            return false;
        }

        document.getElementById('loginBtn').onclick = async () => {
            const { error } = await _supabase.auth.signInWithPassword({ email: document.getElementById('email').value, password: document.getElementById('password').value });
            if (error) alert("Dados incorretos"); else location.reload();
        };

        document.getElementById('logoutBtn').onclick = async () => { await _supabase.auth.signOut(); location.reload(); };

        document.getElementById('adminBtn').onclick = async () => {
            if (await checkUser()) { document.getElementById('adminModal').classList.add('active'); renderAdminList(); }
            else document.getElementById('loginModal').classList.add('active');
        };

        function renderAdminList() {
            document.getElementById('adminList').innerHTML = `<h3 style="margin:20px 0 10px">Lista de Produtos</h3>` + products.map(p => `
                <div style="display:flex; align-items:center; gap:10px; padding:8px; background:rgba(0,0,0,0.2); border-radius:10px; margin-bottom:5px">
                    <img src="${p.image_url}" style="width:40px; height:40px; border-radius:5px; object-fit:cover">
                    <div style="flex:1; font-size:13px">${p.title}</div>
                    <button class="btn btn-primary" onclick="editProd('${p.id}')" style="padding:4px 8px">✏️</button>
                    <button class="btn btn-danger" onclick="delProd('${p.id}')" style="padding:4px 8px">🗑️</button>
                </div>
            `).join('');
        }

        window.editProd = (id) => {
            const p = products.find(x => x.id == id);
            document.getElementById('editId').value = p.id;
            document.getElementById('title').value = p.title;
            document.getElementById('category').value = p.category;
            document.getElementById('price').value = p.price;
            document.getElementById('imageUrl').value = p.image_url;
            document.getElementById('modalTitle').textContent = "Editar Produto";
        };

        document.getElementById('saveBtn').onclick = async () => {
            const id = document.getElementById('editId').value;
            const payload = {
                title: document.getElementById('title').value,
                category: document.getElementById('category').value,
                price: parseFloat(document.getElementById('price').value),
                image_url: document.getElementById('imageUrl').value
            };
            const { error } = id ? await _supabase.from('produtos').update(payload).eq('id', id) : await _supabase.from('produtos').insert([payload]);
            if (error) alert("Erro ao salvar.");
            else { alert("Sucesso!"); await loadProducts(); renderAll(); renderAdminList(); closeAdmin(); }
        };

        window.delProd = async (id) => { if (confirm("Excluir?")) { await _supabase.from('produtos').delete().eq('id', id); await loadProducts(); renderAll(); renderAdminList(); } };
        function closeAdmin() { document.getElementById('adminModal').classList.remove('active'); document.getElementById('editId').value = ""; }
        document.getElementById('searchInput').oninput = (e) => { query = e.target.value; renderGrid(); };

        init();
    </script>
</body>
</html>
