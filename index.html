<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kn2 Personalizados | Catálogo</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg: #0b0f17; --card: #111827; --accent: #22c55e; --text: #f3f4f6; --border: rgba(255,255,255,.08); }
        body { background: var(--bg); color: var(--text); font-family: system-ui; margin: 0; overflow-x: hidden; }
        .container { width: min(1200px, 94vw); margin: auto; padding: 20px 0; }
        .topbar { position: sticky; top: 0; background: rgba(11,15,23,.9); backdrop-filter: blur(10px); border-bottom: 1px solid var(--border); padding: 15px 0; z-index: 100; }
        .header-content { display: flex; justify-content: space-between; align-items: center; }
        .productsGrid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 20px; }
        .card { background: var(--card); border-radius: 20px; border: 1px solid var(--border); overflow: hidden; position: relative; transition: .3s; display: flex; flex-direction: column; }
        .productImage { width: 100%; height: 260px; object-fit: cover; cursor: pointer; }
        .price { color: var(--accent); font-size: 22px; font-weight: 900; margin: 10px 0; }
        .btn { padding: 12px 20px; border-radius: 12px; border: none; cursor: pointer; font-weight: bold; transition: .2s; width: 100%; }
        .btn-primary { background: var(--accent); color: #000; }
        .like-badge { position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,0.6); padding: 5px 12px; border-radius: 15px; cursor: pointer; backdrop-filter: blur(5px); z-index: 10; }
    </style>
</head>
<body>

    <header class="topbar">
        <div class="container header-content">
            <div style="font-size: 24px; font-weight: 900;">Kn2 <span>Artes</span></div>
            <button class="btn btn-primary" style="width: auto;">🛒 Itens: <span id="cartCount">0</span></button>
        </div>
    </header>

    <main class="container">
        <div id="catalogContainer" class="productsGrid">Carregando produtos...</div>
    </main>

    <footer style="text-align: center; padding: 40px; opacity: 0.5; font-size: 12px;">
        Kn2 © 2024 | Visitas: <span id="visitCount">0</span>
    </footer>

       <script>
     const SUPABASE_URL = "https://kdoxzjdvpbdwpzyaqary.supabase.co";
    const SUPABASE_KEY = "sb_publishable_4WrcBi_Cy8yRg8v0D3_BQw_1XuBID4V"; 
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);


        let products = [];
        let count = 0;

        async function init() {
            try {
                // Carrega produtos primeiro
                const { data, error } = await _supabase.from('produtos').select('*').order('created_at', { ascending: false });
                if (error) throw error;
                products = data || [];
                renderGrid();
                
                // Tenta carregar visitas de forma isolada (se falhar, o site não trava)
                updateVisits();
            } catch (err) {
                console.error("Erro crítico:", err);
                document.getElementById('catalogContainer').innerHTML = "Erro ao carregar dados do banco.";
            }
        }

        async function updateVisits() {
            try {
                const { data } = await _supabase.from('estatisticas').select('visitas').eq('id', 1).single();
                if (data) document.getElementById('visitCount').innerText = data.visitas;
            } catch (e) { console.log("Tabela de estatísticas não encontrada."); }
        }

        function renderGrid() {
            const container = document.getElementById('catalogContainer');
            if (products.length === 0) { container.innerHTML = "Nenhum produto cadastrado."; return; }

            container.innerHTML = products.map(p => `
                <div class="card">
                    <div class="like-badge" onclick="handleLike('${p.id}', ${p.likes || 0})">❤️ ${p.likes || 0}</div>
                    <img src="${p.image_url}" class="productImage" onclick="window.open('${p.image_url}', '_blank')">
                    <div style="padding: 15px; flex-grow: 1;">
                        <h3 style="font-size: 16px; margin: 0;">${p.title}</h3>
                        <div class="price">R$ ${p.price.toFixed(2).replace('.', ',')}</div>
                        <button class="btn btn-primary" onclick="addToCart('${p.id}')">Adicionar ao Pedido</button>
                    </div>
                </div>
            `).join('');
        }

        // --- FUNÇÕES GLOBAIS (BLINDADAS) ---
        
        window.handleLike = async function(id, current) {
            // Atualiza na tela imediatamente para ser rápido
            const target = event.currentTarget;
            target.innerText = `❤️ ${current + 1}`;
            
            try {
                await _supabase.from('produtos').update({ likes: current + 1 }).eq('id', id);
            } catch (e) { console.error("Erro ao salvar like"); }
        };

        window.addToCart = function(id) {
            count++;
            document.getElementById('cartCount').innerText = count;
            
            const p = products.find(x => x.id === id);
            const btn = event.target;
            btn.innerText = "✅ No Carrinho!";
            btn.style.background = "#fff";

            setTimeout(() => {
                btn.innerText = "Adicionar ao Pedido";
                btn.style.background = "";
                
                if(confirm(`Deseja enviar o pedido de "${p.title}" agora via WhatsApp?`)) {
                    const msg = `Olá! Tenho interesse no produto: ${p.title} (R$ ${p.price.toFixed(2)})`;
                    window.open(`https://wa.me/5531999683959?text=${encodeURIComponent(msg)}`, '_blank');
                }
            }, 500);
        };

        init();
    </script>
</body>
</html>
