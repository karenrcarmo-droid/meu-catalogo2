<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kn2 Personalizados | Catálogo Oficial</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root{
      --bg:#0b0f17; --card:#111827; --muted:#9ca3af; --text:#f3f4f6;
      --border:rgba(255,255,255,.06); --accent:#22c55e; --danger:#ef4444;
    }
    *{ margin:0; padding:0; box-sizing:border-box; }
    body{ background:var(--bg); color:var(--text); font-family:system-ui; overflow-x:hidden; }
    .container{ width:min(1200px,92vw); margin:auto; }

    /* TOPBAR */
    .topbar{ position:sticky; top:0; z-index:1000; background:rgba(11,15,23,.9); backdrop-filter:blur(12px); border-bottom:1px solid var(--border); }
    .topbar__inner{ padding:16px 0; display:flex; justify-content:space-between; align-items:center; gap:10px; }
    .logo{ font-size:24px; font-weight:900; }
    .logo span{ color:var(--accent); }

    /* BOTÕES */
    .btn{ border:none; cursor:pointer; border-radius:14px; padding:12px 18px; color:white; font-weight:800; transition:.2s; text-decoration:none; display:inline-flex; align-items:center; gap:8px;}
    .btn:hover{ transform:translateY(-2px); }
    .btn-primary{ background:var(--accent); color:#000; }
    .btn-dark{ background:#1f2937; }

    /* FILTROS E BUSCA */
    .menu__row{ display:flex; gap:10px; overflow-x:auto; padding:20px 0; scrollbar-width:none; }
    .menu__btn{ border:1px solid var(--border); background:transparent; color:white; padding:10px 20px; border-radius:999px; cursor:pointer; white-space:nowrap; }
    .menu__btn.active{ background:var(--accent); color:#000; border-color:var(--accent); font-weight:bold; }
    .search input{ width:100%; height:56px; border:none; border-radius:18px; background:#111827; color:white; padding:0 18px; outline:none; border:1px solid var(--border); margin-bottom:20px;}

    /* GRID E CARDS */
    .productsGrid{ display:grid; grid-template-columns:repeat(auto-fill,minmax(260px,1fr)); gap:20px; }
    .card{ background:var(--card); border-radius:22px; overflow:hidden; border:1px solid var(--border); transition:.25s; display:flex; flex-direction:column; position:relative;}
    .card:hover{ transform:translateY(-5px); border-color:var(--accent); }
    .productImage{ width:100%; height:250px; object-fit:cover; cursor:pointer; }
    .card__body{ padding:18px; flex-grow:1; display:flex; flex-direction:column; }
    .price{ color:var(--accent); font-size:22px; font-weight:900; margin:10px 0;}
    .like-badge { position:absolute; top:10px; right:10px; background:rgba(0,0,0,0.6); padding:5px 12px; border-radius:15px; cursor:pointer; backdrop-filter:blur(5px); font-size:14px;}

    /* MODAL */
    .modal{ position:fixed; inset:0; background:rgba(0,0,0,.8); display:none; justify-content:center; align-items:center; z-index:9999; backdrop-filter:blur(5px); }
    .modal.active{ display:flex; }
    .modal__content{ width:min(600px,92vw); max-height:90vh; overflow:auto; background:#111827; border-radius:24px; padding:24px; border:1px solid var(--border); }
    
    /* ADMIN LIST */
    .adminItem{ display:flex; gap:12px; align-items:center; background:#0f172a; padding:12px; border-radius:18px; margin-bottom:12px; border:1px solid var(--border);}
    .adminItem img{ width:60px; height:60px; border-radius:10px; object-fit:cover; }

    input, select { width:100%; padding:12px; margin:8px 0; border-radius:12px; border:1px solid var(--border); background:#0b101a; color:white; }
  </style>
</head>
<body>

  <header class="topbar">
    <div class="container topbar__inner">
      <div class="logo">Kn2 <span>Personalizados</span></div>
      <div style="display:flex; gap:8px;">
        <a href="https://www.instagram.com/arteskn2?igsh=bmpsYW9kdHgzdzlp" target="_blank" class="btn btn-dark">📸 Insta</a>
        <button class="btn btn-primary" onclick="alert('Carrinho em breve!')">🛒 <span id="cartCount">0</span></button>
        <button class="btn btn-dark" id="adminBtn">Painel</button>
      </div>
    </div>
  </header>

  <main class="container">
    <div class="search"><input type="text" id="searchInput" placeholder="O que você procura hoje?"></div>
    <div class="menu__row" id="categoryRow"></div>
    <div id="catalogContainer" class="productsGrid"></div>
  </main>

  <footer style="text-align:center; padding:40px; color:var(--muted); font-size:13px; border-top:1px solid var(--border); margin-top:40px;">
    👥 <span id="viewDisplay">0</span> visitas | Kn2 © 2024
  </footer>

  <div class="modal" id="adminModal">
    <div class="modal__content">
      <h2 id="admTitle" style="margin-bottom:20px;">Gerenciar Produtos</h2>
      <input type="hidden" id="editId">
      <input type="text" id="pTitle" placeholder="Nome do Produto">
      <input type="text" id="pCat" placeholder="Categoria">
      <input type="number" id="pPrice" placeholder="Preço (Ex: 49.90)">
      <button class="btn btn-primary" id="saveBtn" style="width:100%; margin-top:10px;">Salvar Alterações</button>
      
      <div id="adminList" style="margin-top:30px;"></div>
      <button class="btn btn-dark" onclick="closeAdmin()" style="width:100%; margin-top:15px;">Fechar Painel</button>
    </div>
  </div>

  <script>
    // CONFIGURAÇÃO SUPABASE
    const SUPABASE_URL = "https://kdoxzjdvpbdwpzyaqary.supabase.co";
    const SUPABASE_KEY = "sb_publishable_4WrcBi_Cy8yRg8v0D3_BQw_1XuBID4V"; // <--- TROQUE PELA CHAVE DO SEU PAINEL
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let products = [];
    let currentCat = "Todos";
    let searchTerm = "";

    async function init() {
      await updateVisits();
      await loadProducts();
      renderMenu();
      renderGrid();
    }

    // CONTADOR DE VISITAS (REQUER TABELA 'estatisticas')
    async function updateVisits() {
      try {
        const { data } = await _supabase.from('estatisticas').select('visitas').eq('id', 1).single();
        if(data) {
          const novoTotal = data.visitas + 1;
          await _supabase.from('estatisticas').update({ visitas: novoTotal }).eq('id', 1);
          document.getElementById('viewDisplay').innerText = novoTotal.toLocaleString();
        }
      } catch (e) { console.warn("Erro ao carregar visitas"); }
    }

    async function loadProducts() {
      const { data, error } = await _supabase.from('produtos').select('*').order('created_at', { ascending: false });
      if(!error) products = data || [];
    }

    function renderMenu() {
      const cats = ["Todos", ...new Set(products.map(p => p.category))];
      document.getElementById('categoryRow').innerHTML = cats.map(c => `
        <button class="menu__btn ${currentCat === c ? 'active' : ''}" onclick="filterCat('${c}')">${c}</button>
      `).join('');
    }

    function filterCat(c) { currentCat = c; renderMenu(); renderGrid(); }

    function renderGrid() {
      const container = document.getElementById('catalogContainer');
      const filtered = products.filter(p => 
        (currentCat === "Todos" || p.category === currentCat) &&
        p.title.toLowerCase().includes(searchTerm.toLowerCase())
      );

      container.innerHTML = filtered.map(p => `
        <div class="card">
          <div class="like-badge" onclick="handleLike('${p.id}', ${p.likes || 0})">❤️ ${p.likes || 0}</div>
          <img src="${p.image_url}" class="productImage" onclick="window.open('${p.image_url}', '_blank')">
          <div class="card__body">
            <h3 style="font-size:17px;">${p.title}</h3>
            <p style="color:var(--muted); font-size:13px; margin:5px 0;">${p.category}</p>
            <div class="price">R$ ${p.price.toFixed(2).replace('.',',')}</div>
            <button class="btn btn-primary" style="width:100%; justify-content:center;">Comprar Agora</button>
          </div>
        </div>
      `).join('');
    }

    async function handleLike(id, current) {
      await _supabase.from('produtos').update({ likes: current + 1 }).eq('id', id);
      await loadProducts();
      renderGrid();
    }

    // ADMINISTRAÇÃO E EDIÇÃO
    document.getElementById('adminBtn').onclick = async () => {
      const { data: { user } } = await _supabase.auth.getUser();
      if (user) {
        document.getElementById('adminModal').classList.add('active');
        renderAdminList();
      } else {
        const email = prompt("E-mail do Admin:");
        const pass = prompt("Senha:");
        const { error } = await _supabase.auth.signInWithPassword({ email, password: pass });
        if(!error) location.reload(); else alert("Acesso negado.");
      }
    };

    function renderAdminList() {
      document.getElementById('adminList').innerHTML = products.map(p => `
        <div class="adminItem">
          <img src="${p.image_url}">
          <div style="flex:1">
            <div style="font-weight:bold; font-size:14px;">${p.title}</div>
            <div style="color:var(--accent); font-size:12px;">R$ ${p.price.toFixed(2)}</div>
          </div>
          <button onclick="setupEdit('${p.id}')" style="background:none; border:none; color:var(--accent); cursor:pointer; font-size:12px;">EDITAR</button>
        </div>
      `).join('');
    }

    function setupEdit(id) {
      const p = products.find(x => x.id == id);
      document.getElementById('editId').value = p.id;
      document.getElementById('pTitle').value = p.title;
      document.getElementById('pCat').value = p.category;
      document.getElementById('pPrice').value = p.price;
      document.getElementById('admTitle').innerText = "Editando: " + p.title;
      document.querySelector('.modal__content').scrollTop = 0;
    }

    document.getElementById('saveBtn').onclick = async () => {
      const id = document.getElementById('editId').value;
      const payload = {
        title: document.getElementById('pTitle').value,
        category: document.getElementById('pCat').value,
        price: parseFloat(document.getElementById('pPrice').value)
      };

      if(id) {
        await _supabase.from('produtos').update(payload).eq('id', id);
        alert("Produto atualizado!");
      } else {
        alert("Para novos produtos, use o painel de upload completo.");
      }
      closeAdmin();
    };

    function closeAdmin() { document.getElementById('adminModal').classList.remove('active'); location.reload(); }
    document.getElementById('searchInput').oninput = (e) => { searchTerm = e.target.value; renderGrid(); };

    init();
  </script>
</body>
</html>
