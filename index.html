<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kn2 Personalizados | Premium Catalog</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg: #0b0f17; 
            --card: rgba(255, 255, 255, 0.03); 
            --muted: #9ca3af; 
            --text: #f3f4f6;
            --border: rgba(255, 255, 255, 0.08); 
            --accent: #22c55e; 
            --danger: #ef4444;
            --glass: blur(12px);
        }

        /* Scrollbar Estilizada */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: #1f2937; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--accent); }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', system-ui, -apple-system, sans-serif; overflow-x: hidden; }
        .container { width: min(1200px, 94vw); margin: auto; }
        
        /* HEADER PREMIUM */
        .topbar { position: sticky; top: 0; z-index: 1000; background: rgba(11, 15, 23, 0.7); backdrop-filter: var(--glass); border-bottom: 1px solid var(--border); padding: 14px 0; }
        .topbar__inner { display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 24px; font-weight: 900; letter-spacing: -1.5px; background: linear-gradient(to right, #fff, var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        /* BOTOES COM MICRO-INTERAÇÕES */
        .btn { border: none; cursor: pointer; border-radius: 14px; padding: 12px 20px; font-weight: 700; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); display: inline-flex; align-items: center; justify-content: center; gap: 8px; color: white; }
        .btn-primary { background: var(--accent); box-shadow: 0 4px 15px rgba(34, 197, 94, 0.2); }
        .btn-primary:hover { transform: translateY(-3px) scale(1.02); filter: brightness(1.1); box-shadow: 0 8px 20px rgba(34, 197, 94, 0.3); }
        .btn-primary:active { transform: scale(0.95); }
        .btn-dark { background: rgba(255, 255, 255, 0.05); border: 1px solid var(--border); backdrop-filter: var(--glass); }
        .btn-dark:hover { background: rgba(255, 255, 255, 0.1); }
        
        input { background: rgba(255,255,255,0.03); border: 1px solid var(--border); color: #fff; padding: 14px; border-radius: 16px; width: 100%; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--accent); background: rgba(255,255,255,0.07); }

        /* GRID E CARDS GLASSMORPHISM */
        .categoryBlock { margin-top: 50px; }
        .categoryHeading { font-size: 14px; text-transform: uppercase; letter-spacing: 2px; color: var(--accent); margin-bottom: 20px; font-weight: 800; display: flex; align-items: center; gap: 10px; }
        .categoryHeading::after { content: ""; flex: 1; height: 1px; background: var(--border); }

        .productsGrid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 24px; }
        .card { background: var(--card); border-radius: 24px; border: 1px solid var(--border); overflow: hidden; display: flex; flex-direction: column; backdrop-filter: var(--glass); transition: all 0.4s ease; }
        .card:hover { transform: translateY(-10px); border-color: rgba(34, 197, 94, 0.4); box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
        
        .img-container { width: 100%; height: 260px; overflow: hidden; position: relative; }
        .productImage { width: 100%; height: 100%; object-fit: cover; cursor: zoom-in; transition: transform 0.7s ease; }
        .card:hover .productImage { transform: scale(1.1); }
        
        .card__body { padding: 20px; flex-grow: 1; display: flex; flex-direction: column; justify-content: space-between; }
        .card__title { font-size: 16px; font-weight: 700; margin-bottom: 12px; color: var(--text); }
        .price { color: var(--accent); font-size: 20px; font-weight: 900; letter-spacing: -0.5px; }

        /* CARRINHO */
        .cartSidebar { position: fixed; top: 0; right: -450px; width: 420px; max-width: 100%; height: 100vh; background: rgba(11, 15, 23, 0.95); z-index: 2000; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); border-left: 1px solid var(--border); backdrop-filter: blur(20px); display: flex; flex-direction: column; }
        .cartSidebar.active { right: 0; }
        .cartBody { flex: 1; overflow-y: auto; padding: 25px; }
        .cartItem { display: flex; gap: 15px; margin-bottom: 15px; background: rgba(255,255,255,0.03); padding: 12px; border-radius: 18px; border: 1px solid var(--border); }
        .cartItem img { width: 60px; height: 60px; border-radius: 12px; object-fit: cover; }

        /* MODAIS */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; align-items: center; justify-content: center; z-index: 3000; padding: 20px; backdrop-filter: blur(10px); }
        .modal.active { display: flex; }
        .modal__content { background: #111827; padding: 30px; border-radius: 28px; width: min(500px, 100%); max-height: 90vh; overflow-y: auto; border: 1px solid var(--border); }
        
        #zoomImg { max-width: 100%; max-height: 80vh; border-radius: 20px; box-shadow: 0 0 50px rgba(0,0,0,0.5); }

        @media (max-width: 600px) { .productsGrid { grid-template-columns: 1fr; } .cartSidebar { width: 100%; } }
    </style>
</head>
<body>

    <header class="topbar">
        <div class="container topbar__inner">
            <div class="logo">KN2 DESIGN</div>
            <div style="display: flex; gap: 12px;">
                <button class="btn btn-dark" onclick="toggleCart()">
                    🛒 <span id="cartCount" style="margin-left:5px">0</span>
                </button>
                <button class="btn btn-primary" id="adminBtn">Painel</button>
                <button class="btn btn-dark" id="logoutBtn" style="display: none; background: rgba(239, 68, 68, 0.1); color: var(--danger); border-color: rgba(239, 68, 68, 0.2);">Sair</button>
            </div>
        </div>
    </header>

    <main class="container">
        <div style="margin: 30px 0;">
            <input type="text" id="searchInput" placeholder="Pesquisar um personalizado exclusivo...">
        </div>
        <div id="catalogContainer"></div>
    </main>

    <div class="cartSidebar" id="cartSidebar">
        <div style="padding: 25px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center;">
            <h3 style="font-weight: 900;">Meu Pedido</h3>
            <button onclick="toggleCart()" class="btn btn-dark" style="border-radius: 50%; padding: 10px; width: 40px; height: 40px;">✕</button>
        </div>
        <div class="cartBody" id="cartItems"></div>
        <div style="padding: 25px; border-top: 1px solid var(--border); background: rgba(0,0,0,0.2);">
            <div style="display: flex; justify-content: space-between; margin-bottom: 20px;">
                <span style="color: var(--muted);">Total do investimento:</span>
                <span id="cartTotal" style="color:var(--accent); font-weight:900; font-size:1.4rem;">R$ 0,00</span>
            </div>
            <button class="btn btn-primary" style="width: 100%; height: 55px; font-size: 16px;" onclick="sendWhatsApp()">Finalizar no WhatsApp</button>
        </div>
    </div>

    <div class="modal" id="zoomModal" onclick="this.classList.remove('active')">
        <div style="text-align: center; position: relative;">
            <img id="zoomImg" src="">
            <div style="position: absolute; top: -50px; right: 0; color: #fff; cursor: pointer; font-size: 24px;">✕</div>
            <p style="margin-top: 20px; color: var(--muted); font-size: 14px; font-weight: 600;">Toque para fechar</p>
        </div>
    </div>

    <div class="modal" id="adminModal">
        <div class="modal__content">
            <h3 style="margin-bottom: 20px;">Gerenciar Catálogo</h3>
            <div style="display: grid; gap: 15px;">
                <input type="text" id="pTitle" placeholder="Nome do Produto">
                <input type="text" id="pCat" placeholder="Categoria">
                <input type="number" id="pPrice" placeholder="Preço (Ex: 39.90)">
                <input type="file" id="pImage" style="font-size: 12px; padding: 10px;">
                <button class="btn btn-primary" id="saveBtn">Salvar Alterações</button>
                <button class="btn btn-dark" onclick="document.getElementById('adminModal').classList.remove('active')">Cancelar</button>
            </div>
            <div id="adminList" style="margin-top: 30px; border-top: 1px solid var(--border); padding-top: 20px;"></div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://kdoxzjdvpbdwpzyaqary.supabase.co";
        const SUPABASE_KEY = "sb_publishable_4WrcBi_Cy8yRg8v0D3_BQw_1XuBID4V";
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let products = [];
        let cart = JSON.parse(localStorage.getItem("cart")) || [];
        let query = "";

        async function init() {
            await loadProducts();
            setupRealtime();
            await checkUser();
            renderGrid();
            updateCartUI();
        }

        async function loadProducts() {
            const { data } = await _supabase.from('produtos').select('*').order('created_at', { ascending: false });
            products = data || [];
        }

        function setupRealtime() {
            _supabase.channel('db').on('postgres_changes', { event: '*', schema: 'public', table: 'produtos' }, payload => {
                if (payload.eventType === 'INSERT') products.unshift(payload.new);
                if (payload.eventType === 'UPDATE') {
                    const i = products.findIndex(p => p.id === payload.new.id);
                    if (i !== -1) products[i] = payload.new;
                }
                if (payload.eventType === 'DELETE') products = products.filter(p => p.id !== payload.old.id);
                renderGrid();
            }).subscribe();
        }

        async function checkUser() {
            const { data: { user } } = await _supabase.auth.getUser();
            if (user) {
                document.getElementById('logoutBtn').style.display = 'inline-flex';
                document.getElementById('adminBtn').innerText = 'Gerenciar';
            }
        }

        function renderGrid() {
            const container = document.getElementById('catalogContainer');
            container.innerHTML = "";
            
            const filtered = products.filter(p => p.title.toLowerCase().includes(query.toLowerCase()));
            const cats = [...new Set(filtered.map(p => p.category))];

            cats.forEach(cat => {
                const section = document.createElement('div');
                section.className = 'categoryBlock';
                section.innerHTML = `<h2 class="categoryHeading">${cat}</h2>`;
                const grid = document.createElement('div');
                grid.className = 'productsGrid';
                
                filtered.filter(p => p.category === cat).forEach(p => {
                    grid.innerHTML += `
                        <div class="card">
                            <div class="img-container">
                                <img src="${p.image_url}" class="productImage" onclick="openZoom('${p.image_url}')" loading="lazy">
                            </div>
                            <div class="card__body">
                                <h4 class="card__title">${p.title}</h4>
                                <div style="display:flex; justify-content:space-between; align-items:center">
                                    <span class="price">R$ ${p.price.toFixed(2).replace('.',',')}</span>
                                    <button class="btn btn-primary" onclick="addToCart('${p.id}')" style="padding:10px 14px; border-radius:12px;">Add</button>
                                </div>
                            </div>
                        </div>`;
                });
                section.appendChild(grid);
                container.appendChild(section);
            });
        }

        function openZoom(url) {
            document.getElementById('zoomImg').src = url;
            document.getElementById('zoomModal').classList.add('active');
        }

        function addToCart(id) {
            const p = products.find(prod => prod.id == id);
            const inCart = cart.find(item => item.id == id);
            if (inCart) inCart.qty++; else cart.push({...p, qty: 1});
            updateCartUI();
        }

        function updateCartUI() {
            localStorage.setItem("cart", JSON.stringify(cart));
            const container = document.getElementById('cartItems');
            let total = 0;
            container.innerHTML = cart.map(item => {
                total += item.price * item.qty;
                return `
                    <div class="cartItem">
                        <img src="${item.image_url}"> 
                        <div style="flex:1">
                            <div style="font-weight:700; font-size:14px; margin-bottom:5px;">${item.title}</div>
                            <div style="display:flex; justify-content:space-between; align-items:center;">
                                <span style="font-size:13px; color:var(--muted)">${item.qty}x R$ ${item.price.toFixed(2)}</span>
                                <button onclick="removeFromCart('${item.id}')" style="background:none; border:none; color:var(--danger); cursor:pointer; font-size:12px;">Remover</button>
                            </div>
                        </div>
                    </div>`;
            }).join('');
            document.getElementById('cartTotal').innerText = `R$ ${total.toFixed(2).replace('.',',')}`;
            document.getElementById('cartCount').innerText = cart.reduce((a, b) => a + b.qty, 0);
        }

        function removeFromCart(id) {
            cart = cart.filter(i => i.id != id);
            updateCartUI();
        }

        function toggleCart() {
            document.getElementById('cartSidebar').classList.toggle('active');
        }

        // ADMIN E AUTH
        document.getElementById('adminBtn').onclick = async () => {
            const { data: { user } } = await _supabase.auth.getUser();
            if (user) {
                document.getElementById('adminModal').classList.add('active');
                renderAdminList();
            } else {
                const email = prompt("E-mail do Administrador:");
                const password = prompt("Senha:");
                if(email && password) {
                    const { error } = await _supabase.auth.signInWithPassword({ email, password });
                    if(error) alert("Dados incorretos!"); else location.reload();
                }
            }
        };

        document.getElementById('logoutBtn').onclick = async () => {
            await _supabase.auth.signOut();
            location.reload();
        };

        async function renderAdminList() {
            const container = document.getElementById('adminList');
            container.innerHTML = products.map(p => `
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; background:rgba(255,255,255,0.02); padding:10px; border-radius:12px;">
                    <span style="font-size:14px;">${p.title}</span>
                    <button onclick="deleteProduct('${p.id}')" class="btn btn-dark" style="padding:6px 10px; font-size:12px; color:var(--danger);">Excluir</button>
                </div>
            `).join('');
        }

        async function deleteProduct(id) {
            if (confirm("Deseja realmente remover este item do catálogo?")) {
                await _supabase.from('produtos').delete().eq('id', id);
                renderAdminList();
            }
        }

        document.getElementById('saveBtn').onclick = async function() {
            const title = document.getElementById('pTitle').value;
            const category = document.getElementById('pCat').value;
            const price = parseFloat(document.getElementById('pPrice').value);
            const file = document.getElementById('pImage').files[0];

            if (!title || !price || !file) return alert("Por favor, preencha todos os campos e selecione uma imagem.");
            
            this.disabled = true;
            this.innerText = "Sincronizando...";

            try {
                const path = `produtos/${Date.now()}_${file.name}`;
                await _supabase.storage.from('imagens-produtos').upload(path, file);
                const { data } = _supabase.storage.from('imagens-produtos').getPublicUrl(path);
                
                const { error } = await _supabase.from('produtos').insert([{ title, category, price, image_url: data.publicUrl }]);
                if (error) throw error;

                alert("Produto adicionado com sucesso!");
                document.getElementById('adminModal').classList.remove('active');
            } catch (e) { alert("Erro ao salvar: " + e.message); }
            finally { this.disabled = false; this.innerText = "Salvar Alterações"; }
        };

        document.getElementById('searchInput').oninput = (e) => { query = e.target.value; renderGrid(); };

        function sendWhatsApp() {
            if(cart.length === 0) return alert("Seu carrinho está vazio!");
            let msg = "Olá Kn2! Gostaria de encomendar esses itens:%0A%0A";
            cart.forEach(i => msg += `✅ *${i.title}* (x${i.qty})%0A`);
            msg += `%0A💰 *Total: ${document.getElementById('cartTotal').innerText}*`;
            window.open(`https://wa.me/5531999683959?text=${msg}`);
        }

        init();
    </script>
</body>
</html>
