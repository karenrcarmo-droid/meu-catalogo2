<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kn2 Personalizados | Catálogo Profissional</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg: #0b0f17; --card: #111827; --text: #e5e7eb; --muted: #9ca3af; --border: rgba(255,255,255,.08); --accent: #22c55e; --danger: #ef4444; }
        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background: var(--bg); color: var(--text); }
        .container { width: min(1200px, 92vw); margin: auto; }
        
        /* Header & Nav */
        .topbar { position: sticky; top: 0; z-index: 1000; background: rgba(11,15,23,0.9); backdrop-filter: blur(10px); border-bottom: 1px solid var(--border); padding: 15px 0; }
        .topbar__inner { display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 24px; font-weight: 900; background: linear-gradient(to right, #22c55e, #10b981); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        /* Botões */
        .btn { border: none; cursor: pointer; border-radius: 12px; padding: 12px 20px; color: white; font-weight: 700; transition: .2s; display: inline-flex; align-items: center; gap: 8px; }
        .btn-primary { background: var(--accent); }
        .btn-dark { background: #1f2937; }
        .btn-danger { background: var(--danger); }
        
        /* Grid de Produtos */
        .search-input { width: 100%; padding: 15px; border-radius: 15px; border: 1px solid var(--border); background: var(--card); color: white; margin: 20px 0; outline: none; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 25px; }
        .card { background: var(--card); border-radius: 20px; border: 1px solid var(--border); overflow: hidden; transition: .3s; display: flex; flex-direction: column; }
        .card:hover { transform: translateY(-5px); border-color: var(--accent); }
        .card-img { width: 100%; height: 260px; object-fit: cover; cursor: zoom-in; }
        .card-body { padding: 20px; flex: 1; }
        .price { color: var(--accent); font-size: 22px; font-weight: 800; display: block; margin: 10px 0; }

        /* Carrinho Lateral */
        .cart-side { position: fixed; top: 0; right: -420px; width: 400px; max-width: 100%; height: 100vh; background: var(--card); z-index: 2000; transition: .4s; border-left: 1px solid var(--border); display: flex; flex-direction: column; }
        .cart-side.active { right: 0; }
        .cart-items { flex: 1; overflow-y: auto; padding: 20px; }

        /* Modais */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; z-index: 3000; padding: 20px; }
        .modal.active { display: flex; }
        .modal-content { background: var(--card); padding: 30px; border-radius: 25px; width: 100%; max-width: 500px; border: 1px solid var(--border); }
        .f-group { margin-bottom: 15px; }
        .f-group label { display: block; color: var(--muted); font-size: 13px; margin-bottom: 5px; }
        .f-group input { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid var(--border); background: #0b0f17; color: white; }
    </style>
</head>
<body>

<header class="topbar">
    <div class="container topbar__inner">
        <div class="logo">Kn2 Personalizados</div>
        <div style="display:flex; gap:10px">
            <button class="btn btn-dark" onclick="toggleCart()">🛒 <span id="cartCount">0</span></button>
            <button class="btn btn-primary" id="adminBtn">Painel Admin</button>
            <button class="btn btn-danger" id="logoutBtn" style="display:none">Sair</button>
        </div>
    </div>
</header>

<main class="container">
    <input type="text" class="search-input" id="searchInput" placeholder="Pesquisar no catálogo...">
    <div id="catalog"></div>
</main>

<div class="cart-side" id="cartSide">
    <div style="padding:20px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between">
        <h3>Seu Pedido</h3>
        <button class="btn" onclick="toggleCart()">✕</button>
    </div>
    <div class="cart-items" id="cartItems"></div>
    <div style="padding:20px; border-top:1px solid var(--border)">
        <div style="display:flex; justify-content:space-between; margin-bottom:15px">
            <span>Total:</span>
            <strong id="cartTotal" style="font-size:22px; color:var(--accent)">R$ 0,00</strong>
        </div>
        <button class="btn btn-primary" style="width:100%; justify-content:center" onclick="sendToWhatsApp()">Finalizar no WhatsApp</button>
    </div>
</div>

<div class="modal" id="adminModal">
    <div class="modal-content">
        <h2 id="modalTitle">Novo Produto</h2><br>
        <input type="hidden" id="editId">
        <div class="f-group"><label>Nome</label><input type="text" id="pTitle"></div>
        <div class="f-group"><label>Categoria</label><input type="text" id="pCat"></div>
        <div class="f-group"><label>Preço</label><input type="number" id="pPrice" step="0.01"></div>
        <div class="f-group">
            <label>Foto do Produto</label>
            <input type="file" id="pImageFile" accept="image/*">
        </div>
        <div style="display:flex; gap:10px">
            <button class="btn btn-primary" style="flex:1" id="saveBtn">Salvar</button>
            <button class="btn btn-dark" onclick="closeAdmin()">Fechar</button>
        </div>
        <div id="adminList" style="margin-top:20px; max-height:200px; overflow-y:auto; border-top:1px solid var(--border); padding-top:10px"></div>
    </div>
</div>

<div class="modal" id="loginModal">
    <div class="modal-content" style="max-width:350px">
        <h2>Login Admin</h2><br>
        <div class="f-group"><label>E-mail</label><input type="email" id="lEmail"></div>
        <div class="f-group"><label>Senha</label><input type="password" id="lPass"></div>
        <button class="btn btn-primary" style="width:100%" id="loginBtn">Entrar</button>
    </div>
</div>

<script>
const SB_URL = "https://kdoxzjdvpbdwpzyaqary.supabase.co";
const SB_KEY = "sb_publishable_4WrcBi_Cy8yRg8v0D3_BQw_1XuBID4V";
const _supabase = supabase.createClient(SB_URL, SB_KEY);

let products = [];
let cart = [];

async function init() {
    await loadData();
    checkSession();
}

async function loadData() {
    const { data, error } = await _supabase.from('produtos').select('*').order('created_at', {ascending: false});
    if (error) console.error("Erro ao carregar:", error.message);
    products = data || [];
    render();
}

function render() {
    const query = document.getElementById('searchInput').value.toLowerCase();
    const filtered = products.filter(p => p.title.toLowerCase().includes(query));
    
    document.getElementById('catalog').innerHTML = `<div class="grid">` + 
        filtered.map(p => `
            <div class="card">
                <img src="${p.image_url || 'https://via.placeholder.com/300'}" class="card-img">
                <div class="card-body">
                    <strong>${p.title}</strong>
                    <span class="price">R$ ${Number(p.price).toFixed(2).replace('.',',')}</span>
                    <button class="btn btn-primary" style="width:100%; justify-content:center" onclick="addToCart('${p.id}')">🛒 Adicionar</button>
                </div>
            </div>
        `).join('') + `</div>`;
}

// Lógica de Upload e Salvamento Corrigida
document.getElementById('saveBtn').onclick = async () => {
    const btn = document.getElementById('saveBtn');
    const fileInput = document.getElementById('pImageFile');
    const id = document.getElementById('editId').value;
    let imageUrl = "";

    btn.disabled = true; btn.textContent = "Processando...";

    try {
        // 1. Trata o upload da imagem se houver arquivo novo
        if (fileInput.files.length > 0) {
            const file = fileInput.files[0];
            const fileName = `${Date.now()}_${file.name.replace(/\s/g, '_')}`;
            
            const { data: uploadData, error: uploadError } = await _supabase.storage
                .from('imagens-produtos')
                .upload(fileName, file);

            if (uploadError) throw uploadError;

            const { data: { publicUrl } } = _supabase.storage
                .from('imagens-produtos')
                .getPublicUrl(fileName);
            
            imageUrl = publicUrl;
        }

        // 2. Prepara os dados para o banco
        const payload = {
            title: document.getElementById('pTitle').value,
            category: document.getElementById('pCat').value,
            price: parseFloat(document.getElementById('pPrice').value),
        };

        if (imageUrl) payload.image_url = imageUrl;

        // 3. Insere ou Atualiza
        const { error: dbError } = id 
            ? await _supabase.from('produtos').update(payload).eq('id', id)
            : await _supabase.from('produtos').insert([payload]);

        if (dbError) throw dbError;

        alert("Sucesso!");
        location.reload();
    } catch (err) {
        alert("Erro na operação: " + err.message);
    } finally {
        btn.disabled = false; btn.textContent = "Salvar";
    }
};

// Funções de Carrinho
function toggleCart() { document.getElementById('cartSide').classList.toggle('active'); }

function addToCart(id) {
    const p = products.find(x => x.id == id);
    cart.push(p);
    updateCartUI();
    if(!document.getElementById('cartSide').classList.contains('active')) toggleCart();
}

function updateCartUI() {
    document.getElementById('cartCount').textContent = cart.length;
    let total = cart.reduce((acc, p) => acc + Number(p.price), 0);
    document.getElementById('cartTotal').textContent = `R$ ${total.toFixed(2).replace('.',',')}`;
    document.getElementById('cartItems').innerHTML = cart.map((p, idx) => `
        <div style="display:flex; justify-content:space-between; margin-bottom:10px; background:rgba(255,255,255,0.05); padding:10px; border-radius:10px">
            <span>${p.title}</span>
            <strong>R$ ${Number(p.price).toFixed(2)}</strong>
        </div>
    `).join('');
}

function sendToWhatsApp() {
    if (cart.length === 0) return alert("Carrinho vazio!");
    let texto = "Olá! Gostaria de encomendar:\n\n" + cart.map(p => `- ${p.title} (R$ ${p.price})`).join('\n');
    texto += `\n\n*Total: ${document.getElementById('cartTotal').textContent}*`;
    window.open(`https://wa.me/5531999683959?text=${encodeURIComponent(texto)}`);
}

// Admin & Auth
document.getElementById('adminBtn').onclick = async () => {
    const { data: { user } } = await _supabase.auth.getUser();
    if (user) {
        document.getElementById('adminModal').classList.add('active');
        renderAdminList();
    } else {
        document.getElementById('loginModal').classList.add('active');
    }
};

document.getElementById('loginBtn').onclick = async () => {
    const { error } = await _supabase.auth.signInWithPassword({
        email: document.getElementById('lEmail').value,
        password: document.getElementById('lPass').value
    });
    if (error) alert("Erro: " + error.message); else location.reload();
};

function renderAdminList() {
    document.getElementById('adminList').innerHTML = products.map(p => `
        <div style="display:flex; align-items:center; gap:10px; margin-bottom:8px; font-size:12px">
            <img src="${p.image_url}" width="30">
            <span style="flex:1">${p.title}</span>
            <button onclick="del('${p.id}')" style="color:red; background:none; border:none; cursor:pointer">Excluir</button>
        </div>
    `).join('');
}

window.del = async (id) => {
    if(confirm("Excluir?")) {
        await _supabase.from('produtos').delete().eq('id', id);
        location.reload();
    }
};

function closeAdmin() { document.getElementById('adminModal').classList.remove('active'); }
function checkSession() { 
    _supabase.auth.getUser().then(({data}) => { 
        if(data.user) document.getElementById('logoutBtn').style.display = 'block'; 
    }); 
}
document.getElementById('logoutBtn').onclick = () => { _supabase.auth.signOut().then(() => location.reload()); };
document.getElementById('searchInput').oninput = render;

init();
</script>
</body>
</html>
