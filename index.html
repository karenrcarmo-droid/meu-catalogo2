<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kn2 Catálogo | Oficial</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --bg: #0b0f17; --card: #111827; --text: #e5e7eb;
      --muted: #9ca3af; --border: rgba(255,255,255,.08);
      --accent: #22c55e; --danger: #ef4444;
    }
    * { margin:0; padding:0; box-sizing:border-box; font-family:system-ui; }
    body { background:var(--bg); color:var(--text); min-height: 100vh; display: flex; flex-direction: column; }
    .container { width:min(1200px,92vw); margin:auto; flex: 1; }

    /* TOPBAR */
    .topbar { position:sticky; top:0; z-index:1000; backdrop-filter:blur(10px); background:rgba(11,15,23,.9); border-bottom:1px solid var(--border); padding:16px 0; }
    .topbar__inner { display:flex; align-items:center; justify-content:space-between; }
    
    /* HERO */
    .hero { text-align:center; padding:30px 0; }
    #mainLogo { max-width:220px; border-radius:15px; min-height: 50px; background: rgba(255,255,255,0.05); }

    /* GRID & CARDS */
    .categoryBlock { margin-bottom:40px; }
    .categoryHeading { margin-bottom:18px; border-bottom:1px solid var(--border); padding-bottom:10px; font-size:22px; color: var(--accent); }
    .productsGrid { display:grid; grid-template-columns:repeat(auto-fill,minmax(240px,1fr)); gap:16px; }
    .card { background:var(--card); border-radius:18px; overflow:hidden; border:1px solid var(--border); display:flex; flex-direction:column; }
    .productImage { width:100%; height:240px; object-fit:cover; }
    .card__body { padding:16px; flex:1; }

    /* CARRINHO */
    .cartSidebar { position:fixed; top:0; right:-420px; width:420px; max-width:100%; height:100vh; background:#111827; z-index:99999; border-left:1px solid var(--border); transition:.3s; display:flex; flex-direction:column; }
    .cartSidebar.active { right:0; }

    /* MODAIS */
    .modal { position:fixed; inset:0; background:rgba(0,0,0,.85); display:none; justify-content:center; align-items:center; z-index:9999; backdrop-filter:blur(5px); }
    .modal.active { display:flex; }
    .modal__content { width:min(700px,92vw); max-height:90vh; overflow:auto; background:#111827; border-radius:20px; padding:24px; border:1px solid var(--border); }

    /* FOOTER */
    .siteFooter { margin-top:48px; padding:24px 16px; border-top:1px solid var(--border); background:#0b0f17; }
    .siteFooter__inner { max-width:1200px; margin:0 auto; display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; color:var(--muted); font-size:14px; }

    .btn { border:none; cursor:pointer; border-radius:12px; padding:12px 16px; color:white; font-weight:700; transition:.2s; display:inline-flex; align-items:center; gap:8px; }
    .btn-primary { background:var(--accent); }
    .btn-dark { background:#1f2937; }
    input, select { width:100%; padding:12px; border-radius:10px; border:1px solid var(--border); background:#0f172a; color:white; margin-top:8px; }
  </style>
</head>
<body>

  <header class="topbar">
    <div class="container topbar__inner">
      <div style="font-size:24px; font-weight:900">Kn2 Catálogo</div>
      <div style="display:flex; gap:10px">
        <button class="btn btn-primary" onclick="toggleCart()">🛒 <span id="cartCount">0</span></button>
        <button class="btn btn-dark" id="adminControlBtn">Painel Admin</button>
        <button class="btn btn-dark" id="logoutBtn" style="display:none" onclick="handleLogout()">Sair</button>
      </div>
    </div>
  </header>

  <main class="container">
    <section class="hero"><img src="" id="mainLogo" alt="Logo Kn2"></section>
    
    <div id="menuRow" style="display:flex; gap:10px; overflow-x:auto; padding-bottom:20px"></div>
    
    <input type="text" id="searchInput" placeholder="Pesquisar produto..." oninput="handleSearch(this.value)">

    <div id="catalogContainer"></div>
  </main>

  <div class="modal" id="loginModal">
    <div class="modal__content">
      <h2 style="margin-bottom:20px">Acesso Restrito</h2>
      <input type="email" id="email" placeholder="E-mail">
      <input type="password" id="password" placeholder="Senha">
      <button class="btn btn-primary" style="width:100%; margin-top:20px; justify-content:center" onclick="handleLogin()">Entrar</button>
      <button class="btn btn-dark" style="width:100%; margin-top:10px; justify-content:center" onclick="closeModal('loginModal')">Cancelar</button>
    </div>
  </div>

  <div class="modal" id="adminModal">
    <div class="modal__content">
      <h2>Painel de Gestão</h2>
      
      <div style="background:rgba(255,255,255,0.03); padding:15px; border-radius:12px; margin:20px 0; border:1px solid var(--border)">
        <h4 style="color:var(--accent)">Trocar Logo</h4>
        <input type="file" id="logoFile" accept="image/*">
        <button class="btn btn-primary" style="margin-top:10px; width:100%; justify-content:center" onclick="uploadLogo()">Salvar Nova Logo</button>
      </div>

      <div style="background:rgba(255,255,255,0.03); padding:15px; border-radius:12px; border:1px solid var(--border)">
        <h4>Novo Produto</h4>
        <input type="text" id="pTitle" placeholder="Nome do Produto">
        <select id="pCat"></select>
        <input type="number" id="pPrice" placeholder="Preço" step="0.01">
        <input type="file" id="pImage" accept="image/*">
        <button class="btn btn-primary" style="margin-top:15px; width:100%; justify-content:center" onclick="saveProduct()">Guardar Produto</button>
      </div>

      <button class="btn btn-dark" style="width:100%; margin-top:20px; justify-content:center" onclick="closeModal('adminModal')">Fechar</button>
    </div>
  </div>

  <aside class="cartSidebar" id="cartSidebar">
    <div style="padding:20px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between">
      <h2>Carrinho</h2>
      <button class="btn" onclick="toggleCart()">✕</button>
    </div>
    <div id="cartItems" style="flex:1; overflow:auto; padding:20px"></div>
    <div style="padding:20px; border-top:1px solid var(--border)">
        <div style="display:flex; justify-content:space-between; font-size:20px; font-weight:900; margin-bottom:15px">
            <span>Total:</span> <span id="cartTotal" style="color:var(--accent)">R$ 0,00</span>
        </div>
        <button class="btn btn-primary" style="width:100%; justify-content:center" onclick="sendWhatsApp()">Finalizar Pedido</button>
    </div>
  </aside>

  <footer class="siteFooter">
    <div class="siteFooter__inner">
      <p>&copy; <span id="year"></span> Kn2 Personalizados</p>
      <a href="https://www.instagram.com/arteskn2" target="_blank" style="color:var(--accent); text-decoration:none">@arteskn2</a>
    </div>
  </footer>

  <script>
    const SUPABASE_URL = "https://kdoxzjdvpbdwpzyaqary.supabase.co";
    const SUPABASE_KEY = "sb_publishable_4WrcBi_Cy8yRg8v0D3_BQw_1XuBID4V";
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let products = [], cart = [], activeCat = "Todos", searchQuery = "";

    async function init() {
      document.getElementById('year').textContent = new Date().getFullYear();
      await loadLogo();
      await fetchProducts();
      checkAuth();
    }

    async function loadLogo() {
      const { data } = await _supabase.from('configuracoes_site').select('logo_url').eq('id', 'config_geral').single();
      if (data) document.getElementById('mainLogo').src = data.logo_url;
    }

    async function fetchProducts() {
      const { data } = await _supabase.from('produtos').select('*').order('category');
      products = data || [];
      renderMenu();
      renderGrid();
      const cats = [...new Set(products.map(p => p.category))];
      document.getElementById('pCat').innerHTML = cats.map(c => `<option value="${c}">${c}</option>`).join('');
    }

    function renderMenu() {
      const cats = ["Todos", ...new Set(products.map(p => p.category))];
      document.getElementById('menuRow').innerHTML = cats.map(c => `
        <button class="btn ${c === activeCat ? 'btn-primary' : 'btn-dark'}" onclick="filterCat('${c}')">${c}</button>
      `).join('');
    }

    window.filterCat = (c) => { activeCat = c; renderMenu(); renderGrid(); };

    function renderGrid() {
      const filtered = products.filter(p => (activeCat === "Todos" || p.category === activeCat) && p.title.toLowerCase().includes(searchQuery.toLowerCase()));
      const container = document.getElementById('catalogContainer');
      container.innerHTML = "";
      
      const grouped = filtered.reduce((acc, p) => { (acc[p.category] = acc[p.category] || []).push(p); return acc; }, {});

      for (const cat in grouped) {
        container.innerHTML += `<div class="categoryBlock"><h2 class="categoryHeading">${cat}</h2><div class="productsGrid">
          ${grouped[cat].map(p => `<div class="card">
            <img src="${p.image_url}" class="productImage">
            <div class="card__body">
              <strong>${p.title}</strong><br>
              <span style="color:var(--accent); font-weight:900">R$ ${p.price.toFixed(2)}</span>
              <button class="btn btn-primary" style="width:100%; margin-top:10px; justify-content:center" onclick="addToCart('${p.id}')">Adicionar</button>
            </div>
          </div>`).join('')}
        </div></div>`;
      }
    }

    // AUTH & LOGO
    document.getElementById('adminControlBtn').onclick = async () => {
      const { data: { user } } = await _supabase.auth.getUser();
      if (user) document.getElementById('adminModal').classList.add('active');
      else document.getElementById('loginModal').classList.add('active');
    };

    async function handleLogin() {
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const { error } = await _supabase.auth.signInWithPassword({ email, password });
      if (error) alert("Erro: " + error.message); else location.reload();
    }

    async function uploadLogo() {
      const file = document.getElementById('logoFile').files[0];
      if (!file) return alert("Selecione uma imagem");
      const path = `sistema/logo_${Date.now()}.jpg`;
      const { error } = await _supabase.storage.from('imagens-produtos').upload(path, file);
      if (!error) {
        const { data: { publicUrl } } = _supabase.storage.from('imagens-produtos').getPublicUrl(path);
        await _supabase.from('configuracoes_site').update({ logo_url: publicUrl }).eq('id', 'config_geral');
        location.reload();
      }
    }

    // CARRINHO
    function addToCart(id) {
        const p = products.find(x => x.id == id);
        const exists = cart.find(i => i.id == id);
        if (exists) exists.qty++; else cart.push({...p, qty: 1});
        updateCart();
        toggleCart(true);
    }

    function updateCart() {
        let total = 0;
        document.getElementById('cartItems').innerHTML = cart.map(i => {
            total += i.price * i.qty;
            return `<div style="display:flex; gap:10px; margin-bottom:10px"><img src="${i.image_url}" width="50" style="border-radius:5px">
            <div><b>${i.title}</b><br>${i.qty}x R$ ${i.price.toFixed(2)}</div></div>`;
        }).join('');
        document.getElementById('cartTotal').textContent = `R$ ${total.toFixed(2)}`;
        document.getElementById('cartCount').textContent = cart.reduce((a, b) => a + b.qty, 0);
    }

    function toggleCart(s) { document.getElementById('cartSidebar').classList.toggle('active', s); }
    window.closeModal = (id) => document.getElementById(id).classList.remove('active');
    window.handleSearch = (v) => { searchQuery = v; renderGrid(); };
    async function checkAuth() { const { data } = await _supabase.auth.getUser(); if(data.user) document.getElementById('logoutBtn').style.display="block"; }
    async function handleLogout() { await _supabase.auth.signOut(); location.reload(); }

    init();
  </script>
</body>
</html>
