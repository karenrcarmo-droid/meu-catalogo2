<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kn2 Personalizados - Catálogo</title>
  <style>
    :root {
      --bg: #0b0f17; --card: #111827; --text: #e5e7eb;
      --muted: #9ca3af; --border: rgba(255, 255, 255, .08);
      --accent: #22c55e; --danger: #ef4444; --edit: #2563eb;
    }
    * { box-sizing: border-box; }
    body { margin: 0; background: var(--bg); color: var(--text); font-family: system-ui, -apple-system, sans-serif; }
    .container { width: min(1100px, 92vw); margin: auto; }
    
    /* TOPO */
    .topbar { position: sticky; top: 0; z-index: 999; background: rgba(11, 15, 23, .92); backdrop-filter: blur(8px); border-bottom: 1px solid var(--border); }
    .topbar__inner { padding: 14px 0; display: flex; justify-content: space-between; align-items: center; }
    .brand { margin: 0; font-size: 20px; }
    .adminBtn { border: none; background: var(--accent); color: white; padding: 10px 14px; border-radius: 10px; cursor: pointer; font-weight: bold; }

    /* MENU CATEGORIAS */
    .menu { margin-top: 20px; }
    .menu__row { display: flex; gap: 10px; flex-wrap: wrap; }
    .menu__btn { border: 1px solid var(--border); background: transparent; color: white; padding: 10px 14px; border-radius: 999px; cursor: pointer; }
    .menu__btn.active { background: rgba(34, 197, 94, .15); border-color: var(--accent); color: var(--accent); }

    /* GRID */
    .categoryBlock { margin-bottom: 40px; }
    .categoryHeading { font-size: 24px; margin: 20px 0; padding-bottom: 10px; border-bottom: 1px solid var(--border); }
    .productsGrid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 14px; }
    .card { overflow: hidden; border-radius: 18px; background: var(--card); border: 1px solid var(--border); display: flex; flex-direction: column; }
    .productImage { width: 100%; height: 220px; object-fit: cover; cursor: zoom-in; background: #1f2937; }
    .card__body { padding: 14px; flex-grow: 1; display: flex; flex-direction: column; }
    .card__title { margin: 0 0 10px; font-size: 18px; }
    .buyBtn { width: 100%; border: none; background: var(--accent); color: white; padding: 12px; border-radius: 12px; font-weight: bold; cursor: pointer; }

    /* MODAIS */
    .modal { position: fixed; inset: 0; background: rgba(0,0,0,.85); display: none; justify-content: center; align-items: center; z-index: 10000; padding: 20px; }
    .modal.active { display: flex; }
    .modal__content { width: min(450px, 100%); background: #111827; border-radius: 20px; padding: 25px; border: 1px solid var(--border); position: relative; }
    
    /* PREVIEW ESPECÍFICO */
    #previewModal { background: rgba(0,0,0,.95); cursor: zoom-out; }
    #previewModal img { max-width: 100%; max-height: 90vh; border-radius: 8px; object-fit: contain; }

    .formGroup { margin-bottom: 15px; }
    .formGroup label { display: block; margin-bottom: 5px; color: var(--muted); font-size: 14px; }
    .formGroup input { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid var(--border); background: #0f172a; color: white; outline: none; }
    .formGroup input:focus { border-color: var(--accent); }
    
    .saveBtn { width: 100%; border: none; background: var(--accent); color: white; padding: 13px; border-radius: 12px; font-weight: bold; cursor: pointer; margin-top: 10px; }
    .closeBtn { width: 100%; border: none; background: #374151; color: white; padding: 12px; border-radius: 12px; cursor: pointer; margin-top: 10px; }
    
    #adminList { margin-top: 20px; max-height: 200px; overflow-y: auto; }
    .adminItem { display: flex; gap: 10px; align-items: center; background: #0f172a; padding: 8px; border-radius: 10px; margin-bottom: 8px; border: 1px solid var(--border); }
    .adminItem img { width: 40px; height: 40px; object-fit: cover; border-radius: 5px; }
    .dangerBtn { background: var(--danger); color: white; border: none; padding: 6px 10px; border-radius: 6px; cursor: pointer; font-size: 12px; }

    @media(max-width:600px) { .productsGrid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>

  <header class="topbar">
    <div class="container topbar__inner">
      <h1 class="brand">Kn2 Personalizados</h1>
      <button class="adminBtn" id="openLoginBtn">Admin</button>
    </div>
  </header>

  <main class="container">
    <section class="menu"><div class="menu__row" id="menuRow"></div></section>
    <section id="catalogContainer"></section>
  </main>

  <div class="modal" id="loginModal">
    <div class="modal__content">
      <h2 style="margin-top:0">Acesso Restrito</h2>
      <div class="formGroup">
        <label>Senha do Administrador</label>
        <input type="password" id="adminPassInput" placeholder="Digite a senha...">
      </div>
      <button class="saveBtn" id="doLoginBtn">Entrar</button>
      <button class="closeBtn" onclick="closeModal('loginModal')">Cancelar</button>
    </div>
  </div>

  <div class="modal" id="adminModal">
    <div class="modal__content">
      <h2 style="margin-top:0">Novo Produto</h2>
      <div class="formGroup">
        <label>Nome do Produto</label>
        <input type="text" id="pTitle">
      </div>
      <div class="formGroup">
        <label>Categoria</label>
        <input type="text" id="pCategory" placeholder="Ex: Canecas">
      </div>
      <div class="formGroup">
        <label>Preço (R$)</label>
        <input type="number" id="pPrice" step="0.01">
      </div>
      <div class="formGroup">
        <label>Nome do Arquivo na pasta /imagens</label>
        <input type="text" id="pFileName" placeholder="ex: foto1.jpg">
      </div>
      <button class="saveBtn" id="saveBtn">Salvar no Catálogo</button>
      
      <div id="adminList"></div>
      
      <button class="closeBtn" onclick="closeModal('adminModal')">Sair do Painel</button>
    </div>
  </div>

  <div class="modal" id="previewModal" onclick="closeModal('previewModal')">
    <img id="imgFull" src="">
  </div>

  <script>
    const WHATSAPP = "5531999999999";
    const ADMIN_PASS = "1234"; // ALTRE A SENHA AQUI
    const STORAGE_KEY = "kn2_data_v2";

    let products = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
    let activeCategory = "Todos";

    function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(products)); }

    // Gerador de Cache Buster para forçar atualização da imagem no GitHub
    const cb = () => "?v=" + new Date().getTime();

    // Funções de Modal
    function openModal(id) { document.getElementById(id).classList.add('active'); }
    function closeModal(id) { document.getElementById(id).classList.remove('active'); }

    // LOGIN
    document.getElementById("openLoginBtn").onclick = () => openModal('loginModal');
    
    document.getElementById("doLoginBtn").onclick = () => {
      const pass = document.getElementById("adminPassInput").value;
      if(pass === ADMIN_PASS) {
        closeModal('loginModal');
        openModal('adminModal');
        renderAdminList();
        document.getElementById("adminPassInput").value = "";
      } else {
        alert("Senha Incorreta!");
      }
    };

    // RENDERIZAÇÃO
    function renderMenu() {
      const menu = document.getElementById("menuRow");
      const categories = ["Todos", ...new Set(products.map(p => p.category))];
      menu.innerHTML = categories.map(cat => `
        <button class="menu__btn ${cat === activeCategory ? 'active' : ''}" 
                onclick="setCategory('${cat}')">${cat}</button>
      `).join("");
    }

    function setCategory(cat) {
      activeCategory = cat;
      renderMenu();
      renderGrid();
    }

    function renderGrid() {
      const container = document.getElementById("catalogContainer");
      container.innerHTML = "";
      
      const filtered = activeCategory === "Todos" ? products : products.filter(p => p.category === activeCategory);
      const grouped = {};
      filtered.forEach(p => {
        if (!grouped[p.category]) grouped[p.category] = [];
        grouped[p.category].push(p);
      });

      for (let cat in grouped) {
        const section = document.createElement("div");
        section.className = "categoryBlock";
        section.innerHTML = `<h2 class="categoryHeading">${cat}</h2><div class="productsGrid"></div>`;
        
        grouped[cat].forEach(p => {
          const card = document.createElement("div");
          card.className = "card";
          const imgUrl = p.image + cb();

          card.innerHTML = `
            <img class="productImage" src="${imgUrl}" alt="Foto" onclick="openPreview('${imgUrl}')"
                 onerror="this.src='https://via.placeholder.com/400x400?text=Sem+Foto'">
            <div class="card__body">
              <h3 class="card__title">${p.title}</h3>
              <div style="margin-bottom:12px"><strong>R$ ${parseFloat(p.price).toFixed(2)}</strong></div>
              <button class="buyBtn" onclick="buy('${p.title}')">WhatsApp</button>
            </div>
          `;
          section.querySelector(".productsGrid").appendChild(card);
        });
        container.appendChild(section);
      }
    }

    // PREVIEW DA FOTO
    window.openPreview = (url) => {
      document.getElementById("imgFull").src = url;
      openModal('previewModal');
    };

      const msg = encodeURIComponent(`Olá! Tenho interesse no produto: ${name}`);
      window.open(`https://wa.me/${WHATSAPP}?text=${msg}`, "_blank");
    }

    // AÇÕES ADMIN

      const price = document.getElementById("pPrice").
