<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kn2 Personalizados | Catálogo Profissional</title>
    <meta name="theme-color" content="#0b0f17">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg: #0b0f17; --card: #111827; --text: #e5e7eb;
            --muted: #9ca3af; --border: rgba(255,255,255,.08);
            --accent: #22c55e; --danger: #ef4444;
        }
        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background: var(--bg); color: var(--text); line-height: 1.6; }
        .container { width: min(1200px, 92vw); margin: auto; }

        /* HEADER */
        .header { position: sticky; top:0; z-index: 1000; background: rgba(11,15,23,0.8); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); }
        .header-inner { padding: 15px 0; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 22px; font-weight: 800; background: linear-gradient(to right, #22c55e, #10b981); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        /* BUTTONS */
        .btn { border: none; cursor: pointer; border-radius: 10px; padding: 10px 20px; color: white; font-weight: 600; transition: 0.2s; display: inline-flex; align-items: center; gap: 8px; text-decoration: none; }
        .btn:hover { transform: translateY(-2px); opacity: 0.9; }
        .btn-primary { background: var(--accent); }
        .btn-dark { background: #1f2937; }
        .btn-danger { background: var(--danger); }

        /* FILTERS & SEARCH */
        .controls { margin: 30px 0; }
        .filter-row { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 20px; }
        .filter-btn { background: var(--card); border: 1px solid var(--border); color: var(--muted); padding: 8px 18px; border-radius: 20px; cursor: pointer; }
        .filter-btn.active { background: var(--accent); color: white; border-color: var(--accent); }
        .search-input { width: 100%; padding: 15px; border-radius: 12px; border: 1px solid var(--border); background: var(--card); color: white; outline: none; }
        .search-input:focus { border-color: var(--accent); }

        /* GRID */
        .category-title { font-size: 20px; margin: 40px 0 20px; display: flex; align-items: center; gap: 15px; }
        .category-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 20px; }
        .card { background: var(--card); border-radius: 16px; border: 1px solid var(--border); overflow: hidden; transition: 0.3s; display: flex; flex-direction: column; }
        .card:hover { border-color: var(--accent); transform: translateY(-5px); }
        .card-img { width: 100%; height: 260px; object-fit: cover; }
        .card-body { padding: 18px; flex: 1; display: flex; flex-direction: column; }
        .card-price { color: var(--accent); font-size: 20px; font-weight: 800; margin: 10px 0 15px; }

        /* MODAIS */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(6px); display: none; align-items: center; justify-content: center; z-index: 2000; padding: 20px; }
        .modal.active { display: flex; }
        .modal-content { background: var(--card); padding: 30px; border-radius: 24px; width: 100%; max-width: 600px; max-height: 90vh; overflow-y: auto; border: 1px solid var(--border); }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; color: var(--muted); font-size: 13px; margin-bottom: 5px; }
        .form-group input, .form-group select { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid var(--border); background: #0b0f17; color: white; }

        /* ADMIN LIST */
        .admin-item { display: flex; align-items: center; gap: 12px; padding: 10px; background: rgba(0,0,0,0.2); border-radius: 12px; margin-top: 10px; border: 1px solid var(--border); }
        .admin-item img { width: 45px; height: 45px; border-radius: 8px; object-fit: cover; }

        /* FOOTER */
        .footer { background: #080b11; border-top: 1px solid var(--border); padding: 60px 0 30px; margin-top: 80px; }
        .footer-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 40px; }
        .social-btn { display: inline-flex; align-items: center; gap: 10px; background: rgba(255,255,255,0.05); padding: 12px 20px; border-radius: 12px; color: white; text-decoration: none; transition: 0.3s; }
        .social-btn:hover { background: var(--accent); transform: translateY(-3px); }

        @media (max-width: 600px) { .grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <header class="header">
        <div class="container header-inner">
            <div class="logo">Kn2 Personalizados</div>
            <div style="display:flex; gap:10px">
                <button class="btn btn-dark" id="adminBtn">Painel</button>
                <button class="btn btn-danger" id="logoutBtn" style="display:none">Sair</button>
            </div>
        </div>
    </header>

    <main class="container">
        <div class="controls">
            <div class="filter-row" id="filterRow"></div>
            <input type="text" class="search-input" id="searchInput" placeholder="O que você procura hoje?">
        </div>
        <div id="catalogContent"></div>
    </main>

    <div class="modal" id="adminModal">
        <div class="modal-content">
            <h2 id="modalTitle" style="margin-bottom:20px">Novo Produto</h2>
            <input type="hidden" id="editId">
            <div class="form-group"><label>Título</label><input type="text" id="title"></div>
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:15px">
                <div class="form-group"><label>Categoria</label>
                    <select id="category">
                        <option value="Canecas">Canecas</option>
                        <option value="Botons">Botons</option>
                        <option value="Chaveiros">Chaveiros</option>
                        <option value="Outros">Outros</option>
                    </select>
                </div>
                <div class="form-group"><label>Preço (R$)</label><input type="number" id="price" step="0.01"></div>
            </div>
            <div class="form-group"><label>URL da Imagem</label><input type="text" id="imageUrl"></div>
            <div style="display:flex; gap:10px">
                <button class="btn btn-primary" style="flex:1" id="saveBtn">Salvar</button>
                <button class="btn btn-dark" onclick="closeAdmin()">Fechar</button>
            </div>
            <div id="adminList" style="margin-top:30px"></div>
        </div>
    </div>

    <div class="modal" id="loginModal">
        <div class="modal-content" style="max-width:380px">
            <h2 style="margin-bottom:20px">Acesso Restrito</h2>
            <div class="form-group"><label>E-mail</label><input type="email" id="email"></div>
            <div class="form-group"><label>Senha</label><input type="password" id="password"></div>
            <button class="btn btn-primary" style="width:100%" id="loginBtn">Entrar</button>
        </div>
    </div>

    <footer class="footer">
        <div class="container footer-grid">
            <div>
                <h3 style="margin-bottom:15px">Sobre Nós</h3>
                <p style="color:var(--muted); font-size:14px">Criamos produtos personalizados que contam histórias. Qualidade premium em sublimação e brindes.</p>
            </div>
            <div>
                <h3 style="margin-bottom:15px">Instagram</h3>
                <a href="https://www.instagram.com/arteskn2" target="_blank" class="social-btn">
                    <span>@arteskn2</span>
                </a>
            </div>
            <div>
                <h3 style="margin-bottom:15px">Atendimento</h3>
                <p style="color:var(--muted); font-size:14px">Belo Horizonte - MG<br>Segunda a Sexta: 09h às 18h</p>
            </div>
        </div>
        <div class="container" style="text-align:center; margin-top:50px; color:var(--muted); font-size:12px; border-top:1px solid var(--border); padding-top:20px">
            &copy; <span id="year"></span> Kn2 Personalizados.
        </div>
    </footer>

    <script>
        const SB_URL = "https://kdoxzjdvpbdwpzyaqary.supabase.co";
        const SB_KEY = "sb_publishable_4WrcBi_Cy8yRg8v0D3_BQw_1XuBID4V";
        const _supabase = supabase.createClient(SB_URL, SB_KEY);

        let products = [];
        let activeCat = "Todos";
        let query = "";

        async function init() {
            await loadProducts();
            checkUser();
            renderAll();
            document.getElementById('year').textContent = new Date().getFullYear();
        }

        async function loadProducts() {
            const { data } = await _supabase.from('produtos').select('*').order('created_at', {ascending:false});
            products = data || [];
        }

        function renderAll() {
            renderFilters();
            renderGrid();
        }

        function renderFilters() {
            const cats = ["Todos", ...new Set(products.map(p => p.category))];
            document.getElementById('filterRow').innerHTML = cats.map(c => `
                <button class="filter-btn ${c === activeCat ? 'active' : ''}" onclick="setCat('${c}')">${c}</button>
            `).join('');
        }

        function setCat(c) { activeCat = c; renderAll(); }

        function renderGrid() {
            const container = document.getElementById('catalogContent');
            const filtered = products.filter(p => (activeCat === "Todos" || p.category === activeCat) && p.title.toLowerCase().includes(query.toLowerCase()));
            
            const grouped = filtered.reduce((acc, p) => { (acc[p.category] = acc[p.category] || []).push(p); return acc; }, {});
            
            container.innerHTML = Object.entries(grouped).map(([cat, items]) => `
                <div class="category-block">
                    <h2 class="category-title">${cat}</h2>
                    <div class="grid">${items.map(p => `
                        <div class="card">
                            <img src="${p.image_url}" class="card-img">
                            <div class="card-body">
                                <h3>${p.title}</h3>
                                <div class="card-price">R$ ${p.price.toFixed(2).replace('.',',')}</div>
                                <a href="https://wa.me/5531999683959?text=Quero saber mais sobre: ${p.title}" target="_blank" class="btn btn-primary" style="justify-content:center">🛒 Comprar</a>
                            </div>
                        </div>
                    `).join('')}</div>
                </div>
            `).join('');
        }

        // --- ADMIN LOGIC ---
        async function checkUser() {
            const { data: { user } } = await _supabase.auth.getUser();
            if (user) {
                const { data: admin } = await _supabase.from('perfil_admin').select('email').eq('email', user.email).single();
                if (admin) {
                    document.getElementById('logoutBtn').style.display = 'block';
                    return true;
                }
            }
            return false;
        }

        document.getElementById('loginBtn').onclick = async () => {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const { error } = await _supabase.auth.signInWithPassword({ email, password });
            if (error) alert("Erro no login");
            else location.reload();
        };

        document.getElementById('logoutBtn').onclick = async () => { await _supabase.auth.signOut(); location.reload(); };

        document.getElementById('adminBtn').onclick = async () => {
            if (await checkUser()) {
                document.getElementById('adminModal').classList.add('active');
                renderAdminList();
            } else {
                document.getElementById('loginModal').classList.add('active');
            }
        };

        function renderAdminList() {
            document.getElementById('adminList').innerHTML = `<h3 style="margin-top:20px">Produtos Atuais</h3>` + products.map(p => `
                <div class="admin-item">
                    <img src="${p.image_url}">
                    <div style="flex:1"><strong>${p.title}</strong></div>
                    <button class="btn btn-primary" onclick="editProd('${p.id}')" style="padding:5px">✏️</button>
                    <button class="btn btn-danger" onclick="delProd('${p.id}')" style="padding:5px">🗑️</button>
                </div>
            `).join('');
        }

        window.editProd = (id) => {
            const p = products.find(x => x.id == id);
            document.getElementById('editId').value = p.id;
            document.getElementById('title').value = p.title;
            document.getElementById('category').value = p.category;
            document.getElementById('price').value = p.price;
            document.getElementById('imageUrl').value = p.image_url;
            document.getElementById('modalTitle').textContent = "Editar: " + p.title;
        };

        document.getElementById('saveBtn').onclick = async () => {
            const id = document.getElementById('editId').value;
            const payload = {
                title: document.getElementById('title').value,
                category: document.getElementById('category').value,
                price: parseFloat(document.getElementById('price').value),
                image_url: document.getElementById('imageUrl').value
            };

            const { error } = id ? await _supabase.from('produtos').update(payload).eq('id', id) : await _supabase.from('produtos').insert([payload]);

            if (error) alert("Erro ao salvar: Verifique se você é admin.");
            else {
                alert("Salvo com sucesso!");
                await loadProducts();
                renderAll();
                renderAdminList();
                closeAdmin();
            }
        };

        window.delProd = async (id) => {
            if (confirm("Excluir?")) {
                await _supabase.from('produtos').delete().eq('id', id);
                await loadProducts();
                renderAll();
                renderAdminList();
            }
        };

        function closeAdmin() { document.getElementById('adminModal').classList.remove('active'); document.getElementById('editId').value = ""; document.getElementById('modalTitle').textContent = "Novo Produto"; }
        document.getElementById('searchInput').oninput = (e) => { query = e.target.value; renderGrid(); };

        init();
    </script>
</body>
</html>
