<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kn2 Personalizados | Oficial</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg: #0b0f17; --card: #111827; --accent: #22c55e; --text: #f3f4f6; --border: rgba(255,255,255,.08); }
        body { background: var(--bg); color: var(--text); font-family: system-ui; margin: 0; }
        .container { width: min(1200px, 94vw); margin: auto; padding: 0 10px; }
        .topbar { position: sticky; top: 0; background: rgba(11,15,23,.9); backdrop-filter: blur(10px); border-bottom: 1px solid var(--border); padding: 15px 0; z-index: 1000; }
        .header-content { display: flex; justify-content: space-between; align-items: center; }
        .productsGrid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 20px; padding: 20px 0; }
        .card { background: var(--card); border-radius: 20px; border: 1px solid var(--border); overflow: hidden; position: relative; display: flex; flex-direction: column; }
        .productImage { width: 100%; height: 260px; object-fit: cover; cursor: pointer; }
        .btn { padding: 12px; border-radius: 12px; border: none; cursor: pointer; font-weight: bold; width: 100%; transition: .2s; }
        .btn-primary { background: var(--accent); color: #000; }
        .btn-dark { background: #1f2937; color: white; }
        .cat-nav { display: flex; gap: 10px; overflow-x: auto; padding: 15px 0; scrollbar-width: none; }
        .cat-btn { padding: 8px 15px; border-radius: 20px; border: 1px solid var(--border); background: transparent; color: white; cursor: pointer; white-space: nowrap; }
        .cat-btn.active { background: var(--accent); color: #000; }
    </style>
</head>
<body>

    <header class="topbar">
        <div class="container header-content">
            <div style="font-size: 22px; font-weight: 900;">Kn2 <span>Artes</span></div>
            <div style="display: flex; gap: 10px;">
                <button class="btn btn-dark" onclick="window.abrirAdmin()" style="width: auto;">⚙️ Admin</button>
                <button class="btn btn-primary" style="width: auto;">🛒 <span id="cartCount">0</span></button>
            </div>
        </div>
    </header>

    <main class="container">
        <div class="cat-nav" id="categoryNav"></div>
        <div id="catalogContainer" class="productsGrid">Carregando catálogo...</div>
    </main>

    <footer style="text-align: center; padding: 30px; opacity: 0.5; font-size: 12px;">
        Kn2 © 2024 | Visitas: <span id="visitCount">0</span>
    </footer>

    <script>
        // Use sua KEY real aqui
        const SUPABASE_URL = "https://kdoxzjdvpbdwpzyaqary.supabase.co";
        const SUPABASE_KEY = "sb_publishable_4WrcBi_Cy8yRg8v0D3_BQw_1XuBID4V"; 
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let products = [];
        let currentCat = "Todos";
        let cartItems = 0;

        async function init() {
            try {
                // 1. Tenta carregar produtos (Principal)
                const { data, error } = await _supabase.from('produtos').select('*').order('created_at', { ascending: false });
                if (error) throw error;
                products = data || [];
                
                renderCategories();
                renderGrid();
            } catch (err) {
                console.error("Erro ao carregar produtos:", err);
                document.getElementById('catalogContainer').innerHTML = "Erro ao conectar com o banco de dados.";
            }

            // 2. Tenta carregar visitas de forma ISOLADA (Se der erro 406, o site não trava)
            try {
                const { data } = await _supabase.from('estatisticas').select('visitas').eq('id', 1).single();
                if (data) {
                    const total = data.visitas + 1;
                    document.getElementById('visitCount').innerText = total;
                    await _supabase.from('estatisticas').update({ visitas: total }).eq('id', 1);
                }
            } catch (e) { console.warn("Tabela estatisticas indisponível."); }
        }

        function renderCategories() {
            const cats = ["Todos", ...new Set(products.map(p => p.category))];
            document.getElementById('categoryNav').innerHTML = cats.map(c => `
                <button class="cat-btn ${currentCat === c ? 'active' : ''}" onclick="window.filtrar('${c}')">${c}</button>
            `).join('');
        }

        function renderGrid() {
            const container = document.getElementById('catalogContainer');
            const filtrados = products.filter(p => currentCat === "Todos" || p.category === currentCat);
            
            if (filtrados.length === 0) {
                container.innerHTML = "<p>Nenhum produto nesta categoria.</p>";
                return;
            }

            container.innerHTML = filtrados.map(p => `
                <div class="card">
                    <div style="position:absolute; top:10px; right:10px; background:rgba(0,0,0,0.6); padding:5px 10px; border-radius:15px; cursor:pointer;" onclick="window.darLike('${p.id}', ${p.likes || 0})">
                        ❤️ ${p.likes || 0}
                    </div>
                    <img src="${p.image_url}" class="productImage" onclick="window.open('${p.image_url}')">
                    <div style="padding:15px; flex-grow:1; display:flex; flex-direction:column;">
                        <h4 style="margin:0 0 10px 0;">${p.title || 'Sem título'}</h4>
                        <div style="color:var(--accent); font-size:20px; font-weight:900; margin-bottom:15px;">
                            R$ ${(p.price || 0).toFixed(2).replace('.', ',')}
                        </div>
                        <button class="btn btn-primary" onclick="window.addCarrinho('${p.id}')">Adicionar Pedido</button>
                    </div>
                </div>
            `).join('');
        }

        // --- FUNÇÕES GLOBAIS (USANDO WINDOW PARA GARANTIR QUE O HTML AS VEJA) ---

        window.filtrar = (cat) => {
            currentCat = cat;
            renderCategories();
            renderGrid();
        };

        window.addCarrinho = (id) => {
            const p = products.find(x => x.id === id);
            if (!p) return;
            
            cartItems++;
            document.getElementById('cartCount').innerText = cartItems;
            
            // Feedback visual no botão
            const btn = event.target;
            btn.innerText = "✅ ADICIONADO";
            setTimeout(() => btn.innerText = "Adicionar Pedido", 1000);

            if(confirm(`Deseja enviar o pedido de "${p.title}" para o WhatsApp?`)) {
                const msg = encodeURIComponent(`Olá! Gostaria de pedir: ${p.title} - R$ ${p.price.toFixed(2)}`);
                window.open(`https://wa.me/5531999683959?text=${msg}`);
            }
        };

        window.darLike = async (id, current) => {
            try {
                // Atualiza visual primeiro (rápido)
                event.currentTarget.innerText = `❤️ ${current + 1}`;
                await _supabase.from('produtos').update({ likes: current + 1 }).eq('id', id);
            } catch (e) { console.error("Erro no Like"); }
        };

        window.abrirAdmin = () => {
            const pass = prompt("Senha Administrativa:");
            if(pass === "admin123") { // Altere para sua senha ou use Supabase Auth
                alert("Acesso ao painel liberado (Em desenvolvimento)");
            } else {
                alert("Senha incorreta.");
            }
        };

        init();
    </script>
</body>
</html>
