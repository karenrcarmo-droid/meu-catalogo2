<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kn2 Personalizados | Premium</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg: #0b0f17; --card: rgba(255, 255, 255, 0.03); 
            --muted: #9ca3af; --text: #f3f4f6;
            --border: rgba(255, 255, 255, 0.08); --accent: #22c55e; 
            --danger: #ef4444; --glass: blur(12px);
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: #1f2937; border-radius: 10px; }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', system-ui, sans-serif; }
        .container { width: min(1200px, 94vw); margin: auto; }
        
        /* HEADER */
        .topbar { position: sticky; top: 0; z-index: 1000; background: rgba(11, 15, 23, 0.7); backdrop-filter: var(--glass); border-bottom: 1px solid var(--border); padding: 14px 0; }
        .topbar__inner { display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 22px; font-weight: 900; color: #fff; text-decoration: none; }
        .logo span { color: var(--accent); }

        /* CATEGORIAS */
        .cat-nav { display: flex; gap: 10px; overflow-x: auto; padding: 15px 0; margin-bottom: 20px; scrollbar-width: none; }
        .cat-nav::-webkit-scrollbar { display: none; }
        .cat-btn { padding: 8px 18px; border-radius: 20px; border: 1px solid var(--border); background: var(--card); color: var(--text); cursor: pointer; white-space: nowrap; transition: 0.3s; }
        .cat-btn.active { background: var(--accent); border-color: var(--accent); color: #000; font-weight: bold; }

        /* BOTÕES */
        .btn { border: none; cursor: pointer; border-radius: 12px; padding: 10px 18px; font-weight: 700; transition: 0.3s; display: inline-flex; align-items: center; gap: 8px; color: white; text-decoration: none; }
        .btn-primary { background: var(--accent); color: #000; }
        .btn-dark { background: rgba(255,255,255,0.05); border: 1px solid var(--border); }
        
        /* GRID */
        .productsGrid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 25px; }
        .card { background: var(--card); border-radius: 24px; border: 1px solid var(--border); overflow: hidden; backdrop-filter: var(--glass); transition: 0.4s; }
        .card:hover { transform: translateY(-8px); border-color: var(--accent); }
        .img-container { width: 100%; height: 260px; overflow: hidden; }
        .productImage { width: 100%; height: 100%; object-fit: cover; transition: 0.6s; cursor: pointer; }
        .card:hover .productImage { transform: scale(1.1); }
        .card__body { padding: 20px; }

        /* SIDEBARS & MODAIS */
        .cartSidebar { position: fixed; top: 0; right: -450px; width: 420px; max-width: 100%; height: 100vh; background: rgba(11, 15, 23, 0.98); z-index: 2000; transition: 0.4s; border-left: 1px solid var(--border); backdrop-filter: blur(20px); display: flex; flex-direction: column; }
        .cartSidebar.active { right: 0; }
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; align-items: center; justify-content: center; z-index: 3000; padding: 20px; backdrop-filter: blur(10px); }
        .modal.active { display: flex; }
        .modal__content { background: #111827; padding: 30px; border-radius: 28px; width: min(500px, 100%); max-height: 90vh; overflow-y: auto; border: 1px solid var(--border); }

        input { background: rgba(255,255,255,0.03); border: 1px solid var(--border); color: #fff; padding: 12px; border-radius: 12px; width: 100%; margin-bottom: 10px; }

        footer { text-align: center; padding: 40px 0; border-top: 1px solid var(--border); margin-top: 50px; opacity: 0.7; }
    </style>
</head>
<body>

    <header class="topbar">
        <div class="container topbar__inner">
            <a href="#" class="logo">Kn2 <span>Personalizados</span></a>
            <div style="display: flex; gap: 10px;">
                <a href="https://www.instagram.com/arteskn2?igsh=bmpsYW9kdHgzdzlp" target="_blank" class="btn btn-dark" style="padding: 10px;">📸</a>
                <button class="btn btn-dark" onclick="toggleCart()">🛒 <span id="cartCount">0</span></button>
                <button class="btn btn-primary" id="adminBtn">Gerenciar</button>
            </div>
        </div>
    </header>

    <main class="container">
        <div style="margin-top: 20px;">
            <input type="text" id="searchInput" placeholder="Buscar produto...">
        </div>

        <div class="cat-nav" id="categoryNav"></div>

        <div id="catalogContainer"></div>
    </main>

    <div class="cartSidebar" id="cartSidebar">
        <div style="padding: 25px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between;">
            <h3>Meu Carrinho</h3>
            <button onclick="toggleCart()" class="btn btn-dark">✕</button>
        </div>
        <div id="cartItems" style="flex:1; overflow-y:auto; padding: 20px;"></div>
        <div style="padding: 25px; border-top: 1px solid var(--border);">
            <div style="display: flex; justify-content: space-between; margin-bottom: 20px;">
                <span>Total:</span>
                <span id="cartTotal" style="color:var(--accent); font-weight:900; font-size:1.4rem;">R$ 0,00</span>
            </div>
            <button class="btn btn-primary" style="width: 100%;" onclick="sendWhatsApp()">Finalizar Pedido</button>
        </div>
    </div>

    <div class="modal" id="adminModal">
        <div class="modal__content">
            <h3 id="adminModalTitle">Adicionar Produto</h3>
            <div style="margin-top: 15px;">
                <input type="hidden" id="editId">
                <input type="text" id="pTitle" placeholder="Nome">
                <input type="text" id="pCat" placeholder="Categoria">
                <input type="number" id="pPrice" placeholder="Preço">
                <input type="file" id="pImage">
                <button class="btn btn-primary" id="saveBtn" style="width: 100%;">Salvar Produto</button>
                <button class="btn btn-dark" onclick="closeAdmin()" style="width: 100%; margin-top: 10px;">Cancelar</button>
            </div>
            <div id="adminList" style="margin-top: 30px; border-top: 1px solid var(--border); padding-top: 20px;"></div>
        </div>
    </div>

    <div class="modal" id="zoomModal" onclick="this.classList.remove('active')">
        <img id="zoomImg" src="" style="max-width: 90%; max-height: 80vh; border-radius: 20px;">
    </div>

    <footer>
        <p>Kn2 Personalizados © 2024</p>
        <div style="margin: 15px 0;">
            <a href="https://www.instagram.com/arteskn2?igsh=bmpsYW9kdHgzdzlp" target="_blank" style="color: var(--accent); text-decoration: none;">Siga-nos no Instagram</a>
        </div>
        <p style="font-size: 12px; color: var(--muted);">Visitantes: <span id="visitorCount">0</span></p>
    </footer>

    <script>
        const SUPABASE_URL = "https://kdoxzjdvpbdwpzyaqary.supabase.co";
        const SUPABASE_KEY = "sb_publishable_4WrcBi_Cy8yRg8v0D3_BQw_1XuBID4V";
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let products = [];
        let cart = JSON.parse(localStorage.getItem("cart")) || [];
        let query = "";
        let currentCat = "Todos";

        async function init() {
            updateVisitorCount();
            await loadProducts();
            setupRealtime();
            renderCategories();
            renderGrid();
            updateCartUI();
        }

        // CONTADOR DE VISITANTES (Simulado)
        function updateVisitorCount() {
            let count = localStorage.getItem("visitas") || 1420;
            count = parseInt(count) + 1;
            localStorage.setItem("visitas", count);
            document.getElementById('visitorCount').innerText = count.toLocaleString();
        }

        async function loadProducts() {
            const { data } = await _supabase.from('produtos').select('*').order('created_at', { ascending: false });
            products = data || [];
        }

        function setupRealtime() {
            _supabase.channel('db').on('postgres_changes', { event: '*', schema: 'public', table: 'produtos' }, () => {
                loadProducts().then(() => { renderCategories(); renderGrid(); });
            }).subscribe();
        }

        function renderCategories() {
            const nav = document.getElementById('categoryNav');
            const cats = ["Todos", ...new Set(products.map(p => p.category))];
            nav.innerHTML = cats.map(c => `
                <button class="cat-btn ${currentCat === c ? 'active' : ''}" onclick="filterCat('${c}')">${c}</button>
            `).join('');
        }

        function filterCat(c) {
            currentCat = c;
            renderCategories();
            renderGrid();
        }

        function renderGrid() {
            const container = document.getElementById('catalogContainer');
            container.innerHTML = "";
            
            const filtered = products.filter(p => 
                (currentCat === "Todos" || p.category === currentCat) &&
                p.title.toLowerCase().includes(query.toLowerCase())
            );

            const catsInGrid = [...new Set(filtered.map(p => p.category))];
            catsInGrid.forEach(cat => {
                const section = document.createElement('div');
                section.innerHTML = `<h2 style="margin: 40px 0 20px; font-size: 18px; color: var(--accent)">${cat}</h2>`;
                const grid = document.createElement('div');
                grid.className = 'productsGrid';
                
                filtered.filter(p => p.category === cat).forEach(p => {
                    grid.innerHTML += `
                        <div class="card">
                            <div class="img-container"><img src="${p.image_url}" class="productImage" onclick="openZoom('${p.image_url}')"></div>
                            <div class="card__body">
                                <h4 style="margin-bottom:10px">${p.title}</h4>
                                <div style="display:flex; justify-content:space-between; align-items:center">
                                    <span style="font-weight:900; color:var(--accent)">R$ ${p.price.toFixed(2)}</span>
                                    <button class="btn btn-primary" onclick="addToCart('${p.id}')">Add</button>
                                </div>
                            </div>
                        </div>`;
                });
                section.appendChild(grid);
                container.appendChild(section);
            });
        }

        // --- FUNÇÕES DE ADMIN COM EDIÇÃO ---
        function openEdit(id) {
            const p = products.find(prod => prod.id == id);
            document.getElementById('editId').value = p.id;
            document.getElementById('pTitle').value = p.title;
            document.getElementById('pCat').value = p.category;
            document.getElementById('pPrice').value = p.price;
            document.getElementById('adminModalTitle').innerText = "Editar Produto";
            document.getElementById('saveBtn').innerText = "Atualizar Produto";
        }

        function closeAdmin() {
            document.getElementById('adminModal').classList.remove('active');
            document.getElementById('editId').value = "";
            document.getElementById('pTitle').value = "";
            document.getElementById('adminModalTitle').innerText = "Adicionar Produto";
            document.getElementById('saveBtn').innerText = "Salvar Produto";
        }

        document.getElementById('saveBtn').onclick = async function() {
            const id = document.getElementById('editId').value;
            const title = document.getElementById('pTitle').value;
            const category = document.getElementById('pCat').value;
            const price = parseFloat(document.getElementById('pPrice').value);
            const file = document.getElementById('pImage').files[0];

            this.disabled = true;
            this.innerText = "Processando...";

            try {
                let image_url = products.find(p => p.id == id)?.image_url || "";
                
                if (file) {
                    const path = `produtos/${Date.now()}_${file.name}`;
                    await _supabase.storage.from('imagens-produtos').upload(path, file);
                    const { data } = _supabase.storage.from('imagens-produtos').getPublicUrl(path);
                    image_url = data.publicUrl;
                }

                const payload = { title, category, price, image_url };
                const { error } = id 
                    ? await _supabase.from('produtos').update(payload).eq('id', id)
                    : await _supabase.from('produtos').insert([payload]);

                if (error) throw error;
                closeAdmin();
                loadProducts().then(() => renderGrid());
            } catch (e) { alert(e.message); }
            finally { this.disabled = false; }
        };

        // --- RESTANTE DAS FUNÇÕES ---
        function addToCart(id) {
            const p = products.find(prod => prod.id == id);
            const inCart = cart.find(item => item.id == id);
            if (inCart) inCart.qty++; else cart.push({...p, qty: 1});
            updateCartUI();
        }

        function updateCartUI() {
            localStorage.setItem("cart", JSON.stringify(cart));
            const container = document.getElementById('cartItems');
            let total = 0;
            container.innerHTML = cart.map(item => {
                total += item.price * item.qty;
                return `<div style="display:flex; gap:10px; margin-bottom:10px"><img src="${item.image_url}" width="50" height="50" style="border-radius:8px"> <div>${item.title}<br><b>${item.qty}x R$ ${item.price}</b></div></div>`;
            }).join('');
            document.getElementById('cartTotal').innerText = `R$ ${total.toFixed(2)}`;
            document.getElementById('cartCount').innerText = cart.reduce((a, b) => a + b.qty, 0);
        }

        function toggleCart() { document.getElementById('cartSidebar').classList.toggle('active'); }
        function openZoom(url) { document.getElementById('zoomImg').src = url; document.getElementById('zoomModal').classList.add('active'); }

        document.getElementById('adminBtn').onclick = async () => {
            const { data: { user } } = await _supabase.auth.getUser();
            if (user) {
                document.getElementById('adminModal').classList.add('active');
                renderAdminList();
            } else {
                const email = prompt("E-mail:");
                const password = prompt("Senha:");
                await _supabase.auth.signInWithPassword({ email, password });
                location.reload();
            }
        };

        function renderAdminList() {
            const container = document.getElementById('adminList');
            container.innerHTML = products.map(p => `
                <div style="display:flex; justify-content:space-between; margin-bottom:10px; background:rgba(255,255,255,0.05); padding:10px; border-radius:10px;">
                    <span>${p.title}</span>
                    <div>
                        <button onclick="openEdit('${p.id}')" style="color:var(--accent); background:none; border:none; cursor:pointer; margin-right:10px">Editar</button>
                        <button onclick="deleteProduct('${p.id}')" style="color:var(--danger); background:none; border:none; cursor:pointer">Excluir</button>
                    </div>
                </div>
            `).join('');
        }

        async function deleteProduct(id) {
            if(confirm("Excluir?")) { await _supabase.from('produtos').delete().eq('id', id); renderAdminList(); }
        }

        document.getElementById('searchInput').oninput = (e) => { query = e.target.value; renderGrid(); };

        function sendWhatsApp() {
            let msg = "Pedido Kn2:%0A";
            cart.forEach(i => msg += `• ${i.title} (x${i.qty})%0A`);
            window.open(`https://wa.me/5531999683959?text=${msg}`);
        }

        init();
    </script>
</body>
</html>
