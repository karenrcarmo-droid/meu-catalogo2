<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kn2 Personalizados | Oficial</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg: #0b0f17; --card: #111827; --accent: #22c55e; --text: #f3f4f6; --border: rgba(255,255,255,.08); }
        body { background: var(--bg); color: var(--text); font-family: system-ui; margin: 0; }
        .container { width: min(1200px, 94vw); margin: auto; }
        
        /* HEADER */
        .topbar { position: sticky; top: 0; background: rgba(11,15,23,.95); backdrop-filter: blur(10px); border-bottom: 1px solid var(--border); padding: 15px 0; z-index: 1000; }
        .header-inner { display: flex; justify-content: space-between; align-items: center; }
        
        /* CATEGORIAS */
        .cat-nav { display: flex; gap: 10px; overflow-x: auto; padding: 15px 0; scrollbar-width: none; }
        .cat-btn { padding: 8px 18px; border-radius: 20px; border: 1px solid var(--border); background: var(--card); color: white; cursor: pointer; white-space: nowrap; }
        .cat-btn.active { background: var(--accent); color: #000; border-color: var(--accent); font-weight: bold; }

        /* GRID */
        .productsGrid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 20px; }
        .card { background: var(--card); border-radius: 20px; border: 1px solid var(--border); overflow: hidden; position: relative; transition: .3s; }
        .card:hover { border-color: var(--accent); transform: translateY(-5px); }
        .productImage { width: 100%; height: 260px; object-fit: cover; cursor: pointer; }
        
        /* BOTÕES */
        .btn { padding: 10px 20px; border-radius: 12px; border: none; cursor: pointer; font-weight: bold; text-decoration: none; }
        .btn-primary { background: var(--accent); color: #000; }
        .btn-dark { background: #1f2937; color: white; }
        
        /* MODAL ADMIN */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; z-index: 2000; }
        .modal.active { display: flex; }
        .modal-content { background: var(--card); padding: 25px; border-radius: 20px; width: 90%; max-width: 500px; max-height: 80vh; overflow-y: auto; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px; background: #0b0f17; color: #fff; border: 1px solid var(--border); }
    </style>
</head>
<body>

    <header class="topbar">
        <div class="container header-inner">
            <div style="font-size: 22px; font-weight: 900;">Kn2 <span>Personalizados</span></div>
            <div style="display: flex; gap: 8px;">
                <button class="btn btn-dark" onclick="abrirAdmin()">⚙️ Painel</button>
                <button class="btn btn-primary" onclick="alert('Pedido via WhatsApp')">🛒 <span id="cartTotal">0</span></button>
            </div>
        </div>
    </header>

    <main class="container">
        <div class="cat-nav" id="categoryNav"></div>
        <div id="catalogContainer" class="productsGrid">Carregando produtos...</div>
    </main>

    <footer style="text-align: center; padding: 40px; opacity: 0.5;">
        Visitas: <span id="visitCount">0</span> | Kn2 © 2024
    </footer>

    <div class="modal" id="adminModal">
        <div class="modal-content">
            <h3>Gerenciar Catálogo</h3>
            <div id="adminList" style="margin: 20px 0; border-top: 1px solid var(--border); padding-top: 10px;"></div>
            <button class="btn btn-dark" style="width: 100%;" onclick="fecharAdmin()">Fechar</button>
        </div>
    </div>

    <script>
        // CONFIGURAÇÕES SUPABASE - Troque pela sua chave real se necessário
        const SUPABASE_URL = "https://kdoxzjdvpbdwpzyaqary.supabase.co";
    const SUPABASE_KEY = "sb_publishable_4WrcBi_Cy8yRg8v0D3_BQw_1XuBID4V"; 
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);;

        let products = [];
        let currentCat = "Todos";
        let cartItems = 0;

        async function init() {
            try {
                await loadProducts();
                renderCategories();
                renderGrid();
                updateVisits(); // Se falhar aqui, o resto do site não morre
            } catch (e) {
                console.error("Erro ao carregar site:", e);
            }
        }

        async function loadProducts() {
            const { data, error } = await _supabase.from('produtos').select('*').order('created_at', { ascending: false });
            if (error) throw error;
            products = data || [];
        }

        async function updateVisits() {
            try {
                const { data } = await _supabase.from('estatisticas').select('visitas').eq('id', 1).single();
                if (data) {
                    const novoTotal = data.visitas + 1;
                    await _supabase.from('estatisticas').update({ visitas: novoTotal }).eq('id', 1);
                    document.getElementById('visitCount').innerText = novoTotal;
                }
            } catch(e) { console.warn("Erro no contador de visitas."); }
        }

        function renderCategories() {
            const cats = ["Todos", ...new Set(products.map(p => p.category))];
            document.getElementById('categoryNav').innerHTML = cats.map(c => `
                <button class="cat-btn ${currentCat === c ? 'active' : ''}" onclick="window.filtrar('${c}')">${c}</button>
            `).join('');
        }

        function renderGrid() {
            const container = document.getElementById('catalogContainer');
            const filtrados = products.filter(p => currentCat === "Todos" || p.category === currentCat);
            
            container.innerHTML = filtrados.map(p => `
                <div class="card">
                    <div style="position:absolute; top:10px; right:10px; background:rgba(0,0,0,0.5); padding:5px 10px; border-radius:15px; cursor:pointer;" onclick="window.darLike('${p.id}', ${p.likes || 0})">
                        ❤️ ${p.likes || 0}
                    </div>
                    <img src="${p.image_url}" class="productImage" onclick="window.open('${p.image_url}')">
                    <div style="padding:15px;">
                        <h4 style="margin:0;">${p.title}</h4>
                        <div style="color:var(--accent); font-size:20px; font-weight:900; margin:10px 0;">R$ ${p.price.toFixed(2)}</div>
                        <button class="btn btn-primary" onclick="window.addNoCarrinho('${p.id}')" style="width:100%">Adicionar Pedido</button>
                    </div>
                </div>
            `).join('');
        }

        // --- FUNÇÕES "JANELA" (BLINDADAS CONTRA ERROS DE ESCOPO) ---

        window.filtrar = (cat) => {
            currentCat = cat;
            renderCategories();
            renderGrid();
        };

        window.darLike = async (id, likes) => {
            try {
                await _supabase.from('produtos').update({ likes: likes + 1 }).eq('id', id);
                await loadProducts();
                renderGrid();
            } catch (e) { alert("Erro ao curtir."); }
        };

        window.addNoCarrinho = (id) => {
            cartItems++;
            document.getElementById('cartTotal').innerText = cartItems;
            const p = products.find(x => x.id === id);
            alert(`✅ Adicionado ao carrinho: ${p.title}\n\nFinalize seu pedido clicando no ícone do carrinho no topo!`);
        };

        window.abrirAdmin = async () => {
            const email = prompt("Email:");
            const pass = prompt("Senha:");
            const { error } = await _supabase.auth.signInWithPassword({ email, password: pass });
            
            if(!error) {
                document.getElementById('adminModal').classList.add('active');
                renderAdminList();
            } else { alert("Acesso negado."); }
        };

        function renderAdminList() {
            document.getElementById('adminList').innerHTML = products.map(p => `
                <div style="display:flex; justify-content:space-between; margin-bottom:10px; font-size:12px; background:#0b101a; padding:10px; border-radius:10px;">
                    <span>${p.title}</span>
                    <button onclick="alert('Edição em breve')" style="color:var(--accent); background:none; border:none; cursor:pointer">EDITAR</button>
                </div>
            `).join('');
        }

        window.fecharAdmin = () => document.getElementById('adminModal').classList.remove('active');

        init();
    </script>
</body>
</html>
