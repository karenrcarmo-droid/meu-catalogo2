<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kn2 Personalizados</title>
  <style>
    :root {
      --bg: #0b0f17; --card: #111827; --text: #e5e7eb;
      --muted: #9ca3af; --border: rgba(255, 255, 255, .08);
      --accent: #22c55e; --danger: #ef4444;
    }
    * { box-sizing: border-box; }
    body { margin: 0; background: var(--bg); color: var(--text); font-family: sans-serif; }
    .container { width: min(1100px, 92vw); margin: auto; }
    
    .topbar { position: sticky; top: 0; z-index: 999; background: #0b0f17; border-bottom: 1px solid var(--border); padding: 15px 0; }
    .topbar__inner { display: flex; justify-content: space-between; align-items: center; }
    
    .adminBtn { background: var(--accent); color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; }

    .menu__row { display: flex; gap: 10px; flex-wrap: wrap; margin: 20px 0; }
    .menu__btn { border: 1px solid var(--border); background: transparent; color: white; padding: 8px 15px; border-radius: 20px; cursor: pointer; }
    .menu__btn.active { background: var(--accent); border-color: var(--accent); }

    .productsGrid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
    .card { background: var(--card); border: 1px solid var(--border); border-radius: 15px; overflow: hidden; }
    .productImage { width: 100%; height: 200px; object-fit: cover; cursor: zoom-in; }
    .card__body { padding: 15px; }

    /* MODAIS */
    .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; justify-content: center; align-items: center; z-index: 10000; padding: 20px; }
    .modal.active { display: flex; }
    .modal__content { background: #111827; padding: 25px; border-radius: 15px; width: 100%; max-width: 400px; border: 1px solid var(--border); }
    
    input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid var(--border); background: #0b0f17; color: white; }
    .btnAction { width: 100%; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 10px; }
    .btnSave { background: var(--accent); color: white; }
    .btnClose { background: #374151; color: white; }

    #adminList { margin-top: 20px; max-height: 150px; overflow-y: auto; border-top: 1px solid var(--border); padding-top: 10px; }
    .adminItem { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; font-size: 12px; }
  </style>
</head>
<body>

  <header class="topbar">
    <div class="container topbar__inner">
      <h1 style="margin:0; font-size: 1.2rem;">Kn2 Personalizados</h1>
      <button class="adminBtn" id="btnAbrirLogin">Admin</button>
    </div>
  </header>

  <main class="container">
    <div class="menu__row" id="areaMenu"></div>
    <div id="areaProdutos"></div>
  </main>

  <div class="modal" id="modalLogin">
    <div class="modal__content">
      <h3>Acesso Admin</h3>
      <input type="password" id="senhaInput" placeholder="Senha">
      <button class="btnAction btnSave" id="btnEntrar">Entrar</button>
      <button class="btnAction btnClose" onclick="fecharModal('modalLogin')">Cancelar</button>
    </div>
  </div>

  <div class="modal" id="modalAdmin">
    <div class="modal__content">
      <h3>Novo Produto</h3>
      <input type="text" id="nomeP" placeholder="Nome do Produto">
      <input type="text" id="catP" placeholder="Categoria (ex: Canecas)">
      <input type="number" id="precoP" placeholder="Preço R$">
      <input type="text" id="fotoP" placeholder="Nome da imagem (ex: foto.jpg)">
      <button class="btnAction btnSave" id="btnGravar">Salvar Produto</button>
      <div id="adminList"></div>
      <button class="btnAction btnClose" onclick="fecharModal('modalAdmin')">Sair</button>
    </div>
  </div>

  <div class="modal" id="modalPreview" onclick="fecharModal('modalPreview')">
    <img id="imgFull" src="" style="max-width: 95%; max-height: 90vh; border-radius: 10px;">
  </div>

  <script>
    const SENHA_MESTRA = "1234";
    const CHAVE_LOCAL = "dados_catalogo_v3";
    let produtos = JSON.parse(localStorage.getItem(CHAVE_LOCAL)) || [];
    let catAtiva = "Todos";

    // Funções de Modal
    function abrirModal(id) { document.getElementById(id).classList.add('active'); }
    function fecharModal(id) { document.getElementById(id).classList.remove('active'); }

    // Renderizar Menu de Categorias
    function renderMenu() {
      const area = document.getElementById("areaMenu");
      const categorias = ["Todos", ...new Set(produtos.map(p => p.category))];
      area.innerHTML = categorias.map(c => `
        <button class="menu__btn ${c === catAtiva ? 'active' : ''}" onclick="mudarCat('${c}')">${c}</button>
      `).join("");
    }

    function mudarCat(c) {
      catAtiva = c;
      renderMenu();
      renderGrid();
    }

    // Renderizar Produtos
    function renderGrid() {
      const area = document.getElementById("areaProdutos");
      area.innerHTML = "";
      const lista = catAtiva === "Todos" ? produtos : produtos.filter(p => p.category === catAtiva);
      
      if(lista.length === 0) {
        area.innerHTML = "<p style='color:gray'>Nenhum produto cadastrado.</p>";
        return;
      }

      const html = lista.map(p => `
        <div class="card">
          <img src="${p.image}?v=${Date.now()}" class="productImage" onclick="abrirFoto('${p.image}')" onerror="this.src='https://via.placeholder.com/300?text=Sua+Foto+Aqui'">
          <div class="card__body">
            <h4 style="margin:0">${p.title}</h4>
            <p style="color:var(--accent); font-weight:bold">R$ ${parseFloat(p.price).toFixed(2)}</p>
            <button class="btnAction btnSave" onclick="pedir('${p.title}')">WhatsApp</button>
          </div>
        </div>
      `).join("");
      
      area.innerHTML = `<div class="productsGrid">${html}</div>`;
    }

    function abrirFoto(url) {
      document.getElementById("imgFull").src = url;
      abrirModal('modalPreview');
    }

    function pedir(nome) {
      window.open(`https://wa.me/5531999999999?text=Quero+saber+mais+sobre+${nome}`, "_blank");
    }

    // Admin
    function atualizarAdminLista() {
      const lista = document.getElementById("adminList");
      lista.innerHTML = produtos.map((p, index) => `
        <div class="adminItem">
          <span>${p.title}</span>
          <button class="dangerBtn" onclick="remover(${index})" style="background:red; color:white; border:none; padding:3px 7px; border-radius:4px; cursor:pointer">X</button>
        </div>
      `).join("");
    }

    window.remover = (index) => {
      if(confirm("Remover item?")) {
        produtos.splice(index, 1);
        localStorage.setItem(CHAVE_LOCAL, JSON.stringify(produtos));
        renderGrid();
        renderMenu();
        atualizarAdminLista();
      }
    };

    // Eventos ao carregar
    window.onload = () => {
      renderMenu();
      renderGrid();

      // Abrir Login
      document.getElementById("btnAbrirLogin").addEventListener("click", () => abrirModal('modalLogin'));

      // Logar
      document.getElementById("btnEntrar").addEventListener("click", () => {
        if(document.getElementById("senhaInput").value === SENHA_MESTRA) {
          fecharModal('modalLogin');
          abrirModal('modalAdmin');
          atualizarAdminLista();
          document.getElementById("senhaInput").value = "";
        } else {
          alert("Senha incorreta!");
        }
      });

      // Gravar Produto
      document.getElementById("btnGravar").addEventListener("click", () => {
        const nome = document.getElementById("nomeP").value;
        const cat = document.getElementById("catP").value;
        const preco = document.getElementById("precoP").value;
        const foto = document.getElementById("fotoP").value;

        if(!nome || !cat || !preco || !foto) return alert("Preencha tudo!");

        produtos.unshift({ title: nome, category: cat, price: preco, image: 'imagens/' + foto });
        localStorage.setItem(CHAVE_LOCAL, JSON.stringify(produtos));
        
        renderGrid();
        renderMenu();
        atualizarAdminLista();
        alert("Salvo!");
      });
    };
  </script>
</body>
</html>
