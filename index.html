<!DOCTYPE html>
<html lang="pt-BR">

<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>Kn2 Personalizados</title>

  <meta
    name="theme-color"
    content="#0b0f17"
  />

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>

    :root{
      --bg:#0b0f17;
      --card:#111827;
      --muted:#9ca3af;
      --text:#f3f4f6;
      --border:rgba(255,255,255,.06);
      --accent:#22c55e;
      --danger:#ef4444;
    }

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    html{
      scroll-behavior:smooth;
    }

    body{
      background:var(--bg);
      color:var(--text);
      font-family:system-ui;
      overflow-x:hidden;
    }

    .container{
      width:min(1200px,92vw);
      margin:auto;
    }

    /* =========================
       TOPBAR
    ========================= */

    .topbar{
      position:sticky;
      top:0;
      z-index:1000;

      background:rgba(11,15,23,.9);

      backdrop-filter:blur(12px);

      border-bottom:1px solid var(--border);
    }

    .topbar__inner{
      padding:16px 0;

      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
    }

    .logo{
      font-size:28px;
      font-weight:900;
    }

    .topActions{
      display:flex;
      gap:10px;
      align-items:center;
    }

    /* =========================
       BUTTONS
    ========================= */

    .btn{
      border:none;
      cursor:pointer;

      border-radius:14px;

      padding:12px 18px;

      color:white;

      font-weight:800;

      transition:.2s;
    }

    .btn:hover{
      transform:translateY(-2px);
    }

    .btn-primary{
      background:var(--accent);
    }

    .btn-dark{
      background:#1f2937;
    }

    .btn-danger{
      background:var(--danger);
    }

    /* =========================
       MENU
    ========================= */

    .menu{
      margin-top:22px;
    }

    .menu__row{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    .menu__btn{
      border:1px solid var(--border);

      background:transparent;

      color:white;

      padding:10px 16px;

      border-radius:999px;

      cursor:pointer;
    }

    .menu__btn.active{
      background:rgba(34,197,94,.12);

      border-color:var(--accent);

      color:var(--accent);
    }

    /* =========================
       SEARCH
    ========================= */

    .search{
      margin:22px 0;
    }

    .search input{
      width:100%;

      height:56px;

      border:none;

      border-radius:18px;

      background:#111827;

      color:white;

      padding:0 18px;

      outline:none;
    }

    /* =========================
       GRID
    ========================= */

    .categoryBlock{
      margin-bottom:50px;
    }

    .categoryHeading{
      margin-bottom:18px;

      padding-bottom:10px;

      border-bottom:1px solid var(--border);
    }

    .productsGrid{
      display:grid;

      grid-template-columns:
        repeat(auto-fill,minmax(250px,1fr));

      gap:18px;
    }

    .card{
      background:var(--card);

      border-radius:22px;

      overflow:hidden;

      border:1px solid var(--border);

      transition:.25s;

      display:flex;
      flex-direction:column;
    }

    .card:hover{
      transform:translateY(-5px);
      border-color:rgba(34,197,94,.25);
    }

    .productImage{
      width:100%;
      height:240px;

      object-fit:cover;

      background:#1f2937;

      cursor:pointer;
    }

    .card__body{
      padding:18px;

      display:flex;
      flex-direction:column;

      flex-grow:1;
    }

    .card__title{
      font-size:17px;
      font-weight:800;
      margin-bottom:12px;
    }

    .card__meta{
      display:flex;
      justify-content:space-between;
      align-items:center;

      margin-top:auto;
      margin-bottom:16px;
    }

    .price{
      color:var(--accent);

      font-size:22px;

      font-weight:900;
    }

    /* =========================
       MODAL
    ========================= */

    .modal{
      position:fixed;
      inset:0;

      background:rgba(0,0,0,.75);

      display:none;

      justify-content:center;
      align-items:center;

      z-index:9999;

      backdrop-filter:blur(4px);
    }

    .modal.active{
      display:flex;
    }

    .modal__content{
      width:min(720px,92vw);

      max-height:90vh;

      overflow:auto;

      background:#111827;

      border-radius:24px;

      padding:24px;

      border:1px solid var(--border);
    }

    /* =========================
       FORMS
    ========================= */

    .formGroup{
      margin-bottom:16px;
    }

    .formGroup label{
      display:block;

      margin-bottom:8px;

      color:var(--muted);

      font-size:14px;
    }

    .formGroup input{
      width:100%;

      height:52px;

      border:none;

      border-radius:14px;

      background:#0f172a;

      color:white;

      padding:0 14px;
    }

    .grid2{
      display:grid;

      grid-template-columns:1fr 1fr;

      gap:12px;
    }

    /* =========================
       ADMIN LIST
    ========================= */

    .adminItem{
      display:flex;
      gap:12px;

      align-items:center;

      background:#0f172a;

      padding:12px;

      border-radius:18px;

      margin-bottom:12px;
    }

    .adminItem img{
      width:72px;
      height:72px;

      border-radius:14px;

      object-fit:cover;
    }

    .adminItem__info{
      flex:1;
    }

    .adminActions{
      display:flex;
      gap:8px;
    }

    /* =========================
       CART OVERLAY
    ========================= */

    .cartOverlay{
      position:fixed;
      inset:0;

      background:rgba(0,0,0,.55);

      backdrop-filter:blur(4px);

      opacity:0;
      visibility:hidden;

      transition:.25s;

      z-index:99998;
    }

    .cartOverlay.active{
      opacity:1;
      visibility:visible;
    }

    /* =========================
       CART SIDEBAR
    ========================= */

    .cartSidebar{
      position:fixed;

      top:0;
      right:-460px;

      width:420px;
      max-width:100%;

      height:100vh;

      background:#111827;

      border-left:1px solid var(--border);

      z-index:99999;

      display:flex;
      flex-direction:column;

      transition:
        right .28s cubic-bezier(.4,0,.2,1);

      box-shadow:
        -10px 0 40px rgba(0,0,0,.35);
    }

    .cartSidebar.active{
      right:0;
    }

    .cartHeader{
      padding:20px;

      border-bottom:1px solid var(--border);

      display:flex;
      justify-content:space-between;
      align-items:center;
    }

    .cartClose{
      width:40px;
      height:40px;

      border:none;

      border-radius:12px;

      background:#1f2937;

      color:white;

      cursor:pointer;
    }

    .cartBody{
      flex:1;

      overflow:auto;

      padding:18px;
    }

    /* =========================
       CART ITEM
    ========================= */

    .cartItem{
      display:flex;
      gap:12px;

      background:#0f172a;

      border:1px solid rgba(255,255,255,.04);

      padding:12px;

      border-radius:18px;

      margin-bottom:14px;
    }

    .cartItem img{
      width:82px;
      height:82px;

      border-radius:14px;

      object-fit:cover;
    }

    .cartItem__info{
      flex:1;
    }

    .cartItem__title{
      font-size:15px;
      font-weight:800;
      margin-bottom:8px;
    }

    .cartItem__price{
      color:var(--accent);

      font-weight:900;

      margin-bottom:12px;
    }

    .qtyControls{
      display:flex;
      align-items:center;
      gap:10px;
    }

    .qtyBtn{
      width:30px;
      height:30px;

      border:none;

      border-radius:10px;

      background:#1f2937;

      color:white;

      font-size:18px;

      cursor:pointer;
    }

    .qtyBtn:hover{
      background:var(--accent);
    }

    .removeBtn{
      border:none;

      background:transparent;

      color:#ef4444;

      cursor:pointer;

      margin-top:10px;

      font-size:13px;
    }

    /* =========================
       CART FOOTER
    ========================= */

    .cartFooter{
      padding:20px;

      border-top:1px solid var(--border);
    }

    .couponBox{
      display:flex;
      gap:10px;

      margin-bottom:16px;
    }

    .couponBox input{
      flex:1;

      height:50px;

      border:none;

      border-radius:14px;

      background:#0f172a;

      color:white;

      padding:0 14px;
    }

    .summary{
      display:flex;
      flex-direction:column;
      gap:10px;
    }

    .summaryRow{
      display:flex;
      justify-content:space-between;
    }

    .summaryRow.total{
      margin-top:10px;

      padding-top:12px;

      border-top:1px solid var(--border);

      font-size:22px;

      font-weight:900;
    }

    .totalPrice{
      color:var(--accent);
    }

    /* =========================
       EMPTY CART
    ========================= */

    .emptyCart{
      height:100%;

      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;

      text-align:center;

      color:#9ca3af;
    }

    /* =========================
       IMAGE PREVIEW
    ========================= */

    .imagePreviewModal{
      position:fixed;
      inset:0;

      background:rgba(0,0,0,.9);

      display:none;

      justify-content:center;
      align-items:center;

      z-index:999999;
    }

    .imagePreviewModal.active{
      display:flex;
    }

    .imagePreviewModal img{
      max-width:90%;
      max-height:90%;

      border-radius:20px;
    }

    @media(max-width:700px){

      .productsGrid{
        grid-template-columns:1fr;
      }

      .grid2{
        grid-template-columns:1fr;
      }

      .cartSidebar{
        width:100%;
      }

    }

  </style>

</head>

<body>

  <!-- TOPBAR -->

  <header class="topbar">

    <div class="container topbar__inner">

      <div class="logo">
        Kn2 Catálogo
      </div>

      <div class="topActions">

        <button
          class="btn btn-primary"
          onclick="toggleCart()"
        >
          🛒
          <span id="cartCount">
            0
          </span>
        </button>

        <button
          class="btn btn-primary"
          id="openAdminBtn"
        >
          Painel Admin
        </button>

        <button
          class="btn btn-dark"
          id="logoutBtn"
          style="display:none"
        >
          Sair
        </button>

      </div>

    </div>

  </header>

  <!-- MAIN -->

  <main class="container">

    <section class="menu">
      <div class="menu__row" id="menuRow"></div>
    </section>

    <section class="search">

      <input
        type="text"
        id="searchInput"
        placeholder="Pesquisar produto..."
      />

    </section>

    <section id="catalogContainer"></section>

    <p
      id="emptyState"
      hidden
      style="
        text-align:center;
        color:gray;
        padding:40px;
      "
    >
      Nenhum produto encontrado.
    </p>

  </main>

  <!-- LOGIN -->

  <div class="modal" id="loginModal">

    <div class="modal__content">

      <h2 style="margin-bottom:20px">
        Login Restrito
      </h2>

      <div class="formGroup">
        <label>E-mail</label>
        <input type="email" id="adminEmail">
      </div>

      <div class="formGroup">
        <label>Senha</label>
        <input type="password" id="adminPassword">
      </div>

      <button
        class="btn btn-primary"
        style="width:100%"
        id="loginBtn"
      >
        Entrar
      </button>

      <button
        class="btn btn-dark"
        style="
          width:100%;
          margin-top:10px;
        "
        id="closeLoginBtn"
      >
        Cancelar
      </button>

    </div>

  </div>

  <!-- ADMIN -->

  <div class="modal" id="adminModal">

    <div class="modal__content">

      <h2 style="margin-bottom:20px">
        Produto
      </h2>

      <input type="hidden" id="editingId">

      <div class="grid2">

        <div class="formGroup">
          <label>Nome</label>
          <input type="text" id="productTitle">
        </div>

        <div class="formGroup">
          <label>Categoria</label>
          <input type="text" id="productCategory">
        </div>

      </div>

      <div class="grid2">

        <div class="formGroup">
          <label>Preço</label>
          <input
            type="number"
            id="productPrice"
            step="0.01"
          >
        </div>

        <div class="formGroup">
          <label>Imagem</label>
          <input
            type="file"
            id="productImage"
            accept="image/*"
          >
        </div>

      </div>

      <button
        class="btn btn-primary"
        style="width:100%"
        id="saveProductBtn"
      >
        Salvar Produto
      </button>

      <hr
        style="
          margin:24px 0;
          opacity:.1;
        "
      >

      <h3 style="margin-bottom:16px">
        Produtos
      </h3>

      <div id="adminList"></div>

      <button
        class="btn btn-dark"
        style="
          width:100%;
          margin-top:10px;
        "
        id="closeAdminBtn"
      >
        Fechar
      </button>

    </div>

  </div>

  <!-- OVERLAY -->

  <div
    class="cartOverlay"
    id="cartOverlay"
    onclick="closeCart()"
  ></div>

  <!-- CART -->

  <aside class="cartSidebar" id="cartSidebar">

    <div class="cartHeader">

      <h2>
        🛒 Seu Carrinho
      </h2>

      <button
        class="cartClose"
        onclick="closeCart()"
      >
        ✕
      </button>

    </div>

    <div class="cartBody" id="cartItems"></div>

    <div class="cartFooter">

      <div class="couponBox">

        <input
          type="text"
          id="couponInput"
          placeholder="Cupom de desconto"
        >

        <button
          class="btn btn-primary"
          onclick="applyCoupon()"
        >
          Aplicar
        </button>

      </div>

      <div class="summary">

        <div class="summaryRow">
          <span>Subtotal</span>
          <strong id="subtotalPrice">
            R$ 0,00
          </strong>
        </div>

        <div class="summaryRow">
          <span>Desconto</span>
          <strong id="discountPrice">
            R$ 0,00
          </strong>
        </div>

        <div class="summaryRow total">

          <span>Total</span>

          <span
            class="totalPrice"
            id="cartTotal"
          >
            R$ 0,00
          </span>

        </div>

      </div>

      <button
        class="btn btn-primary"
        style="
          width:100%;
          margin-top:18px;
        "
        onclick="sendCartWhatsApp()"
      >
        Finalizar Pedido
      </button>

    </div>

  </aside>

  <!-- PREVIEW -->

  <div
    class="imagePreviewModal"
    id="imagePreviewModal"
    onclick="this.classList.remove('active')"
  >
    <img id="previewImage">
  </div>

  <script>

    /* =========================
       CONFIG
    ========================= */

    const SUPABASE_URL =
      "https://kdoxzjdvpbdwpzyaqary.supabase.co";

    const SUPABASE_KEY =
      "sb_publishable_4WrcBi_Cy8yRg8v0D3_BQw_1XuBID4V";

    const _supabase =
      supabase.createClient(
        SUPABASE_URL,
        SUPABASE_KEY
      );

    const WHATSAPP_NUMBER =
      "5531999683959";

    /* =========================
       STATE
    ========================= */

    let products = [];

    let cart =
      JSON.parse(
        localStorage.getItem("cart")
      ) || [];

    let activeCategory = "Todos";

    let searchQuery = "";

    let discount = 0;

    /* =========================
       INIT
    ========================= */

    async function init(){

      await fetchProducts();

      await checkUser();

      renderMenu();

      renderGrid();

      updateCart();

    }

    /* =========================
       FETCH PRODUCTS
    ========================= */

    async function fetchProducts(){

      const { data, error } =
        await _supabase
          .from('produtos')
          .select('*')
          .order('created_at',{
            ascending:false
          });

      if(!error){

        products = data || [];

      }

    }

    /* =========================
       MENU
    ========================= */

    function renderMenu(){

      const menuRow =
        document.getElementById(
          "menuRow"
        );

      menuRow.innerHTML = "";

      const categories = [
        "Todos",
        ...new Set(
          products.map(p => p.category)
        )
      ];

      categories.forEach(cat => {

        const btn =
          document.createElement("button");

        btn.className =
          `menu__btn ${
            cat === activeCategory
            ? 'active'
            : ''
          }`;

        btn.textContent = cat;

        btn.onclick = () => {

          activeCategory = cat;

          renderMenu();

          renderGrid();

        };

        menuRow.appendChild(btn);

      });

    }

    /* =========================
       GRID
    ========================= */

    function renderGrid(){

      const container =
        document.getElementById(
          "catalogContainer"
        );

      container.innerHTML = "";

      const filtered =
        products.filter(p => {

          const matchCat =
            activeCategory === "Todos" ||
            p.category === activeCategory;

          const matchSearch =
            p.title.toLowerCase()
            .includes(
              searchQuery.toLowerCase()
            );

          return matchCat && matchSearch;

        });

      document.getElementById(
        "emptyState"
      ).hidden = filtered.length > 0;

      const grouped = {};

      filtered.forEach(p => {

        if(!grouped[p.category]){

          grouped[p.category] = [];

        }

        grouped[p.category].push(p);

      });

      for(const cat in grouped){

        const section =
          document.createElement("div");

        section.className =
          "categoryBlock";

        section.innerHTML = `
          <h2 class="categoryHeading">
            ${cat}
          </h2>
        `;

        const grid =
          document.createElement("div");

        grid.className =
          "productsGrid";

        grouped[cat].forEach(p => {

          const card =
            document.createElement("div");

          card.className = "card";

          card.innerHTML = `

            <img
              class="productImage"
              src="${p.image_url}"
              loading="lazy"
              onclick="showImg('${p.image_url}')"
            >

            <div class="card__body">

              <h3 class="card__title">
                ${p.title}
              </h3>

              <div class="card__meta">

                <span>
                  ${p.category}
                </span>

                <span class="price">
                  R$
                  ${p.price
                    .toFixed(2)
                    .replace('.',',')}
                </span>

              </div>

              <button
                class="btn btn-primary"
                onclick="addToCart('${p.id}')"
              >
                Adicionar ao Carrinho
              </button>

            </div>

          `;

          grid.appendChild(card);

        });

        section.appendChild(grid);

        container.appendChild(section);

      }

    }

    /* =========================
       CART
    ========================= */

    function addToCart(id){

      const product =
        products.find(p => p.id == id);

      const existing =
        cart.find(i => i.id == id);

      if(existing){

        existing.quantity++;

      } else {

        cart.push({
          ...product,
          quantity:1
        });

      }

      updateCart();

      openCart();

    }

    function increaseQty(id){

      const item =
        cart.find(i => i.id == id);

      item.quantity++;

      updateCart();

    }

    function decreaseQty(id){

      const item =
        cart.find(i => i.id == id);

      item.quantity--;

      if(item.quantity <= 0){

        cart =
          cart.filter(i => i.id != id);

      }

      updateCart();

    }

    function removeItem(id){

      cart =
        cart.filter(i => i.id != id);

      updateCart();

    }

    function updateCart(){

      localStorage.setItem(
        "cart",
        JSON.stringify(cart)
      );

      renderCart();

      updateCartCount();

    }

    function updateCartCount(){

      const total =
        cart.reduce(
          (acc,item) =>
            acc + item.quantity,
          0
        );

      document.getElementById(
        "cartCount"
      ).textContent = total;

    }

    function renderCart(){

      const container =
        document.getElementById(
          "cartItems"
        );

      if(cart.length === 0){

        container.innerHTML = `

          <div class="emptyCart">

            <div style="font-size:70px">
              🛒
            </div>

            <h3 style="margin:14px 0 6px">
              Seu carrinho está vazio
            </h3>

            <p>
              Adicione produtos para
              continuar.
            </p>

            <button
              class="btn btn-primary"
              style="
                margin-top:20px;
              "
              onclick="closeCart()"
            >
              Continuar Comprando
            </button>

          </div>

        `;

        document.getElementById(
          "subtotalPrice"
        ).textContent = "R$ 0,00";

        document.getElementById(
          "discountPrice"
        ).textContent = "R$ 0,00";

        document.getElementById(
          "cartTotal"
        ).textContent = "R$ 0,00";

        return;

      }

      let subtotal = 0;

      container.innerHTML =
        cart.map(item => {

          const total =
            item.price * item.quantity;

          subtotal += total;

          return `

            <div class="cartItem">

              <img src="${item.image_url}">

              <div class="cartItem__info">

                <div class="cartItem__title">
                  ${item.title}
                </div>

                <div class="cartItem__price">

                  R$
                  ${total
                    .toFixed(2)
                    .replace('.',',')}

                </div>

                <div class="qtyControls">

                  <button
                    class="qtyBtn"
                    onclick="decreaseQty('${item.id}')"
                  >
                    −
                  </button>

                  <span>
                    ${item.quantity}
                  </span>

                  <button
                    class="qtyBtn"
                    onclick="increaseQty('${item.id}')"
                  >
                    +
                  </button>

                </div>

                <button
                  class="removeBtn"
                  onclick="removeItem('${item.id}')"
                >
                  Remover item
                </button>

              </div>

            </div>

          `;

        }).join('');

      const total =
        subtotal - discount;

      document.getElementById(
        "subtotalPrice"
      ).textContent =
        `R$ ${
          subtotal
            .toFixed(2)
            .replace('.',',')
        }`;

      document.getElementById(
        "discountPrice"
      ).textContent =
        `R$ ${
          discount
            .toFixed(2)
            .replace('.',',')
        }`;

      document.getElementById(
        "cartTotal"
      ).textContent =
        `R$ ${
          total
            .toFixed(2)
            .replace('.',',')
        }`;

    }

    function openCart(){

      document
        .getElementById(
          "cartSidebar"
        )
        .classList.add("active");

      document
        .getElementById(
          "cartOverlay"
        )
        .classList.add("active");

      document.body.style.overflow =
        "hidden";

    }

    function closeCart(){

      document
        .getElementById(
          "cartSidebar"
        )
        .classList.remove("active");

      document
        .getElementById(
          "cartOverlay"
        )
        .classList.remove("active");

      document.body.style.overflow =
        "auto";

    }

    function toggleCart(){

      const cartEl =
        document.getElementById(
          "cartSidebar"
        );

      if(cartEl.classList.contains("active")){

        closeCart();

      } else {

        openCart();

      }

    }

    function applyCoupon(){

      const code =
        document.getElementById(
          "couponInput"
        ).value
        .trim()
        .toUpperCase();

      if(code === "KN210"){

        discount = 10;

        alert(
          "Cupom aplicado!"
        );

      } else {

        discount = 0;

        alert(
          "Cupom inválido"
        );

      }

      renderCart();

    }

    function sendCartWhatsApp(){

      if(cart.length === 0){

        return alert(
          "Carrinho vazio."
        );

      }

      let subtotal = 0;

      let msg =
        "Olá! Gostaria de fazer o pedido:%0A%0A";

      cart.forEach(item => {

        const total =
          item.price * item.quantity;

        subtotal += total;

        msg +=
          `• ${item.title}` +
          ` | Qtd: ${item.quantity}` +
          ` | R$ ${total.toFixed(2)}%0A`;

      });

      const final =
        subtotal - discount;

      msg +=
        `%0ASubtotal: R$ ${subtotal.toFixed(2)}`;

      msg +=
        `%0ADesconto: R$ ${discount.toFixed(2)}`;

      msg +=
        `%0A%0ATotal: R$ ${final.toFixed(2)}`;

      window.open(
        `https://wa.me/${WHATSAPP_NUMBER}?text=${msg}`,
        '_blank'
      );

    }

    async function compressImage(file){

      return new Promise(resolve => {

        const reader =
          new FileReader();

        reader.readAsDataURL(file);

        reader.onload = e => {

          const img =
            new Image();

          img.src = e.target.result;

          img.onload = () => {

            const canvas =
              document.createElement(
                'canvas'
              );

            const MAX = 1200;

            let width = img.width;
            let height = img.height;

            if(width > height){

              if(width > MAX){

                height *= MAX / width;

                width = MAX;

              }

            } else {

              if(height > MAX){

                width *= MAX / height;

                height = MAX;

              }

            }

            canvas.width = width;
            canvas.height = height;

            const ctx =
              canvas.getContext('2d');

            ctx.drawImage(
              img,
              0,
              0,
              width,
              height
            );

            canvas.toBlob(blob => {

              resolve(blob);

            }, 'image/jpeg', 0.75);

          };

        };

      });

    }

    document.getElementById(
      "saveProductBtn"
    ).onclick = async () => {

      const id =
        document.getElementById(
          "editingId"
        ).value;

      const title =
        document.getElementById(
          "productTitle"
        ).value;

      const category =
        document.getElementById(
          "productCategory"
        ).value;

      const price =
        document.getElementById(
          "productPrice"
        ).value;

      const imageInput =
        document.getElementById(
          "productImage"
        );

      let image_url = null;

      try{

        if(imageInput.files[0]){

          const compressed =
            await compressImage(
              imageInput.files[0]
            );

          const fileName =
            Date.now() + ".jpg";

          const filePath =
            `produtos/${fileName}`;

          const {
            error:uploadError
          } =
            await _supabase
              .storage
              .from(
                'imagens-produtos'
              )
              .upload(
                filePath,
                compressed
              );

          if(uploadError)
            throw uploadError;

          const {
            data:{ publicUrl }
          } =
            _supabase
              .storage
              .from(
                'imagens-produtos'
              )
              .getPublicUrl(
                filePath
              );

          image_url = publicUrl;

        }

        if(id){

          const payload = {
            title,
            category,
            price:
              parseFloat(price)
          };

          if(image_url){

            payload.image_url =
              image_url;

          }

          const { error } =
            await _supabase
              .from('produtos')
              .update(payload)
              .eq('id',id);

          if(error) throw error;

          alert(
            "Produto atualizado!"
          );

        } else {

          const { error } =
            await _supabase
              .from('produtos')
              .insert([{
                title,
                category,
                price:
                  parseFloat(price),
                image_url
              }]);

          if(error) throw error;

          alert(
            "Produto criado!"
          );

        }

        location.reload();

      } catch(err){

        alert(
          "Erro: " + err.message
        );

      }

    };

    async function deleteProd(id){

      if(!confirm(
        "Excluir produto?"
      )) return;

      const { error } =
        await _supabase
          .from('produtos')
          .delete()
          .eq('id',id);

      if(!error){

        alert("Excluído");

        location.reload();

      }

    }

      if(user){

        document.getElementById(
          "logoutBtn"
        ).style.display = "block";

      }

    }

    document.getElementById(
      "logoutBtn"
    ).onclick = async () => {

      await _supabase.auth.signOut();

    };

    document.getElementById(
      "openAdminBtn"
    ).onclick = async () => {

      const {
        data:{ user }
      } =

      if(user){

        openAdminPanel();

      } else {

        document.getElementById(
          "loginModal"
        ).classList.add("active");
