<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kn2 Personalizados | Premium</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg: #0b0f17; --card: rgba(255, 255, 255, 0.03); 
            --muted: #9ca3af; --text: #f3f4f6;
            --border: rgba(255, 255, 255, 0.08); --accent: #22c55e; 
            --danger: #ef4444; --glass: blur(12px);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; }
        .container { width: min(1200px, 94vw); margin: auto; }
        
        /* HEADER */
        .topbar { position: sticky; top: 0; z-index: 1000; background: rgba(11, 15, 23, 0.7); backdrop-filter: var(--glass); border-bottom: 1px solid var(--border); padding: 14px 0; }
        .topbar__inner { display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 22px; font-weight: 900; color: #fff; text-decoration: none; }
        .logo span { color: var(--accent); }

        /* CATEGORIAS */
        .cat-nav { display: flex; gap: 10px; overflow-x: auto; padding: 15px 0; margin-bottom: 20px; }
        .cat-btn { padding: 8px 18px; border-radius: 20px; border: 1px solid var(--border); background: var(--card); color: var(--text); cursor: pointer; white-space: nowrap; transition: 0.3s; }
        .cat-btn.active { background: var(--accent); color: #000; font-weight: bold; }

        /* GRID E CARDS */
        .productsGrid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 25px; }
        .card { background: var(--card); border-radius: 24px; border: 1px solid var(--border); overflow: hidden; position: relative; transition: 0.4s; }
        .card:hover { transform: translateY(-8px); border-color: var(--accent); }
        
        .img-container { width: 100%; height: 260px; overflow: hidden; position: relative; }
        .productImage { width: 100%; height: 100%; object-fit: cover; transition: 0.6s; cursor: pointer; }
        
        /* SISTEMA DE LIKES */
        .like-container { position: absolute; top: 15px; right: 15px; display: flex; flex-direction: column; align-items: center; background: rgba(0,0,0,0.5); padding: 5px 10px; border-radius: 20px; backdrop-filter: blur(5px); z-index: 10; }
        .btn-like { background: none; border: none; color: #fff; cursor: pointer; font-size: 1.2rem; transition: 0.3s; padding: 0; }
        .btn-like.active { color: var(--danger); animation: pulse 0.4s ease; }
        .like-count { font-size: 11px; font-weight: bold; color: #fff; }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.4); }
            100% { transform: scale(1); }
        }

        .btn { border: none; cursor: pointer; border-radius: 12px; padding: 10px 18px; font-weight: 700; transition: 0.3s; display: inline-flex; align-items: center; gap: 8px; color: white; text-decoration: none; }
        .btn-primary { background: var(--accent); color: #000; }
        .btn-dark { background: rgba(255,255,255,0.05); border: 1px solid var(--border); }

        footer { text-align: center; padding: 40px 0; border-top: 1px solid var(--border); margin-top: 50px; }
    </style>
</head>
<body>

    <header class="topbar">
        <div class="container topbar__inner">
            <a href="#" class="logo">Kn2 <span>Personalizados</span></a>
            <div style="display: flex; gap: 10px;">
                <button class="btn btn-dark" onclick="toggleCart()">🛒 <span id="cartCount">0</span></button>
                <button class="btn btn-primary" id="adminBtn">Painel</button>
            </div>
        </div>
    </header>

    <main class="container">
        <div style="margin-top: 20px;"><input type="text" id="searchInput" placeholder="Buscar produto..."></div>
        <div class="cat-nav" id="categoryNav"></div>
        <div id="catalogContainer"></div>
    </main>

    <div class="modal" id="zoomModal" onclick="this.classList.remove('active')" style="display: none; position: fixed; inset:0; background: rgba(0,0,0,0.9); z-index: 5000; align-items: center; justify-content: center;">
        <img id="zoomImg" src="" style="max-width: 90%; max-height: 80vh; border-radius: 20px;">
    </div>

    <footer>
        <p>Kn2 Personalizados © 2024</p>
        <div style="margin: 15px 0;">
            <a href="https://www.instagram.com/arteskn2" target="_blank" style="color: var(--accent); text-decoration: none;">Instagram 📸</a>
        </div>
        <p style="font-size: 13px; background: rgba(255,255,255,0.05); display: inline-block; padding: 5px 15px; border-radius: 20px;">
            👁️ <span id="visitorCount">Carregando...</span> visitas reais
        </p>
    </footer>

    <script>
        const SUPABASE_URL = "https://kdoxzjdvpbdwpzyaqary.supabase.co";
        const SUPABASE_KEY = "sb_publishable_4WrcBi_Cy8yRg8v0D3_BQw_1XuBID4V";
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let products = [];
        let cart = JSON.parse(localStorage.getItem("cart")) || [];
        let query = "";
        let currentCat = "Todos";

        async function init() {
            handleVisits();
            await loadProducts();
            setupRealtime();
            renderCategories();
            renderGrid();
        }

        // --- CONTADOR DE VISITAS REAL (via Banco) ---
        async function handleVisits() {
            // Incrementa no banco
            await _supabase.rpc('increment_visits'); 
            // Se não quiser usar RPC, pode usar um update simples:
            const { data } = await _supabase.from('estatisticas').select('visitas').eq('id', 1).single();
            if(data) {
                const novoTotal = data.visitas + 1;
                await _supabase.from('estatisticas').update({ visitas: novoTotal }).eq('id', 1);
                document.getElementById('visitorCount').innerText = novoTotal.toLocaleString();
            }
        }

        async function loadProducts() {
            const { data } = await _supabase.from('produtos').select('*').order('created_at', { ascending: false });
            products = data || [];
        }

        function setupRealtime() {
            _supabase.channel('db-all').on('postgres_changes', { event: '*', schema: 'public', table: 'produtos' }, () => {
                loadProducts().then(() => renderGrid());
            }).subscribe();
        }

        // --- SISTEMA DE LIKES REAL ---
        async function toggleLike(id, event) {
            event.stopPropagation();
            const btn = event.currentTarget;
            const isLiked = btn.classList.contains('active');
            
            // Lógica otimista (muda na tela antes do banco)
            const product = products.find(p => p.id == id);
            if(!isLiked) {
                product.likes = (product.likes || 0) + 1;
                btn.classList.add('active');
                await _supabase.from('produtos').update({ likes: product.likes }).eq('id', id);
            }
        }

        function renderGrid() {
            const container = document.getElementById('catalogContainer');
            container.innerHTML = "";
            
            const filtered = products.filter(p => 
                (currentCat === "Todos" || p.category === currentCat) &&
                p.title.toLowerCase().includes(query.toLowerCase())
            );

            const catsInGrid = [...new Set(filtered.map(p => p.category))];
            catsInGrid.forEach(cat => {
                const section = document.createElement('div');
                section.innerHTML = `<h2 style="margin: 40px 0 20px; font-size: 14px; text-transform: uppercase; color: var(--accent); letter-spacing: 1px;">${cat}</h2>`;
                const grid = document.createElement('div');
                grid.className = 'productsGrid';
                
                filtered.filter(p => p.category === cat).forEach(p => {
                    grid.innerHTML += `
                        <div class="card">
                            <div class="like-container">
                                <button class="btn-like" onclick="toggleLike('${p.id}', event)">❤</button>
                                <span class="like-count">${p.likes || 0}</span>
                            </div>
                            <div class="img-container">
                                <img src="${p.image_url}" class="productImage" onclick="openZoom('${p.image_url}')">
                            </div>
                            <div class="card__body">
                                <h4 style="margin-bottom:12px; font-size:15px;">${p.title}</h4>
                                <div style="display:flex; justify-content:space-between; align-items:center">
                                    <span style="font-weight:900; color:var(--accent); font-size:18px;">R$ ${p.price.toFixed(2)}</span>
                                    <button class="btn btn-primary" onclick="addToCart('${p.id}')" style="padding: 8px 12px; font-size:13px;">Add</button>
                                </div>
                            </div>
                        </div>`;
                });
                section.appendChild(grid);
                container.appendChild(section);
            });
        }

        function renderCategories() {
            const nav = document.getElementById('categoryNav');
            const cats = ["Todos", ...new Set(products.map(p => p.category))];
            nav.innerHTML = cats.map(c => `
                <button class="cat-btn ${currentCat === c ? 'active' : ''}" onclick="filterCat('${c}')">${c}</button>
            `).join('');
        }

        function filterCat(c) { currentCat = c; renderCategories(); renderGrid(); }
        function openZoom(url) { 
            const m = document.getElementById('zoomModal');
            document.getElementById('zoomImg').src = url;
            m.style.display = 'flex';
        }
        
        document.getElementById('searchInput').oninput = (e) => { query = e.target.value; renderGrid(); };

        init();
    </script>
</body>
</html>
