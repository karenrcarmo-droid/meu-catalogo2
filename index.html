<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kn2 Personalizados | Catálogo Profissional</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg: #0b0f17; --card: #111827; --muted: #9ca3af; --text: #f3f4f6;
            --border: rgba(255, 255, 255, .06); --accent: #22c55e; --danger: #ef4444;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: system-ui, -apple-system, sans-serif; overflow-x: hidden; line-height: 1.5; }
        .container { width: min(1200px, 94vw); margin: auto; }
        
        /* HEADER FLUIDO */
        .topbar { position: sticky; top: 0; z-index: 1000; background: rgba(11, 15, 23, .85); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); padding: 12px 0; }
        .topbar__inner { display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 24px; font-weight: 900; letter-spacing: -1px; }

        /* BOTOES E INPUTS */
        .btn { border: none; cursor: pointer; border-radius: 12px; padding: 10px 20px; font-weight: 700; transition: all .2s ease; display: inline-flex; align-items: center; justify-content: center; gap: 8px; }
        .btn:active { transform: scale(0.96); }
        .btn-primary { background: var(--accent); color: #fff; }
        .btn-dark { background: #1f2937; color: #fff; }
        
        input, select { background: #111827; border: 1px solid var(--border); color: #fff; padding: 12px; border-radius: 12px; outline: none; width: 100%; transition: border .2s; }
        input:focus { border-color: var(--accent); }

        /* GRID DE PRODUTOS */
        .categoryBlock { margin-top: 40px; }
        .categoryHeading { font-size: 20px; margin-bottom: 20px; color: var(--muted); display: flex; align-items: center; gap: 10px; }
        .categoryHeading::after { content: ""; flex: 1; height: 1px; background: var(--border); }
        
        .productsGrid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 20px; }
        .card { background: var(--card); border-radius: 20px; border: 1px solid var(--border); overflow: hidden; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); display: flex; flex-direction: column; }
        .card:hover { transform: translateY(-6px); border-color: rgba(34, 197, 94, 0.3); box-shadow: 0 12px 30px rgba(0,0,0,0.4); }
        .productImage { width: 100%; height: 250px; object-fit: cover; background: #0f172a; cursor: zoom-in; }
        .card__body { padding: 16px; flex-grow: 1; display: flex; flex-direction: column; }
        .price { color: var(--accent); font-size: 22px; font-weight: 900; }

        /* CARRINHO LATERAL */
        .cartSidebar { position: fixed; top: 0; right: -450px; width: 400px; max-width: 100%; height: 100vh; background: #0b0f17; z-index: 10000; transition: right 0.4s cubic-bezier(0.4, 0, 0.2, 1); border-left: 1px solid var(--border); display: flex; flex-direction: column; }
        .cartSidebar.active { right: 0; }
        .cartBody { flex: 1; overflow-y: auto; padding: 20px; }
        .cartItem { display: flex; gap: 15px; margin-bottom: 15px; background: var(--card); padding: 12px; border-radius: 15px; border: 1px solid var(--border); }
        .cartItem img { width: 60px; height: 60px; border-radius: 10px; object-fit: cover; }

        /* MODAIS */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: none; align-items: center; justify-content: center; z-index: 11000; backdrop-filter: blur(5px); }
        .modal.active { display: flex; }
        .modal__content { background: var(--card); padding: 25px; border-radius: 24px; width: min(500px, 94vw); max-height: 90vh; overflow-y: auto; border: 1px solid var(--border); }

        @media (max-width: 600px) { .productsGrid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <header class="topbar">
        <div class="container topbar__inner">
            <div class="logo">KN2</div>
            <div style="display: flex; gap: 10px;">
                <button class="btn btn-dark" onclick="toggleCart()">🛒 <span id="cartCount">0</span></button>
                <button class="btn btn-primary" id="adminBtn">Painel</button>
            </div>
        </div>
    </header>

    <main class="container">
        <div style="margin: 25px 0;">
            <input type="text" id="searchInput" placeholder="O que você procura hoje?">
            <div id="menuRow" style="display: flex; gap: 8px; margin-top: 15px; overflow-x: auto; padding-bottom: 5px;"></div>
        </div>

        <div id="catalogContainer"></div>
        <div id="loading" style="text-align: center; padding: 50px; opacity: 0.5;">Sincronizando produtos...</div>
    </main>

    <div class="cartSidebar" id="cartSidebar">
        <div style="padding: 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between;">
            <h3>Seu Pedido</h3>
            <button onclick="toggleCart()" style="background: none; border: none; color: #fff; cursor: pointer;">✕</button>
        </div>
        <div class="cartBody" id="cartItems"></div>
        <div style="padding: 20px; border-top: 1px solid var(--border);">
            <div style="display: flex; justify-content: space-between; margin-bottom: 15px;">
                <span>Total:</span>
                <span class="price" id="cartTotal">R$ 0,00</span>
            </div>
            <button class="btn btn-primary" style="width: 100%;" onclick="sendWhatsApp()">Finalizar no WhatsApp</button>
        </div>
    </div>

    <div class="modal" id="adminModal">
        <div class="modal__content">
            <h3 id="modalTitle">Novo Produto</h3>
            <div style="display: grid; gap: 12px; margin-top: 15px;">
                <input type="hidden" id="editId">
                <input type="text" id="pTitle" placeholder="Nome do Produto">
                <input type="text" id="pCat" placeholder="Categoria (Ex: Canecas)">
                <input type="number" id="pPrice" step="0.01" placeholder="Preço (Ex: 35.90)">
                <input type="file" id="pImage" accept="image/*">
                <button class="btn btn-primary" id="saveBtn">Salvar Produto</button>
                <button class="btn btn-dark" onclick="closeAdmin()">Cancelar</button>
            </div>
            <div id="adminList" style="margin-top: 25px; border-top: 1px solid var(--border); padding-top: 15px;"></div>
        </div>
    </div>

    <script>
        // CONFIGURAÇÃO CORRIGIDA
        const SUPABASE_URL = "https://kdoxzjdvpbdwpzyaqary.supabase.co";
        const SUPABASE_KEY = "sb_publishable_4WrcBi_Cy8yRg8v0D3_BQw_1XuBID4V";
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let products = [];
        let cart = JSON.parse(localStorage.getItem("cart")) || [];
        let activeCat = "Todos";
        let query = "";

        async function init() {
            await loadProducts();
            setupRealtime();
            renderAll();
            updateCartUI();
        }

        async function loadProducts() {
            const { data, error } = await _supabase.from('produtos').select('*').order('created_at', { ascending: false });
            if (!error) products = data;
            document.getElementById('loading').style.display = 'none';
        }

        // REALTIME: O SEGREDO DA FLUIDEZ
        function setupRealtime() {
            _supabase.channel('custom-all-channel')
            .on('postgres_changes', { event: '*', schema: 'public', table: 'produtos' }, (payload) => {
                if (payload.eventType === 'INSERT') products.unshift(payload.new);
                if (payload.eventType === 'UPDATE') {
                    const idx = products.findIndex(p => p.id === payload.new.id);
                    if (idx !== -1) products[idx] = payload.new;
                }
                if (payload.eventType === 'DELETE') products = products.filter(p => p.id !== payload.old.id);
                renderAll();
            }).subscribe();
        }

        function renderAll() {
            renderCategories();
            renderGrid();
        }

        function renderCategories() {
            const row = document.getElementById('menuRow');
            const cats = ["Todos", ...new Set(products.map(p => p.category))];
            row.innerHTML = cats.map(c => `
                <button class="btn ${activeCat === c ? 'btn-primary' : 'btn-dark'}" 
                        onclick="filterCat('${c}')" style="white-space:nowrap; border-radius:99px; padding: 6px 16px; font-size:13px;">
                    ${c}
                </button>
            `).join('');
        }

        function renderGrid() {
            const container = document.getElementById('catalogContainer');
            container.innerHTML = "";
            
            const filtered = products.filter(p => 
                (activeCat === "Todos" || p.category === activeCat) &&
                p.title.toLowerCase().includes(query.toLowerCase())
            );

            const groups = [...new Set(filtered.map(p => p.category))];
            groups.forEach(cat => {
                const section = document.createElement('div');
                section.className = 'categoryBlock';
                section.innerHTML = `<div class="categoryHeading">${cat}</div>`;
                const grid = document.createElement('div');
                grid.className = 'productsGrid';
                
                filtered.filter(p => p.category === cat).forEach(p => {
                    grid.innerHTML += `
                        <div class="card">
                            <img src="${p.image_url}" class="productImage" onclick="window.open('${p.image_url}')" loading="lazy">
                            <div class="card__body">
                                <h4 style="margin-bottom:8px">${p.title}</h4>
                                <div style="display:flex; justify-content:space-between; align-items:center; margin-top:auto">
                                    <span class="price">R$ ${p.price.toFixed(2).replace('.',',')}</span>
                                    <button class="btn btn-primary" onclick="addToCart('${p.id}')" style="padding:8px 12px">🛒 Add</button>
                                </div>
                            </div>
                        </div>`;
                });
                section.appendChild(grid);
                container.appendChild(section);
            });
        }

        // CARRINHO FLUIDO
        function addToCart(id) {
            const p = products.find(prod => prod.id == id);
            const inCart = cart.find(item => item.id == id);
            if (inCart) inCart.qty++; else cart.push({...p, qty: 1});
            updateCartUI();
            toggleCart(true);
        }

        function updateCartUI() {
            localStorage.setItem("cart", JSON.stringify(cart));
            const container = document.getElementById('cartItems');
            let total = 0;
            container.innerHTML = cart.map(item => {
                total += item.price * item.qty;
                return `
                    <div class="cartItem">
                        <img src="${item.image_url}">
                        <div style="flex:1">
                            <div style="font-size:14px; font-weight:700">${item.title}</div>
                            <div style="display:flex; justify-content:space-between; align-items:center; margin-top:8px">
                                <span>${item.qty}x R$ ${item.price.toFixed(2)}</span>
                                <button onclick="removeFromCart('${item.id}')" style="background:none; border:none; color:var(--danger); cursor:pointer">Remover</button>
                            </div>
                        </div>
                    </div>`;
            }).join('');
            document.getElementById('cartTotal').innerText = `R$ ${total.toFixed(2).replace('.',',')}`;
            document.getElementById('cartCount').innerText = cart.reduce((a, b) => a + b.qty, 0);
        }

        function removeFromCart(id) {
            cart = cart.filter(i => i.id != id);
            updateCartUI();
        }

        function toggleCart(forceOpen = false) {
            const s = document.getElementById('cartSidebar');
            forceOpen ? s.classList.add('active') : s.classList.toggle('active');
        }

        function filterCat(c) { activeCat = c; renderAll(); }
        document.getElementById('searchInput').oninput = (e) => { query = e.target.value; renderGrid(); };

        // ADMIN E UPLOAD COM COMPRESSÃO
        document.getElementById('adminBtn').onclick = async () => {
            const { data: { user } } = await _supabase.auth.getUser();
            if (user) {
                document.getElementById('adminModal').classList.add('active');
                renderAdminList();
            } else {
                const email = prompt("E-mail Admin:");
                const pass = prompt("Senha:");
                const { error } = await _supabase.auth.signInWithPassword({ email, password: pass });
                if (!error) location.reload(); else alert("Acesso negado");
            }
        };

        function closeAdmin() { document.getElementById('adminModal').classList.remove('active'); }

        async function renderAdminList() {
            const container = document.getElementById('adminList');
            container.innerHTML = products.map(p => `
                <div style="display:flex; justify-content:space-between; padding:10px 0; border-bottom:1px solid var(--border)">
                    <span>${p.title}</span>
                    <button onclick="deleteProduct('${p.id}')" style="color:var(--danger); background:none; border:none; cursor:pointer">Excluir</button>
                </div>
            `).join('');
        }

        document.getElementById('saveBtn').onclick = async function() {
            const title = document.getElementById('pTitle').value;
            const category = document.getElementById('pCat').value;
            const price = parseFloat(document.getElementById('pPrice').value);
            const file = document.getElementById('pImage').files[0];

            if (!title || !price) return alert("Preencha os dados básicos");
            this.disabled = true;
            this.innerText = "Enviando...";

            try {
                let image_url = "";
                if (file) {
                    const path = `produtos/${Date.now()}.jpg`;
                    await _supabase.storage.from('imagens-produtos').upload(path, file);
                    const { data } = _supabase.storage.from('imagens-produtos').getPublicUrl(path);
                    image_url = data.publicUrl;
                }

                const { error } = await _supabase.from('produtos').insert([{ title, category, price, image_url }]);
                if (error) throw error;
                alert("Produto Adicionado!");
                closeAdmin();
            } catch (e) { alert(e.message); } 
            finally { this.disabled = false; this.innerText = "Salvar Produto"; }
        };

        async function deleteProduct(id) {
            if (confirm("Deseja apagar este item?")) {
                await _supabase.from('produtos').delete().eq('id', id);
                renderAdminList();
            }
        }

        function sendWhatsApp() {
            if (cart.length === 0) return;
            let msg = "Olá Kn2! Gostaria de fazer esse pedido:%0A%0A";
            cart.forEach(i => msg += `• ${i.title} (x${i.qty})%0A`);
            msg += `%0A*Total: ${document.getElementById('cartTotal').innerText}*`;
            window.open(`https://wa.me/5531999683959?text=${msg}`);
        }

        init();
    </script>
</body>
</html>
