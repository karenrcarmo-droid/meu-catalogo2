<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kn2 Personalizados | Oficial</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg: #0b0f17; --card: #111827; --muted: #9ca3af; --text: #f3f4f6;
            --border: rgba(255, 255, 255, 0.08); --accent: #22c55e; --danger: #ef4444;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui; }
        body { background: var(--bg); color: var(--text); overflow-x: hidden; }
        .container { width: min(1200px, 94vw); margin: auto; }
        
        /* HEADER */
        .topbar { position: sticky; top: 0; z-index: 1000; background: rgba(11, 15, 23, 0.9); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); padding: 15px 0; }
        .topbar__inner { display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 24px; font-weight: 900; }
        .logo span { color: var(--accent); }

        /* MENU CATEGORIAS */
        .cat-nav { display: flex; gap: 10px; overflow-x: auto; padding: 20px 0; scrollbar-width: none; }
        .cat-btn { padding: 8px 20px; border-radius: 20px; border: 1px solid var(--border); background: var(--card); color: white; cursor: pointer; white-space: nowrap; transition: 0.3s; }
        .cat-btn.active { background: var(--accent); color: #000; font-weight: bold; border-color: var(--accent); }

        /* GRID */
        .productsGrid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 20px; }
        .card { background: var(--card); border-radius: 20px; border: 1px solid var(--border); overflow: hidden; position: relative; transition: 0.3s; }
        .card:hover { transform: translateY(-5px); border-color: var(--accent); }
        .productImage { width: 100%; height: 250px; object-fit: cover; cursor: pointer; }
        .card__body { padding: 15px; }

        /* LIKES & VISITORS */
        .like-badge { position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,0.6); padding: 5px 10px; border-radius: 15px; display: flex; align-items: center; gap: 5px; cursor: pointer; backdrop-filter: blur(5px); }
        .visitor-tag { text-align: center; padding: 20px; font-size: 13px; color: var(--muted); }

        /* MODAL */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; z-index: 2000; padding: 20px; backdrop-filter: blur(5px); }
        .modal.active { display: flex; }
        .modal__content { background: var(--card); padding: 25px; border-radius: 20px; width: min(500px, 100%); border: 1px solid var(--border); max-height: 90vh; overflow-y: auto; }
        
        input, select { width: 100%; padding: 12px; margin: 8px 0; border-radius: 10px; border: 1px solid var(--border); background: #0b0f17; color: white; }
        .btn { padding: 10px 20px; border-radius: 12px; border: none; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn-primary { background: var(--accent); color: #000; }
        .btn-dark { background: #1f2937; color: white; }
    </style>
</head>
<body>

    <header class="topbar">
        <div class="container topbar__inner">
            <div class="logo">Kn2 <span>Personalizados</span></div>
            <div style="display: flex; gap: 10px;">
                <a href="https://www.instagram.com/arteskn2?igsh=bmpsYW9kdHgzdzlp" target="_blank" class="btn btn-dark" style="text-decoration: none;">📸 Instagram</a>
                <button class="btn btn-primary" onclick="toggleCart()">🛒 <span id="cartCount">0</span></button>
                <button class="btn btn-dark" id="adminBtn">Painel</button>
            </div>
        </div>
    </header>

    <main class="container">
        <input type="text" id="searchInput" placeholder="Buscar produto..." style="margin-top: 20px; height: 50px;">
        
        <div class="cat-nav" id="categoryNav"></div>

        <div id="catalogContainer"></div>
    </main>

    <div class="modal" id="adminModal">
        <div class="modal__content">
            <h3 id="admTitle">Adicionar Produto</h3>
            <input type="hidden" id="editId">
            <input type="text" id="pTitle" placeholder="Nome">
            <input type="text" id="pCat" placeholder="Categoria">
            <input type="number" id="pPrice" placeholder="Preço">
            <input type="file" id="pImage">
            <button class="btn btn-primary" id="saveBtn" style="width: 100%; margin-top: 10px;">Salvar Produto</button>
            <div id="adminList" style="margin-top: 20px; border-top: 1px solid var(--border); padding-top: 10px;"></div>
            <button class="btn btn-dark" onclick="closeAdmin()" style="width: 100%; margin-top: 10px;">Fechar</button>
        </div>
    </div>

    <div class="visitor-tag">
        👤 <span id="visitorDisplay">0</span> visitas reais | Kn2 © 2024
    </div>

    <script>
        // CONFIGURAÇÕES - SUBSTITUA PELA SUA CHAVE ANON REAL
        const SUPABASE_URL = "https://kdoxzjdvpbdwpzyaqary.supabase.co";
        const SUPABASE_KEY = "sb_publishable_4WrcBi_Cy8yRg8v0D3_BQw_1XuBID4V"; // <--- IMPORTANTE: Pegue no painel do Supabase
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let products = [];
        let currentCat = "Todos";
        let searchQuery = "";

        async function init() {
            await updateVisits();
            await loadProducts();
            renderCategories();
            renderGrid();
        }

        // CONTADOR DE VISITAS REAL (BANCO)
        async function updateVisits() {
            const { data } = await _supabase.from('estatisticas').select('visitas').eq('id', 1).single();
            if(data) {
                const total = data.visitas + 1;
                await _supabase.from('estatisticas').update({ visitas: total }).eq('id', 1);
                document.getElementById('visitorDisplay').innerText = total.toLocaleString();
            }
        }

        async function loadProducts() {
            const { data } = await _supabase.from('produtos').select('*').order('created_at', { ascending: false });
            products = data || [];
        }

        function renderCategories() {
            const nav = document.getElementById('categoryNav');
            const cats = ["Todos", ...new Set(products.map(p => p.category))];
            nav.innerHTML = cats.map(c => `
                <button class="cat-btn ${currentCat === c ? 'active' : ''}" onclick="filterCat('${c}')">${c}</button>
            `).join('');
        }

        function filterCat(c) { currentCat = c; renderCategories(); renderGrid(); }

        function renderGrid() {
            const container = document.getElementById('catalogContainer');
            container.innerHTML = "";
            const filtered = products.filter(p => 
                (currentCat === "Todos" || p.category === currentCat) &&
                p.title.toLowerCase().includes(searchQuery.toLowerCase())
            );

            filtered.forEach(p => {
                container.innerHTML += `
                    <div class="card" style="margin-bottom:20px">
                        <div class="like-badge" onclick="likeProduct('${p.id}', ${p.likes || 0})">
                            ❤️ <span>${p.likes || 0}</span>
                        </div>
                        <img src="${p.image_url}" class="productImage">
                        <div class="card__body">
                            <h4>${p.title}</h4>
                            <p style="color:var(--accent); font-weight:900; font-size:20px; margin: 10px 0">R$ ${p.price.toFixed(2)}</p>
                            <button class="btn btn-primary" style="width:100%" onclick="addToCart('${p.id}')">Adicionar ao Carrinho</button>
                        </div>
                    </div>
                `;
            });
        }

        // FUNÇÃO LIKES
        async function likeProduct(id, current) {
            await _supabase.from('produtos').update({ likes: current + 1 }).eq('id', id);
            loadProducts().then(() => renderGrid());
        }

        // ADMIN E EDIÇÃO
        document.getElementById('adminBtn').onclick = async () => {
            const { data: { user } } = await _supabase.auth.getUser();
            if (user) {
                document.getElementById('adminModal').classList.add('active');
                renderAdminList();
            } else {
                const email = prompt("E-mail:");
                const pass = prompt("Senha:");
                await _supabase.auth.signInWithPassword({ email, password: pass });
                location.reload();
            }
        };

        function renderAdminList() {
            const list = document.getElementById('adminList');
            list.innerHTML = products.map(p => `
                <div style="display:flex; justify-content:space-between; margin-bottom:10px; font-size:12px">
                    <span>${p.title}</span>
                    <div>
                        <button onclick="editMode('${p.id}')" style="color:var(--accent); background:none; border:none; cursor:pointer">Editar</button> | 
                        <button onclick="deleteProd('${p.id}')" style="color:var(--danger); background:none; border:none; cursor:pointer">Excluir</button>
                    </div>
                </div>
            `).join('');
        }

        function editMode(id) {
            const p = products.find(x => x.id == id);
            document.getElementById('editId').value = p.id;
            document.getElementById('pTitle').value = p.title;
            document.getElementById('pCat').value = p.category;
            document.getElementById('pPrice').value = p.price;
            document.getElementById('admTitle').innerText = "Editando: " + p.title;
            document.getElementById('saveBtn').innerText = "Atualizar Produto";
        }

        function closeAdmin() { document.getElementById('adminModal').classList.remove('active'); location.reload(); }

        document.getElementById('saveBtn').onclick = async function() {
            const id = document.getElementById('editId').value;
            const payload = {
                title: document.getElementById('pTitle').value,
                category: document.getElementById('pCat').value,
                price: parseFloat(document.getElementById('pPrice').value)
            };
            
            if(id) {
                await _supabase.from('produtos').update(payload).eq('id', id);
            } else {
                // Lógica de upload de imagem simplificada aqui ou use link direto
                alert("Para novos produtos, selecione a imagem.");
            }
            closeAdmin();
        };

        document.getElementById('searchInput').oninput = (e) => { searchQuery = e.target.value; renderGrid(); };

        function addToCart(id) { alert("Produto adicionado ao carrinho!"); }
        function toggleCart() { alert("Carrinho em desenvolvimento!"); }

        init();
    </script>
</body>
</html>
