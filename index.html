<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kn2 Catálogo | Admin Dinâmico</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --bg: #0b0f17; --card: #111827; --text: #e5e7eb;
      --muted: #9ca3af; --border: rgba(255,255,255,.08);
      --accent: #22c55e; --danger: #ef4444;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui, sans-serif; }
    body { background: var(--bg); color: var(--text); }
    .container { width: min(1200px, 92vw); margin: auto; }

    /* HEADER & HERO */
    .topbar { position: sticky; top: 0; z-index: 1000; backdrop-filter: blur(12px); background: rgba(11,15,23,0.85); border-bottom: 1px solid var(--border); padding: 12px 0; }
    .hero { padding: 40px 0; text-align: center; }
    .brand-logo { max-width: 250px; height: auto; border-radius: 15px; cursor: pointer; }

    /* BOTÕES */
    .btn { border: none; cursor: pointer; border-radius: 12px; padding: 10px 18px; color: white; font-weight: 700; transition: .2s; display: inline-flex; align-items: center; gap: 8px; }
    .btn-primary { background: var(--accent); }
    .btn-dark { background: #1f2937; }
    .btn-danger { background: var(--danger); }

    /* GRID & CARDS */
    .productsGrid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 20px; }
    .card { background: var(--card); border-radius: 20px; border: 1px solid var(--border); padding: 15px; }
    .productImage { width: 100%; height: 250px; object-fit: cover; border-radius: 15px; margin-bottom: 15px; }

    /* MODAL */
    .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: none; justify-content: center; align-items: center; z-index: 9999; }
    .modal.active { display: flex; }
    .modal__content { width: min(600px, 92vw); max-height: 90vh; overflow: auto; background: var(--card); border-radius: 24px; padding: 30px; border: 1px solid var(--border); }
    
    .admin-section { background: rgba(255,255,255,0.03); padding: 15px; border-radius: 15px; margin-bottom: 20px; border: 1px solid var(--border); }
    input, select { width: 100%; padding: 12px; background: #0b0f17; border: 1px solid var(--border); color: white; border-radius: 10px; margin-top: 5px; }
  </style>
</head>
<body>

  <header class="topbar">
    <div class="container" style="display:flex; justify-content:space-between; align-items:center">
      <div style="font-weight:900; font-size:20px">Kn2 Catálogo</div>
      <div style="display:flex; gap:10px">
        <button class="btn btn-dark" onclick="toggleCart()">🛒 <span id="cartCount">0</span></button>
        <button class="btn btn-primary" id="openAdminBtn">Admin</button>
      </div>
    </div>
  </header>

  <main class="container">
    <section class="hero">
      <img src="" id="mainLogo" class="brand-logo" alt="Logo Kn2">
    </section>

    <div id="catalogContainer" class="productsGrid"></div>
  </main>

  <div class="modal" id="adminModal">
    <div class="modal__content">
      <h2 style="margin-bottom:20px">Painel Administrativo</h2>

      <div class="admin-section">
        <h4 style="color:var(--accent); margin-bottom:10px">🎨 Identidade Visual</h4>
        <label style="font-size:12px">Trocar Logo do Site</label>
        <input type="file" id="logoUpload" accept="image/*">
        <button class="btn btn-primary" style="width:100%; margin-top:10px; justify-content:center" id="btnUpdateLogo">Atualizar Logo</button>
      </div>

      <div class="admin-section">
        <h4 style="margin-bottom:10px">📦 Novo Produto</h4>
        <input type="text" id="pTitle" placeholder="Nome do produto">
        <input type="number" id="pPrice" placeholder="Preço">
        <select id="pCat"></select>
        <input type="file" id="pImage" accept="image/*">
        <button class="btn btn-primary" style="width:100%; margin-top:10px; justify-content:center" id="saveProductBtn">Salvar Produto</button>
      </div>

      <button class="btn btn-dark" style="width:100%" onclick="document.getElementById('adminModal').classList.remove('active')">Fechar</button>
    </div>
  </div>

  <script>
    const SUPABASE_URL = "https://kdoxzjdvpbdwpzyaqary.supabase.co";
    const SUPABASE_KEY = "sb_publishable_4WrcBi_Cy8yRg8v0D3_BQw_1XuBID4V";
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    async function init() {
      await loadLogo();
      await loadProducts();
      // ... outras funções de inicialização (menu, cart)
    }

    // CARREGAR LOGO DO BANCO DE DADOS
    async function loadLogo() {
      const { data } = await _supabase.from('configuracoes_site').select('logo_url').eq('id', 'config_geral').single();
      if (data && data.logo_url) {
        document.getElementById('mainLogo').src = data.logo_url;
      }
    }

    // ATUALIZAR LOGO (UPLOAD)
    document.getElementById('btnUpdateLogo').onclick = async () => {
      const file = document.getElementById('logoUpload').files[0];
      if (!file) return alert("Selecione uma imagem!");

      const btn = document.getElementById('btnUpdateLogo');
      btn.innerText = "Subindo...";
      btn.disabled = true;

      try {
        const fileName = `logo_${Date.now()}.jpg`;
        const { error: uploadError } = await _supabase.storage.from('imagens-produtos').upload(`sistema/${fileName}`, file);
        if (uploadError) throw uploadError;

        const { data: { publicUrl } } = _supabase.storage.from('imagens-produtos').getPublicUrl(`sistema/${fileName}`);

        const { error: dbError } = await _supabase.from('configuracoes_site').update({ logo_url: publicUrl }).eq('id', 'config_geral');
        if (dbError) throw dbError;

        alert("Logo atualizada com sucesso!");
        location.reload();
      } catch (e) {
        alert("Erro: " + e.message);
      } finally {
        btn.innerText = "Atualizar Logo";
        btn.disabled = false;
      }
    };

    async function loadProducts() {
        const { data } = await _supabase.from('produtos').select('*');
        const container = document.getElementById('catalogContainer');
        container.innerHTML = data.map(p => `
            <div class="card">
                <img src="${p.image_url}" class="productImage">
                <h3>${p.title}</h3>
                <p style="color:var(--accent); font-weight:bold">R$ ${p.price}</p>
            </div>
        `).join('');
    }

    document.getElementById('openAdminBtn').onclick = () => document.getElementById('adminModal').classList.add('active');

    init();
  </script>
</body>
</html>
