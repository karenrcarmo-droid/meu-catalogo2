<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kn2 Personalizados | Catálogo</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg: #0b0f17; --card: #111827; --text: #f3f4f6; --muted: #9ca3af;
            --accent: #22c55e; --danger: #ef4444; --border: rgba(255, 255, 255, 0.08);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui; }
        body { background: var(--bg); color: var(--text); overflow-x: hidden; }
        .container { width: min(1200px, 94vw); margin: auto; }
        
        /* HEADER E NAVIGATION */
        .topbar { position: sticky; top: 0; z-index: 1000; background: rgba(11, 15, 23, 0.9); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); padding: 15px 0; }
        .topbar__inner { display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 24px; font-weight: 900; }
        .logo span { color: var(--accent); }
        .nav-cats { display: flex; gap: 10px; overflow-x: auto; padding: 15px 0; scrollbar-width: none; }
        .cat-btn { padding: 8px 20px; border-radius: 20px; border: 1px solid var(--border); background: var(--card); color: white; cursor: pointer; white-space: nowrap; transition: 0.3s; }
        .cat-btn.active { background: var(--accent); color: #000; font-weight: bold; border-color: var(--accent); }

        /* GRID E CARDS */
        .productsGrid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 20px; margin-top: 20px; }
        .card { background: var(--card); border-radius: 20px; border: 1px solid var(--border); overflow: hidden; position: relative; transition: 0.3s; display: flex; flex-direction: column; }
        .card:hover { transform: translateY(-5px); border-color: var(--accent); }
        .productImage { width: 100%; height: 250px; object-fit: cover; cursor: pointer; }
        .card__body { padding: 15px; flex-grow: 1; display: flex; flex-direction: column; }
        .price { color: var(--accent); font-size: 22px; font-weight: 900; margin: 10px 0; }
        .like-badge { position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,0.6); padding: 5px 12px; border-radius: 15px; cursor: pointer; backdrop-filter: blur(5px); }

        /* MODAIS E FORMS */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: none; align-items: center; justify-content: center; z-index: 2000; padding: 20px; backdrop-filter: blur(5px); }
        .modal.active { display: flex; }
        .modal__content { background: var(--card); padding: 25px; border-radius: 24px; width: min(600px, 100%); border: 1px solid var(--border); max-height: 90vh; overflow-y: auto; }
        input, select { width: 100%; padding: 12px; margin: 8px 0; border-radius: 12px; border: 1px solid var(--border); background: #0b0f17; color: white; }
        .btn { padding: 12px 20px; border-radius: 14px; border: none; cursor: pointer; font-weight: bold; transition: 0.2s; display: inline-flex; align-items: center; gap: 8px; text-decoration: none; justify-content: center;}
        .btn-primary { background: var(--accent); color: #000; }
        .btn-dark { background: #1f2937; color: white; }
        
        /* ADMIN LIST */
        .admin-item { display: flex; gap: 12px; align-items: center; padding: 10px; background: #0b0f17; border-radius: 12px; margin-bottom: 8px; border: 1px solid var(--border); }
        .admin-item img { width: 50px; height: 50px; border-radius: 8px; object-fit: cover; }
    </style>
</head>
<body>

    <header class="topbar">
        <div class="container topbar__inner">
            <div class="logo">Kn2 <span>Catálogo</span></div>
            <div style="display: flex; gap: 10px;">
                <a href="https://www.instagram.com/arteskn2?igsh=bmpsYW9kdHgzdzlp" target="_blank" class="btn btn-dark">📸 Instagram</a>
                <button class="btn btn-primary" id="cartBtn">🛒 <span id="cartCount">0</span></button>
                <button class="btn btn-dark" id="adminBtn">Admin</button>
            </div>
        </div>
    </header>

    <main class="container">
        <input type="text" id="searchInput" placeholder="Pesquisar produtos..." style="margin-top:20px; height: 55px; border-radius: 18px;">
        <div class="nav-cats" id="categoryNav"></div>
        <div id="catalogContainer" class="productsGrid"></div>
    </main>

    <footer style="text-align: center; padding: 40px; color: var(--muted); font-size: 13px;">
        👤 Visitas: <span id="visitCount">0</span> | Kn2 © 2024
    </footer>

    <div class="modal" id="adminModal">
        <div class="modal__content">
            <h2 id="admHeader">Gerenciar Catálogo</h2>
            <div id="formArea" style="margin-top: 15px;">
                <input type="hidden" id="editId">
                <input type="text" id="pTitle" placeholder="Nome do Produto">
                <input type="text" id="pCat" placeholder="Categoria">
                <input type="number" id="pPrice" placeholder="Preço">
                <label style="font-size:12px; color:gray">Nova Imagem (opcional para editar):</label>
                <input type="file" id="pImage" accept="image/*">
                <button class="btn btn-primary" id="saveBtn" style="width: 100%; margin-top: 10px;">Salvar Produto</button>
            </div>
            <hr style="margin: 20px 0; opacity: 0.1;">
            <h3>Seus Produtos</h3>
            <div id="adminList" style="margin-top: 15px;"></div>
            <button class="btn btn-dark" onclick="closeAdmin()" style="width:100%; margin-top:15px;">Fechar</button>
        </div>
    </div>

    <script>
        // CONFIGURAÇÕES - USE SUA CHAVE ANON REAL
        const SUPABASE_URL = "https://kdoxzjdvpbdwpzyaqary.supabase.co";
        const SUPABASE_KEY = "SUA_ANON_KEY_REAL_AQUI"; // <--- COLOQUE A CHAVE DO SEU PAINEL AQUI
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let products = [];
        let currentCat = "Todos";
        let searchTerm = "";

        // INICIALIZAÇÃO "BLINDADA"
        async function init() {
            try { await updateVisits(); } catch(e) {} // Não trava se a tabela estatisticas não existir
            await loadData();
            renderMenu();
            renderGrid();
        }

        async function updateVisits() {
            const { data } = await _supabase.from('estatisticas').select('visitas').eq('id', 1).single();
            if(data) {
                const total = data.visitas + 1;
                await _supabase.from('estatisticas').update({ visitas: total }).eq('id', 1);
                document.getElementById('visitCount').innerText = total;
            }
        }

        async function loadData() {
            const { data } = await _supabase.from('produtos').select('*').order('created_at', { ascending: false });
            products = data || [];
        }

        function renderMenu() {
            const nav = document.getElementById('categoryNav');
            const cats = ["Todos", ...new Set(products.map(p => p.category))];
            nav.innerHTML = cats.map(c => `
                <button class="cat-btn ${currentCat === c ? 'active' : ''}" onclick="filterCat('${c}')">${c}</button>
            `).join('');
        }

        function filterCat(c) { currentCat = c; renderMenu(); renderGrid(); }

        function renderGrid() {
            const container = document.getElementById('catalogContainer');
            const filtered = products.filter(p => 
                (currentCat === "Todos" || p.category === currentCat) &&
                p.title.toLowerCase().includes(searchTerm.toLowerCase())
            );

            container.innerHTML = filtered.map(p => `
                <div class="card">
                    <div class="like-badge" onclick="handleLike('${p.id}', ${p.likes || 0})">❤️ ${p.likes || 0}</div>
                    <img src="${p.image_url}" class="productImage" onclick="window.open('${p.image_url}', '_blank')">
                    <div class="card__body">
                        <h3 style="font-size: 16px;">${p.title}</h3>
                        <div class="price">R$ ${p.price.toFixed(2).replace('.',',')}</div>
                        <button class="btn btn-primary" style="width:100%" onclick="addToCart('${p.id}')">🛒 Adicionar</button>
                    </div>
                </div>
            `).join('');
        }

        async function handleLike(id, current) {
            await _supabase.from('produtos').update({ likes: current + 1 }).eq('id', id);
            await loadData();
            renderGrid();
        }

        // ADMINISTRAÇÃO E EDIÇÃO
        document.getElementById('adminBtn').onclick = async () => {
            const { data: { user } } = await _supabase.auth.getUser();
            if (user) {
                document.getElementById('adminModal').classList.add('active');
                renderAdminList();
            } else {
                const email = prompt("Email admin:");
                const pass = prompt("Senha:");
                const { error } = await _supabase.auth.signInWithPassword({ email, password: pass });
                if(!error) location.reload(); else alert("Acesso negado");
            }
        };

        function renderAdminList() {
            const list = document.getElementById('adminList');
            list.innerHTML = products.map(p => `
                <div class="admin-item">
                    <img src="${p.image_url}">
                    <div style="flex:1; font-size:13px"><strong>${p.title}</strong></div>
                    <button onclick="setupEdit('${p.id}')" style="color:var(--accent); background:none; border:none; cursor:pointer; font-weight:bold;">EDITAR</button>
                    <button onclick="handleDelete('${p.id}')" style="color:var(--danger); background:none; border:none; cursor:pointer; margin-left:10px;">X</button>
                </div>
            `).join('');
        }

        function setupEdit(id) {
            const p = products.find(x => x.id == id);
            document.getElementById('editId').value = p.id;
            document.getElementById('pTitle').value = p.title;
            document.getElementById('pCat').value = p.category;
            document.getElementById('pPrice').value = p.price;
            document.getElementById('admHeader').innerText = "Editando: " + p.title;
            document.getElementById('saveBtn').innerText = "Atualizar Dados";
            document.querySelector('.modal__content').scrollTop = 0;
        }

        document.getElementById('saveBtn').onclick = async () => {
            const id = document.getElementById('editId').value;
            const payload = {
                title: document.getElementById('pTitle').value,
                category: document.getElementById('pCat').value,
                price: parseFloat(document.getElementById('pPrice').value)
            };
            
            // Aqui você manteria sua lógica de upload caso queira trocar a imagem ao editar
            if(id) {
                await _supabase.from('produtos').update(payload).eq('id', id);
                alert("Atualizado com sucesso!");
            } else {
                alert("Para novos produtos, selecione a imagem no campo correspondente.");
            }
            location.reload();
        };

        function closeAdmin() { document.getElementById('adminModal').classList.remove('active'); }
        document.getElementById('searchInput').oninput = (e) => { searchTerm = e.target.value; renderGrid(); };
        function addToCart(id) { alert("Adicionado ao carrinho!"); }

        init();
    </script>
</body>
</html>
