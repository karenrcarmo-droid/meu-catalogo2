<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kn2 Personalizados - Catálogo</title>
  <style>
    :root {
      --bg: #0b0f17; --card: #111827; --text: #e5e7eb;
      --muted: #9ca3af; --border: rgba(255, 255, 255, .08);
      --accent: #22c55e;
    }
    * { box-sizing: border-box; }
    body { margin: 0; background: var(--bg); color: var(--text); font-family: system-ui, sans-serif; }
    .container { width: min(1100px, 92vw); margin: auto; }
    
    /* Topbar e Busca */
    .topbar { position: sticky; top: 0; z-index: 999; background: rgba(11, 15, 23, .9); backdrop-filter: blur(10px); border-bottom: 1px solid var(--border); padding: 15px 0; }
    .topbar__inner { display: flex; justify-content: space-between; align-items: center; gap: 15px; }
    .search-input { flex-grow: 1; padding: 10px; border-radius: 8px; border: 1px solid var(--border); background: #0f172a; color: white; }

    /* Grid */
    .productsGrid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; margin-top: 20px; }
    .card { background: var(--card); border: 1px solid var(--border); border-radius: 15px; overflow: hidden; }
    .productImage { width: 100%; height: 250px; object-fit: cover; cursor: pointer; }
    .card__body { padding: 15px; }

    /* Modais */
    .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; justify-content: center; align-items: center; z-index: 1000; }
    .modal.active { display: flex; }
    .modal__content { background: #111827; padding: 25px; border-radius: 15px; width: 100%; max-width: 400px; border: 1px solid var(--border); }
    input { width: 100%; padding: 10px; margin: 10px 0; border-radius: 5px; border: 1px solid var(--border); background: #0b0f17; color: white; }
    .btn { width: 100%; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 10px; }
    .btn-save { background: var(--accent); color: white; }
  </style>
</head>
<body>

  <header class="topbar">
    <div class="container topbar__inner">
      <h2 style="margin:0">Kn2</h2>
      <input type="text" id="searchInput" class="search-input" placeholder="Buscar na pasta imagens...">
      <button class="btn" id="openAdmin" style="width:auto; margin:0">Admin</button>
    </div>
  </header>

  <main class="container">
    <div id="catalogArea" class="productsGrid"></div>
  </main>

  <div class="modal" id="adminModal">
    <div class="modal__content">
      <h3>Novo Produto</h3>
      <input type="text" id="pTitle" placeholder="Nome do Produto">
      <input type="text" id="pCat" placeholder="Categoria">
      <input type="number" id="pPrice" placeholder="Preço R$">
      <input type="text" id="pFileName" placeholder="Nome do arquivo (ex: caneca01.jpg)">
      <p style="font-size: 11px; color: var(--muted)">* A imagem deve estar na pasta /imagens do seu GitHub</p>
      <button class="btn btn-save" id="saveBtn">Salvar Produto</button>
      <button class="btn" onclick="document.getElementById('adminModal').classList.remove('active')">Fechar</button>
    </div>
  </div>

  <script>
    const DB_KEY = "kn2_github_data";
    let products = JSON.parse(localStorage.getItem(DB_KEY)) || [];

    function renderGrid(filter = "") {
      const area = document.getElementById("catalogArea");
      area.innerHTML = "";
      
      const filtered = products.filter(p => p.title.toLowerCase().includes(filter.toLowerCase()));

      filtered.forEach(p => {
        const card = document.createElement("div");
        card.className = "card";
        // BUSCA A IMAGEM NA PASTA /imagens DO DIRETÓRIO
        const imagePath = `imagens/${p.fileName}`;
        
        card.innerHTML = `
          <img src="${imagePath}" class="productImage" onerror="this.src='https://via.placeholder.com/250?text=Arquivo+nao+encontrado'">
          <div class="card__body">
            <h4>${p.title}</h4>
            <p style="color:var(--accent)">R$ ${parseFloat(p.price).toFixed(2)}</p>
            <button class="btn btn-save" onclick="alert('Pedido enviado!')">WhatsApp</button>
          </div>
        `;
        area.appendChild(card);
      });
    }

    document.getElementById("openAdmin").onclick = () => document.getElementById("adminModal").classList.add("active");

    document.getElementById("saveBtn").onclick = () => {
      const title = document.getElementById("pTitle").value;
      const category = document.getElementById("pCat").value;
      const price = document.getElementById("pPrice").value;
      const fileName = document.getElementById("pFileName").value;

      if (!title || !fileName) return alert("Preencha o nome e o arquivo!");

      products.unshift({ title, category, price, fileName });
      localStorage.setItem(DB_KEY, JSON.stringify(products));
      
      renderGrid();
      document.getElementById("adminModal").classList.remove("active");
      alert("Produto salvo! Lembre-se de subir a imagem para a pasta /imagens no GitHub.");
    };

    document.getElementById("searchInput").oninput = (e) => renderGrid(e.target.value);

    // Inicializar
    renderGrid();
  </script>
</body>
</html>
