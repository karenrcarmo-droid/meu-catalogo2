<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kn2 Catálogo | Profissional</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --bg: #0b0f17; --card: #111827; --text: #e5e7eb;
      --muted: #9ca3af; --border: rgba(255,255,255,.08);
      --accent: #22c55e; --danger: #ef4444;
    }
    * { margin:0; padding:0; box-sizing:border-box; font-family: system-ui, sans-serif; }
    body { background: var(--bg); color: var(--text); }
    .container { width: min(1200px, 92vw); margin: auto; }

    /* HEADER & HERO */
    .topbar { position: sticky; top:0; z-index: 1000; background: rgba(11,15,23,.9); backdrop-filter: blur(10px); border-bottom: 1px solid var(--border); padding: 15px 0; }
    .hero { text-align: center; padding: 40px 0; }
    .brand-logo { max-width: 250px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }

    /* CATEGORIAS E GRID */
    .menu__row { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 15px; margin-top: 20px; }
    .menu__btn { background: var(--card); border: 1px solid var(--border); color: white; padding: 10px 20px; border-radius: 999px; cursor: pointer; white-space: nowrap; }
    .menu__btn.active { background: var(--accent); border-color: var(--accent); }
    
    .categoryBlock { margin-bottom: 40px; }
    .categoryHeading { font-size: 24px; margin-bottom: 20px; border-left: 4px solid var(--accent); padding-left: 15px; }
    .productsGrid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
    
    .card { background: var(--card); border-radius: 18px; border: 1px solid var(--border); overflow: hidden; }
    .productImage { width: 100%; height: 250px; object-fit: cover; }
    .card__body { padding: 15px; }
    
    /* ADMIN */
    .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; z-index: 9999; }
    .modal.active { display: flex; }
    .modal__content { background: var(--card); padding: 25px; border-radius: 20px; width: 90%; max-width: 600px; max-height: 90vh; overflow-y: auto; }
    .admin-box { background: rgba(255,255,255,0.03); border: 1px solid var(--border); padding: 15px; border-radius: 12px; margin-bottom: 20px; }
    input, select { width: 100%; padding: 12px; margin-top: 5px; background: #0b0f17; border: 1px solid var(--border); color: white; border-radius: 8px; }
    .btn { padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; border: none; color: white; }
    .btn-primary { background: var(--accent); }
    .btn-dark { background: #374151; }
  </style>
</head>
<body>

  <header class="topbar">
    <div class="container" style="display:flex; justify-content:space-between; align-items:center">
      <div style="font-weight:900; font-size:22px">Kn2 Catálogo</div>
      <div style="display:flex; gap:10px">
        <button class="btn btn-dark" onclick="location.reload()">🔄</button>
        <button class="btn btn-primary" id="openAdminBtn">Admin</button>
      </div>
    </div>
  </header>

  <main class="container">
    <section class="hero">
      <img src="" id="siteLogo" class="brand-logo" alt="Carregando Logo...">
    </section>

    <div class="menu__row" id="menuRow"></div>

    <div style="margin: 20px 0;">
      <input type="text" id="searchInput" placeholder="Buscar produtos..." style="width:100%; padding:15px; background:var(--card); border:1px solid var(--border); color:white; border-radius:12px">
    </div>

    <div id="catalogContainer"></div>
  </main>

  <div class="modal" id="adminModal">
    <div class="modal__content">
      <h2>Painel de Controle</h2>
      
      <div class="admin-box">
        <h4 style="color:var(--accent)">Trocar Logo do Site</h4>
        <input type="file" id="logoInput" accept="image/*">
        <button class="btn btn-primary" style="width:100%; margin-top:10px" id="saveLogoBtn">Atualizar Logo</button>
      </div>

      <div class="admin-box">
        <h4>Gerenciar Produto</h4>
        <input type="hidden" id="editingId">
        <input type="text" id="pTitle" placeholder="Nome do Produto">
        <input type="number" id="pPrice" placeholder="Preço">
        <select id="pCat"></select>
        <input type="file" id="pImage" accept="image/*">
        <button class="btn btn-primary" style="width:100%; margin-top:10px" id="saveProductBtn">Salvar Produto</button>
      </div>

      <div id="adminList"></div>
      <button class="btn btn-dark" style="width:100%" onclick="document.getElementById('adminModal').classList.remove('active')">Fechar</button>
    </div>
  </div>

  <script>
    const SUPABASE_URL = "https://kdoxzjdvpbdwpzyaqary.supabase.co";
    const SUPABASE_KEY = "sb_publishable_4WrcBi_Cy8yRg8v0D3_BQw_1XuBID4V";
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let products = [];
    let activeCategory = "Todos";
    let searchQuery = "";

    async function init() {
      await loadLogo();
      await fetchProducts();
      renderMenu();
      renderGrid();
    }

    async function loadLogo() {
      const { data } = await _supabase.from('configuracoes_site').select('logo_url').eq('id', 'config_geral').single();
      if (data) document.getElementById('siteLogo').src = data.logo_url;
    }

    async function fetchProducts() {
      const { data } = await _supabase.from('produtos').select('*').order('category');
      products = data || [];
      const cats = ["Todos", ...new Set(products.map(p => p.category))];
      document.getElementById('pCat').innerHTML = cats.filter(c => c !== "Todos").map(c => `<option value="${c}">${c}</option>`).join('') + `<option value="Nova">+ Nova Categoria</option>`;
    }

    function renderMenu() {
      const cats = ["Todos", ...new Set(products.map(p => p.category))];
      document.getElementById('menuRow').innerHTML = cats.map(c => `
        <button class="menu__btn ${c === activeCategory ? 'active' : ''}" onclick="filterCat('${c}')">${c}</button>
      `).join('');
    }

    window.filterCat = (cat) => { activeCategory = cat; renderMenu(); renderGrid(); };

    function renderGrid() {
      const filtered = products.filter(p => (activeCategory === "Todos" || p.category === activeCategory) && p.title.toLowerCase().includes(searchQuery.toLowerCase()));
      const grouped = filtered.reduce((acc, p) => { (acc[p.category] = acc[p.category] || []).push(p); return acc; }, {});
      
      document.getElementById('catalogContainer').innerHTML = Object.entries(grouped).map(([cat, items]) => `
        <div class="categoryBlock">
          <h2 class="categoryHeading">${cat}</h2>
          <div class="productsGrid">
            ${items.map(p => `
              <div class="card">
                <img src="${p.image_url}" class="productImage">
                <div class="card__body">
                  <h3>${p.title}</h3>
                  <p style="color:var(--accent); font-weight:bold; font-size:1.2rem">R$ ${p.price}</p>
                </div>
              </div>
            `).join('')}
          </div>
        </div>
      `).join('');
    }

    // UPLOAD DE LOGO
    document.getElementById('saveLogoBtn').onclick = async () => {
      const file = document.getElementById('logoInput').files[0];
      if (!file) return alert("Selecione uma imagem!");
      
      const fileName = `logo_${Date.now()}.jpg`;
      const { data, error } = await _supabase.storage.from('imagens-produtos').upload(`sistema/${fileName}`, file);
      
      if (!error) {
        const { data: { publicUrl } } = _supabase.storage.from('imagens-produtos').getPublicUrl(`sistema/${fileName}`);
        await _supabase.from('configuracoes_site').update({ logo_url: publicUrl }).eq('id', 'config_geral');
        alert("Logo atualizada!");
        location.reload();
      }
    };

    // PESQUISA
    document.getElementById('searchInput').oninput = (e) => { searchQuery = e.target.value; renderGrid(); };

    // ADMIN LOGIN / OPEN
    document.getElementById('openAdminBtn').onclick = async () => {
      const { data: { user } } = await _supabase.auth.getUser();
      if (user) document.getElementById('adminModal').classList.add('active');
      else {
          const email = prompt("Email Admin:");
          const pass = prompt("Senha:");
          await _supabase.auth.signInWithPassword({ email, password: pass });
          location.reload();
      }
    };

    init();
  </script>
</body>
</html>
