<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kn2 Personalizados - Catálogo</title>
  <style>
    :root {
      --bg: #0b0f17; --card: #111827; --text: #e5e7eb;
      --muted: #9ca3af; --border: rgba(255, 255, 255, .08);
      --accent: #22c55e; --danger: #ef4444;
    }
    * { box-sizing: border-box; }
    body { margin: 0; background: var(--bg); color: var(--text); font-family: system-ui, sans-serif; }
    .container { width: min(1100px, 92vw); margin: auto; }
    
    /* CABEÇALHO ORIGINAL */
    .topbar { position: sticky; top: 0; z-index: 999; background: rgba(11, 15, 23, .95); backdrop-filter: blur(10px); border-bottom: 1px solid var(--border); padding: 15px 0; }
    .topbar__inner { display: flex; justify-content: space-between; align-items: center; gap: 20px; }
    
    .search-container { flex-grow: 1; }
    .search-input { width: 100%; background: #0f172a; border: 1px solid var(--border); padding: 12px 15px; border-radius: 12px; color: white; outline: none; }
    .search-input:focus { border-color: var(--accent); }

    .adminBtn { background: var(--accent); color: white; border: none; padding: 10px 20px; border-radius: 10px; cursor: pointer; font-weight: bold; }

    /* MENU CATEGORIAS */
    .menu__row { display: flex; gap: 10px; flex-wrap: wrap; margin: 25px 0; overflow-x: auto; padding-bottom: 10px; }
    .menu__btn { border: 1px solid var(--border); background: transparent; color: white; padding: 10px 20px; border-radius: 999px; cursor: pointer; white-space: nowrap; }
    .menu__btn.active { background: rgba(34, 197, 94, .2); border-color: var(--accent); color: var(--accent); }

    /* GRID E CARDS */
    .categoryBlock { margin-bottom: 40px; }
    .categoryHeading { font-size: 24px; margin-bottom: 20px; border-left: 4px solid var(--accent); padding-left: 15px; }
    .productsGrid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 20px; }
    
    .card { background: var(--card); border: 1px solid var(--border); border-radius: 20px; overflow: hidden; display: flex; flex-direction: column; transition: 0.3s; }
    .productImage { width: 100%; height: 260px; object-fit: cover; cursor: zoom-in; }
    .card__body { padding: 20px; flex-grow: 1; }
    .card__title { margin: 0 0 10px; font-size: 18px; }
    .card__price { font-size: 20px; color: var(--accent); font-weight: bold; margin-bottom: 15px; }
    
    .buyBtn { background: var(--accent); color: white; border: none; padding: 15px; border-radius: 12px; font-weight: bold; cursor: pointer; width: 100%; }

    /* MODAIS */
    .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; justify-content: center; align-items: center; z-index: 10000; padding: 20px; }
    .modal.active { display: flex; }
    .modal__content { background: #111827; padding: 30px; border-radius: 24px; width: 100%; max-width: 450px; border: 1px solid var(--border); }
    
    input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px; border: 1px solid var(--border); background: #0b0f17; color: white; }
    .btnAction { width: 100%; padding: 14px; border: none; border-radius: 12px; cursor: pointer; font-weight: bold; margin-top: 10px; }
    .btnSave { background: var(--accent); color: white; }
    .btnClose { background: #374151; color: white; }

    #adminList { margin-top: 20px; max-height: 200px; overflow-y: auto; }
    .adminItem { display: flex; justify-content: space-between; align-items: center; background: #0f172a; padding: 10px; border-radius: 10px; margin-bottom: 5px; }

    @media(max-width: 600px) { .topbar__inner { flex-direction: column; } }
  </style>
</head>
<body>

  <header class="topbar">
    <div class="container topbar__inner">
      <h1 style="margin:0; font-size: 1.4rem;">Kn2 Personalizados</h1>
      <div class="search-container">
        <input type="text" id="searchInput" class="search-input" placeholder="O que você procura?">
      </div>
      <button class="adminBtn" id="openLogin">Admin</button>
    </div>
  </header>

  <main class="container">
    <div class="menu__row" id="menuArea"></div>
    <div id="catalogArea"></div>
  </main>

  <div class="modal" id="loginModal">
    <div class="modal__content">
      <h3 style="margin-top:0">Painel de Controle</h3>
      <input type="password" id="passInput" placeholder="Senha do Administrador">
      <button class="btnAction btnSave" id="confirmLogin">Entrar</button>
      <button class="btnAction btnClose" onclick="closeM('loginModal')">Cancelar</button>
    </div>
  </div>

  <div class="modal" id="adminModal">
    <div class="modal__content" style="max-width: 550px;">
      <h3 style="margin-top:0">Adicionar Novo Item</h3>
      <input type="text" id="pTitle" placeholder="Ex: Caneca Batman">
      <input type="text" id="pCat" placeholder="Categoria (Ex: Canecas)">
      <input type="number" id="pPrice" placeholder="Preço R$">
      <input type="text" id="pImg" placeholder="Nome do arquivo na pasta imagens (ex: foto.jpg)">
      <button class="btnAction btnSave" id="addProductBtn">Salvar no Catálogo</button>
      <div id="adminList"></div>
      <button class="btnClose btnAction" onclick="closeM('adminModal')">Fechar</button>
    </div>
  </div>

  <div class="modal" id="previewModal" onclick="closeM('previewModal')">
    <img id="imgFull" src="" style="max-width: 95%; max-height: 90vh; border-radius: 15px;">
  </div>

  <script>
    const SENHA_ADMIN = "1234";
    const WHATSAPP_NUM = "5531999999999";
    const DB_NAME = "kn2_db_v5";

    // CARREGA PRODUTOS
    let products = JSON.parse(localStorage.getItem(DB_NAME)) || [];
    let currentCategory = "Todos";
    let searchFilter = "";

    function openM(id) { document.getElementById(id).classList.add('active'); }
    function closeM(id) { document.getElementById(id).classList.remove('active'); }

    // RENDERIZAÇÃO
    function render() {
      const menu = document.getElementById("menuArea");
      const catalog = document.getElementById("catalogArea");
      
      // Menu Categorias
      const cats = ["Todos", ...new Set(products.map(p => p.category))];
      menu.innerHTML = cats.map(c => `
        <button class="menu__btn ${c === currentCategory ? 'active' : ''}" 
                onclick="setCat('${c}')">${c}</button>
      `).join("");

      // Grid Produtos
      catalog.innerHTML = "";
      const filtered = products.filter(p => {
        const matchesCat = currentCategory === "Todos" || p.category === currentCategory;
        const matchesSearch = p.title.toLowerCase().includes(searchFilter.toLowerCase());
        return matchesCat && matchesSearch;
      });

      const grouped = {};
      filtered.forEach(p => {
        if(!grouped[p.category]) grouped[p.category] = [];
        grouped[p.category].push(p);
      });

      for (let cat in grouped) {
        const section = document.createElement("div");
        section.className = "categoryBlock";
        section.innerHTML = `<h2 class="categoryHeading">${cat}</h2><div class="productsGrid"></div>`;
        
        grouped[cat].forEach(p => {
          const card = document.createElement("div");
          card.className = "card";
          const imgPath = p.image + "?v=" + Date.now(); // Cache Buster

          card.innerHTML = `
            <img src="${imgPath}" class="productImage" onclick="zoom('${imgPath}')" onerror="this.src='https://via.placeholder.com/400x400?text=Adicione+a+foto+na+pasta'">
            <div class="card__body">
              <h3 class="card__title">${p.title}</h3>
              <div class="card__price">R$ ${parseFloat(p.price).toFixed(2)}</div>
              <button class="buyBtn" onclick="buy('${p.title}')">WhatsApp</button>
            </div>
          `;
          section.querySelector(".productsGrid").appendChild(card);
        });
        catalog.appendChild(section);
      }
    }

    function setCat(c) { currentCategory = c; render(); }

    window.zoom = (url) => {
      document.getElementById("imgFull").src = url;
      openM('previewModal');
    };

    window.buy = (name) => {
      window.open(`https://wa.me/${WHATSAPP_NUM}?text=Quero+encomendar:+${name}`, "_blank");
    };

    // BUSCA
    document.getElementById("searchInput").addEventListener("input", (e) => {
      searchFilter = e.target.value;
      render();
    });

    // ADMIN
    document.getElementById("openLogin").onclick = () => openM('loginModal');
    document.getElementById("confirmLogin").onclick = () => {
      if(document.getElementById("passInput").value === SENHA_ADMIN) {
        closeM('loginModal');
        openM('adminModal');
        renderAdminList();
      } else { alert("Senha incorreta!"); }
    };

    document.getElementById("addProductBtn").onclick = () => {
      const t = document.getElementById("pTitle").value;
      const c = document.getElementById("pCat").value;
      const p = document.getElementById("pPrice").value;
      const f = document.getElementById("pImg").value;

      if(!t || !f) return alert("Nome e Foto são obrigatórios!");

      products.unshift({ title: t, category: c, price: p, image: 'imagens/' + f });
      localStorage.setItem(DB_NAME, JSON.stringify(products));
      
      document.getElementById("pTitle").value = "";
      document.getElementById("pPrice").value = "";
      document.getElementById("pImg").value = "";
      
      render();
      renderAdminList();
      alert("Sucesso! Lembre-se de colocar o arquivo '" + f + "' na pasta imagens do seu GitHub.");
    };

    function renderAdminList() {
      const list = document.getElementById("adminList");
      list.innerHTML = products.map((p, i) => `
        <div class="adminItem">
          <span>${p.title}</span>
          <button onclick="removeP(${i})" style="color:red; background:none; border:none; cursor:pointer">Excluir</button>
        </div>
      `).join("");
    }

    window.removeP = (i) => {
      if(confirm("Remover?")) {
        products.splice(i, 1);
        localStorage.setItem(DB_NAME, JSON.stringify(products));
        render();
        renderAdminList();
      }
    };

    // Início
    render();
  </script>
</body>
</html>
