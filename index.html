<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kn2 Personalizados - Catálogo Final</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root { --bg:#0b0f17; --card:#111827; --muted:#9ca3af; --text:#f3f4f6; --border:rgba(255,255,255,.06); --accent:#22c55e; --danger:#ef4444; }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:var(--bg); color:var(--text); font-family:system-ui; overflow-x:hidden; }
    .container { width:min(1200px, 92vw); margin:auto; }
    .topbar { position:sticky; top:0; z-index:1000; background:rgba(11, 15, 23, .9); backdrop-filter:blur(12px); border-bottom:1px solid var(--border); padding:15px 0; }
    .btn { border:none; cursor:pointer; border-radius:12px; padding:10px 20px; color:white; font-weight:bold; transition:0.2s; background:var(--accent); }
    .btn-dark { background:#1f2937; }
    .productsGrid { display:grid; grid-template-columns:repeat(auto-fill, minmax(250px, 1fr)); gap:20px; margin-top:20px; }
    .card { background:var(--card); border-radius:20px; overflow:hidden; border:1px solid var(--border); display:flex; flex-direction:column; }
    .productImage { width:100%; height:220px; object-fit:cover; cursor:pointer; }
    .modal { position:fixed; inset:0; background:rgba(0,0,0,.8); display:none; align-items:center; justify-content:center; z-index:9999; }
    .modal.active { display:flex; }
    .modal__content { background:var(--card); padding:25px; border-radius:20px; width:min(500px, 90%); max-height:90vh; overflow-y:auto; }
    input { width:100%; padding:12px; margin:8px 0; border-radius:10px; border:1px solid var(--border); background:#0b0f17; color:white; }
    .cartSidebar { position:fixed; top:0; right:-450px; width:400px; max-width:100%; height:100vh; background:var(--card); z-index:10000; transition:0.3s; padding:20px; border-left:1px solid var(--border); }
    .cartSidebar.active { right:0; }
  </style>
</head>
<body>

  <header class="topbar">
    <div class="container" style="display:flex; justify-content:space-between; align-items:center;">
      <div style="font-size:22px; font-weight:900;">Kn2 Catálogo</div>
      <div style="display:flex; gap:10px;">
        <button class="btn" onclick="toggleCart()">🛒 <span id="cartCount">0</span></button>
        <button class="btn" id="openAdminBtn">Admin</button>
        <button class="btn btn-dark" id="logoutBtn" style="display:none">Sair</button>
      </div>
    </div>
  </header>

  <main class="container">
    <div style="margin-top:20px;">
        <input type="text" id="searchInput" placeholder="Pesquisar produto..." style="height:50px;">
    </div>
    <div id="menuRow" style="display:flex; gap:10px; margin-top:10px; flex-wrap:wrap;"></div>
    <div id="catalogContainer"></div>
    <p id="emptyState" style="text-align:center; margin-top:50px; display:none;">Nenhum produto encontrado.</p>
  </main>

  <div class="cartSidebar" id="cartSidebar">
    <h2>Seu Carrinho</h2>
    <div id="cartItems" style="margin-top:20px; flex:1; overflow-y:auto;"></div>
    <div style="border-top:1px solid var(--border); padding-top:20px; margin-top:20px;">
      <div style="display:flex; justify-content:space-between; font-size:20px;">
        <span>Total:</span> <span id="cartTotal" style="color:var(--accent); font-weight:bold;">R$ 0,00</span>
      </div>
      <button class="btn" style="width:100%; margin-top:15px;" onclick="sendWhatsApp()">Finalizar Pedido</button>
      <button class="btn btn-dark" style="width:100%; margin-top:10px;" onclick="toggleCart()">Fechar</button>
    </div>
  </div>

  <div class="modal" id="adminModal">
    <div class="modal__content">
      <h3>Gerenciar Produto</h3>
      <input type="hidden" id="editingId">
      <input type="text" id="pTitle" placeholder="Nome do produto">
      <input type="text" id="pCategory" placeholder="Categoria">
      <input type="text" id="pPrice" placeholder="Preço (Ex: 10,90)">
      <input type="file" id="pImage" accept="image/*">
      <button class="btn" id="saveProductBtn" style="width:100%; margin-top:10px;">Salvar</button>
      <div id="adminList" style="margin-top:20px; border-top:1px solid var(--border); padding-top:10px;"></div>
      <button class="btn btn-dark" style="width:100%; margin-top:10px;" onclick="closeAdmin()">Fechar</button>
    </div>
  </div>

  <div class="modal" id="loginModal">
    <div class="modal__content">
      <h3>Login Admin</h3>
      <input type="email" id="admEmail" placeholder="E-mail">
      <input type="password" id="admPass" placeholder="Senha">
      <button class="btn" id="loginBtn" style="width:100%">Entrar</button>
      <button class="btn btn-dark" style="width:100%; margin-top:10px;" onclick="document.getElementById('loginModal').classList.remove('active')">Cancelar</button>
    </div>
  </div>

  <script>
    const SUPABASE_URL = "https://kdoxzjdvpbdwpzyaqary.supabase.co";
    const SUPABASE_KEY = "sb_publishable_4WrcBi_Cy8yRg8v0D3_BQw_1XuBID4V";
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let products = [];
    let cart = JSON.parse(localStorage.getItem("cart")) || [];
    let activeCategory = "Todos";
    let searchQuery = "";

    async function init() {
      await fetchProducts();
      setupRealtime();
      await checkUser();
      renderMenu();
      renderGrid();
      updateCartUI();
    }

    async function fetchProducts() {
      const { data, error } = await _supabase.from('produtos').select('*').order('created_at', { ascending: false });
      if (!error) products = data || [];
    }

    function setupRealtime() {
      _supabase.channel('db-changes').on('postgres_changes', { event: '*', schema: 'public', table: 'produtos' }, (payload) => {
        if (payload.eventType === 'INSERT') products.unshift(payload.new);
        if (payload.eventType === 'UPDATE') {
          const i = products.findIndex(p => String(p.id) === String(payload.new.id));
          if (i !== -1) products[i] = payload.new;
        }
        if (payload.eventType === 'DELETE') products = products.filter(p => String(p.id) !== String(payload.old.id));
        
        renderMenu();
        renderGrid();
        if(document.getElementById("adminModal").classList.contains("active")) renderAdminList();
      }).subscribe();
    }

    function renderMenu() {
      const row = document.getElementById("menuRow");
      row.innerHTML = "";
      const cats = ["Todos", ...new Set(products.map(p => p.category))];
      cats.forEach(c => {
        const btn = document.createElement("button");
        btn.className = `btn ${c === activeCategory ? '' : 'btn-dark'}`;
        btn.style.borderRadius = "99px";
        btn.textContent = c;
        btn.onclick = () => { activeCategory = c; renderMenu(); renderGrid(); };
        row.appendChild(btn);
      });
    }

    function renderGrid() {
      const container = document.getElementById("catalogContainer");
      container.innerHTML = "";
      const filtered = products.filter(p => {
        const matchCat = activeCategory === "Todos" || p.category === activeCategory;
        const matchSearch = p.title.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").includes(searchQuery.toLowerCase());
        return matchCat && matchSearch;
      });

      document.getElementById("emptyState").style.display = filtered.length ? "none" : "block";

      const cats = [...new Set(filtered.map(p => p.category))];
      cats.forEach(cat => {
        const div = document.createElement("div");
        div.innerHTML = `<h2 style="margin:30px 0 15px;">${cat}</h2>`;
        const grid = document.createElement("div");
        grid.className = "productsGrid";
        filtered.filter(p => p.category === cat).forEach(p => {
          grid.innerHTML += `
            <div class="card">
              <img src="${p.image_url}" class="productImage" onclick="window.open('${p.image_url}')">
              <div style="padding:15px;">
                <h4 style="margin-bottom:10px;">${p.title}</h4>
                <div style="display:flex; justify-content:space-between; align-items:center;">
                  <span style="color:var(--accent); font-weight:bold; font-size:1.2rem;">R$ ${p.price.toFixed(2).replace('.',',')}</span>
                  <button class="btn" onclick="addToCart('${p.id}')" style="padding:8px 12px;">Add</button>
                </div>
              </div>
            </div>`;
        });
        div.appendChild(grid);
        container.appendChild(div);
      });
    }

    function addToCart(id) {
      const p = products.find(prod => String(prod.id) === String(id));
      const exists = cart.find(item => String(item.id) === String(id));
      if (exists) exists.qty++;
      else cart.push({ ...p, qty: 1 });
      updateCartUI();
      document.getElementById("cartSidebar").classList.add("active");
    }

    function updateCartUI() {
      localStorage.setItem("cart", JSON.stringify(cart));
      const container = document.getElementById("cartItems");
      container.innerHTML = "";
      let total = 0;
      cart.forEach(item => {
        total += item.price * item.qty;
        container.innerHTML += `
          <div style="display:flex; gap:10px; margin-bottom:15px; background:#0b0f17; padding:10px; border-radius:10px;">
            <img src="${item.image_url}" style="width:50px; height:50px; object-fit:cover; border-radius:5px;">
            <div style="flex:1">
              <div style="font-size:14px;">${item.title}</div>
              <div style="display:flex; justify-content:space-between; align-items:center; margin-top:5px;">
                <span>${item.qty}x</span>
                <button class="btn btn-dark" style="padding:2px 8px;" onclick="changeQty('${item.id}', -1)">-</button>
                <button class="btn btn-dark" style="padding:2px 8px;" onclick="changeQty('${item.id}', 1)">+</button>
              </div>
            </div>
          </div>`;
      });
      document.getElementById("cartTotal").textContent = `R$ ${total.toFixed(2).replace('.',',')}`;
      document.getElementById("cartCount").textContent = cart.reduce((acc, i) => acc + i.qty, 0);
    }

    function changeQty(id, delta) {
      const i = cart.find(item => String(item.id) === String(id));
      if (i) {
        i.qty += delta;
        if (i.qty <= 0) cart = cart.filter(item => String(item.id) !== String(id));
        updateCartUI();
      }
    }

    function toggleCart() { document.getElementById("cartSidebar").classList.toggle("active"); }

    async function checkUser() {
      const { data: { user } } = await _supabase.auth.getUser();
      document.getElementById("logoutBtn").style.display = user ? "block" : "none";
      return user;
    }

    document.getElementById("saveProductBtn").onclick = async function() {
      const id = document.getElementById("editingId").value;
      const title = document.getElementById("pTitle").value;
      const category = document.getElementById("pCategory").value;
      const price = parseFloat(document.getElementById("pPrice").value.replace(',','.'));
      const file = document.getElementById("pImage").files[0];

      if(!title || !category || isNaN(price)) return alert("Preencha os campos!");
      
      this.disabled = true;
      this.textContent = "A carregar...";

      try {
        let image_url = null;
        if (file) {
          const path = `produtos/${Date.now()}_${file.name}`;
          await _supabase.storage.from('imagens-produtos').upload(path, file);
          const { data } = _supabase.storage.from('imagens-produtos').getPublicUrl(path);
          image_url = data.publicUrl;
        }

        const payload = { title, category, price };
        if (image_url) payload.image_url = image_url;

        const { error } = id ? await _supabase.from('produtos').update(payload).eq('id', id) : await _supabase.from('produtos').insert([payload]);
        if(error) throw error;
        
        alert("Sucesso!");
        document.getElementById("pTitle").value = "";
        document.getElementById("pPrice").value = "";
      } catch (e) { alert(e.message); }
      finally { this.disabled = false; this.textContent = "Salvar"; }
    };

    document.getElementById("openAdminBtn").onclick = async () => {
      const u = await checkUser();
      if(u) { document.getElementById("adminModal").classList.add("active"); renderAdminList(); }
      else document.getElementById("loginModal").classList.add("active");
    };

    function closeAdmin() { document.getElementById("adminModal").classList.remove("active"); }

    function renderAdminList() {
      const list = document.getElementById("adminList");
      list.innerHTML = products.map(p => `
        <div style="display:flex; justify-content:space-between; margin-bottom:10px; background:#0b0f17; padding:10px; border-radius:10px;">
          <span>${p.title}</span>
          <button class="btn btn-dark" style="padding:5px;" onclick="deleteProd('${p.id}')">🗑️</button>
        </div>
      `).join('');
    }

    async function deleteProd(id) {
      if(!confirm("Apagar?")) return;
      await _supabase.from('produtos').delete().eq('id', id);
      alert("Apagado!");
    }

    document.getElementById("loginBtn").onclick = async () => {
      const { error } = await _supabase.auth.signInWithPassword({ email: document.getElementById("admEmail").value, password: document.getElementById("admPass").value });
      if (error) alert(error.message);
      else location.reload();
    };

    document.getElementById("logoutBtn").onclick = async () => { await _supabase.auth.signOut(); location.reload(); };
    document.getElementById("searchInput").oninput = (e) => { searchQuery = e.target.value; renderGrid(); };

    init();
  </script>
</body>
</html>
