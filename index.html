<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kn2 Personalizados - Catálogo</title>
  <style>
    :root {
      --bg: #0b0f17; --card: #111827; --text: #e5e7eb;
      --muted: #9ca3af; --border: rgba(255, 255, 255, .08);
      --accent: #22c55e; --danger: #ef4444; --edit: #2563eb;
    }
    * { box-sizing: border-box; }
    body { margin: 0; background: var(--bg); color: var(--text); font-family: system-ui, -apple-system, sans-serif; }
    .container { width: min(1100px, 92vw); margin: auto; }
    
    /* TOPO */
    .topbar { position: sticky; top: 0; z-index: 999; background: rgba(11, 15, 23, .92); backdrop-filter: blur(8px); border-bottom: 1px solid var(--border); }
    .topbar__inner { padding: 14px 0; display: flex; justify-content: space-between; align-items: center; }
    .brand { margin: 0; font-size: 20px; }
    .adminBtn { border: none; background: var(--accent); color: white; padding: 10px 14px; border-radius: 10px; cursor: pointer; font-weight: bold; }

    /* MENU CATEGORIAS */
    .menu { margin-top: 20px; }
    .menu__row { display: flex; gap: 10px; flex-wrap: wrap; }
    .menu__btn { border: 1px solid var(--border); background: transparent; color: white; padding: 10px 14px; border-radius: 999px; cursor: pointer; }
    .menu__btn.active { background: rgba(34, 197, 94, .15); border-color: var(--accent); color: var(--accent); }

    /* GRID E CARDS */
    .categoryBlock { margin-bottom: 40px; }
    .categoryHeading { font-size: 24px; margin: 20px 0; padding-bottom: 10px; border-bottom: 1px solid var(--border); }
    .productsGrid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 14px; }
    .card { overflow: hidden; border-radius: 18px; background: var(--card); border: 1px solid var(--border); display: flex; flex-direction: column; }
    .productImage { width: 100%; height: 220px; object-fit: cover; cursor: pointer; background: #1f2937; }
    .card__body { padding: 14px; flex-grow: 1; display: flex; flex-direction: column; }
    .card__title { margin: 0 0 10px; font-size: 18px; }
    .card__meta { display: flex; justify-content: space-between; margin-top: auto; margin-bottom: 14px; color: var(--muted); }
    .buyBtn { width: 100%; border: none; background: var(--accent); color: white; padding: 12px; border-radius: 12px; font-weight: bold; cursor: pointer; }

    /* MODAIS */
    .modal { position: fixed; inset: 0; background: rgba(0,0,0,.8); display: none; justify-content: center; align-items: center; z-index: 9999; }
    .modal.active { display: flex; }
    .modal__content { width: min(500px, 92vw); background: #111827; border-radius: 20px; padding: 20px; border: 1px solid var(--border); }
    .formGroup { margin-bottom: 14px; }
    .formGroup label { display: block; margin-bottom: 6px; color: var(--muted); }
    .formGroup input { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid var(--border); background: #0f172a; color: white; }
    .saveBtn { width: 100%; border: none; background: var(--accent); color: white; padding: 13px; border-radius: 12px; font-weight: bold; cursor: pointer; }
    .closeBtn { width: 100%; border: none; background: #374151; color: white; padding: 12px; border-radius: 12px; cursor: pointer; margin-top: 10px; }
    
    .adminItem { display: flex; gap: 10px; align-items: center; background: #0f172a; padding: 10px; border-radius: 10px; margin-bottom: 10px; }
    .adminItem img { width: 50px; height: 50px; object-fit: cover; border-radius: 5px; }
    .dangerBtn { background: var(--danger); color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; }

    @media(max-width:600px) { .productsGrid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>

  <header class="topbar">
    <div class="container topbar__inner">
      <h1 class="brand">Kn2 Personalizados</h1>
      <button class="adminBtn" id="openAdminBtn">Admin</button>
    </div>
  </header>

  <main class="container">
    <section class="menu"><div class="menu__row" id="menuRow"></div></section>
    <section id="catalogContainer"></section>
  </main>

  <div class="modal" id="adminModal">
    <div class="modal__content">
      <h2>Painel Admin</h2>
      <div class="formGroup">
        <label>Nome do Produto</label>
        <input type="text" id="pTitle">
      </div>
      <div class="formGroup">
        <label>Categoria</label>
        <input type="text" id="pCategory" placeholder="Ex: Canecas">
      </div>
      <div class="formGroup">
        <label>Preço</label>
        <input type="number" id="pPrice" step="0.01">
      </div>
      <div class="formGroup">
        <label>Nome do Arquivo na pasta /imagens</label>
        <input type="text" id="pFileName" placeholder="exemplo: caneca_azul.jpg">
      </div>
      <button class="saveBtn" id="saveBtn">Salvar Produto</button>
      <hr style="opacity: 0.1; margin: 20px 0;">
      <div id="adminList"></div>
      <button class="closeBtn" id="closeAdminBtn">Fechar</button>
    </div>
  </div>

  <script>
    const WHATSAPP = "5531999999999";
    const STORAGE_KEY = "kn2_catalog_data";

    // Dados Iniciais
    let products = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [
      { id: 1, title: "Caneca Branca", category: "Canecas", price: 25.00, image: "imagens/exemplo.jpg" }
    ];

    let activeCategory = "Todos";

    function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(products)); }

    function renderMenu() {
      const menu = document.getElementById("menuRow");
      const categories = ["Todos", ...new Set(products.map(p => p.category))];
      menu.innerHTML = categories.map(cat => `
        <button class="menu__btn ${cat === activeCategory ? 'active' : ''}" 
                onclick="setCategory('${cat}')">${cat}</button>
      `).join("");
    }

    function setCategory(cat) {
      activeCategory = cat;
      renderMenu();
      renderGrid();
    }

    function renderGrid() {
      const container = document.getElementById("catalogContainer");
      container.innerHTML = "";
      
      const filtered = activeCategory === "Todos" ? products : products.filter(p => p.category === activeCategory);
      const grouped = {};
      filtered.forEach(p => {
        if (!grouped[p.category]) grouped[p.category] = [];
        grouped[p.category].push(p);
      });

      for (let cat in grouped) {
        const section = document.createElement("div");
        section.className = "categoryBlock";
        section.innerHTML = `<h2 class="categoryHeading">${cat}</h2><div class="productsGrid"></div>`;
        
        grouped[cat].forEach(p => {
          const card = document.createElement("div");
          card.className = "card";
          card.innerHTML = `
            <img class="productImage" src="${p.image}" onerror="this.src='https://via.placeholder.com/600x400?text=Imagem+nao+encontrada'">
            <div class="card__body">
              <h3 class="card__title">${p.title}</h3>
              <div class="card__meta"><strong>R$ ${p.price.toFixed(2)}</strong></div>
              <button class="buyBtn" onclick="buy('${p.title}')">WhatsApp</button>
            </div>
          `;
          section.querySelector(".productsGrid").appendChild(card);
        });
        container.appendChild(section);
      }
    }

    function buy(name) {
      const msg = encodeURIComponent(`Olá! Quero saber mais sobre: ${name}`);
      window.open(`https://wa.me/${WHATSAPP}?text=${msg}`, "_blank");
    }

    // ADMIN LOGIC
    document.getElementById("openAdminBtn").onclick = () => {
      document.getElementById("adminModal").classList.add("active");
      renderAdminList();
    };
    document.getElementById("closeAdminBtn").onclick = () => document.getElementById("adminModal").classList.remove("active");

    document.getElementById("saveBtn").onclick = () => {
      const title = document.getElementById("pTitle").value;
      const cat = document.getElementById("pCategory").value;
      const price = parseFloat(document.getElementById("pPrice").value);
      const file = document.getElementById("pFileName").value;

      if (!title || !cat || !price || !file) return alert("Preencha tudo!");

      products.unshift({
        id: Date.now(),
        title,
        category: cat,
        price,
        image: `imagens/${file}` // Caminho direto para sua pasta
      });

      save();
      renderGrid();
      renderMenu();
      renderAdminList();
      alert("Produto salvo! Lembre-se de subir o arquivo para a pasta /imagens no GitHub.");
    };

    function renderAdminList() {
      const list = document.getElementById("adminList");
      list.innerHTML = products.map(p => `
        <div class="adminItem">
          <img src="${p.image}">
          <span style="flex:1">${p.title}</span>
          <button class="dangerBtn" onclick="deleteItem(${p.id})">Sair</button>
        </div>
      `).join("");
    }

    window.deleteItem = (id) => {
      products = products.filter(p => p.id !== id);
      save();
      renderGrid();
      renderMenu();
      renderAdminList();
    };

    // Início
    renderMenu();
    renderGrid();
  </script>
</body>
</html>
