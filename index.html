<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kn2 Catálogo - Realtime</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    /* ... (Mantenho seu CSS anterior para brevidade, adicionei apenas as correções de lógica abaixo) ... */
    :root { --bg: #0b0f17; --card: #111827; --muted: #9ca3af; --text: #f3f4f6; --border: rgba(255, 255, 255, .06); --accent: #22c55e; --danger: #ef4444; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: var(--bg); color: var(--text); font-family: system-ui; }
    .container { width: min(1200px, 92vw); margin: auto; }
    .topbar { position: sticky; top: 0; z-index: 1000; background: rgba(11, 15, 23, .9); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); padding: 16px 0; }
    .btn { border: none; cursor: pointer; border-radius: 14px; padding: 12px 18px; color: white; font-weight: 800; transition: .2s; background: var(--accent); }
    .productsGrid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 18px; margin-top: 20px; }
    .card { background: var(--card); border-radius: 22px; padding: 15px; border: 1px solid var(--border); }
    .productImage { width: 100%; height: 200px; object-fit: cover; border-radius: 15px; }
    .modal { position: fixed; inset: 0; background: rgba(0,0,0,.8); display: none; align-items: center; justify-content: center; z-index: 2000; }
    .modal.active { display: flex; }
    .modal__content { background: var(--card); padding: 25px; border-radius: 20px; width: 90%; max-width: 500px; }
    input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 10px; border: 1px solid var(--border); background: #0b0f17; color: white; }
  </style>
</head>
<body>

  <header class="topbar">
    <div class="container" style="display:flex; justify-content:space-between; align-items:center;">
      <div style="font-size:24px; font-weight:bold;">Kn2 Catálogo</div>
      <div style="display:flex; gap:10px;">
        <button class="btn" onclick="toggleCart()">🛒 <span id="cartCount">0</span></button>
        <button class="btn" onclick="openAdminPanel()">Painel Admin</button>
        <button id="logoutBtn" class="btn" style="background:#1f2937; display:none;">Sair</button>
      </div>
    </div>
  </header>

  <main class="container">
    <div id="catalogContainer"></div>
    <p id="emptyState" style="display:none; text-align:center; padding:50px;">Carregando produtos...</p>
  </main>

  <div class="modal" id="adminModal">
    <div class="modal__content">
      <h3>Gerenciar Produto</h3>
      <input type="hidden" id="editingId">
      <input type="text" id="pTitle" placeholder="Nome do Produto">
      <input type="text" id="pCategory" placeholder="Categoria">
      <input type="text" id="pPrice" placeholder="Preço (Ex: 10,50)">
      <input type="file" id="pImage" accept="image/*">
      <button class="btn" id="saveBtn" style="width:100%; margin-top:10px;">Salvar</button>
      <button class="btn" onclick="closeAdmin()" style="width:100%; margin-top:10px; background:#374151;">Fechar</button>
      <div id="adminList" style="margin-top:20px; max-height:200px; overflow-y:auto;"></div>
    </div>
  </div>

  <script>
    const SUPABASE_URL = "https://kdoxzjdvpbdwpzyaqary.supabase.co";
    const SUPABASE_KEY = "SUA_ANON_KEY"; // Substitua pela sua chave real
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let products = [];
    let cart = JSON.parse(localStorage.getItem("cart")) || [];

    async function init() {
      await fetchProducts();
      setupRealtime(); // Ativa o "ouvinte" em tempo real
      renderGrid();
      checkUser();
    }

    // BUSCA INICIAL
    async function fetchProducts() {
      const { data, error } = await _supabase.from('produtos').select('*').order('created_at', { ascending: false });
      if (!error) products = data;
    }

    // CONFIGURAÇÃO REALTIME (O segredo está aqui)
    function setupRealtime() {
      _supabase
        .channel('mudancas-no-catalogo')
        .on('postgres_changes', { event: '*', schema: 'public', table: 'produtos' }, (payload) => {
          console.log('Mudança detectada:', payload);
          
          if (payload.eventType === 'INSERT') {
            products.unshift(payload.new);
          } else if (payload.eventType === 'UPDATE') {
            const index = products.findIndex(p => p.id === payload.new.id);
            if (index !== -1) products[index] = payload.new;
          } else if (payload.eventType === 'DELETE') {
            products = products.filter(p => p.id !== payload.old.id);
          }
          
          // Atualiza a tela sem recarregar a página
          renderGrid();
          if (document.getElementById("adminModal").classList.contains("active")) renderAdminList();
        })
        .subscribe();
    }

    // RENDERIZAÇÃO SPA (SEM RELOAD)
    function renderGrid() {
      const container = document.getElementById("catalogContainer");
      container.innerHTML = "";
      
      const categories = [...new Set(products.map(p => p.category))];
      categories.forEach(cat => {
        const section = document.createElement("div");
        section.innerHTML = `<h2 style="margin: 20px 0 10px;">${cat}</h2>`;
        const grid = document.createElement("div");
        grid.className = "productsGrid";
        
        products.filter(p => p.category === cat).forEach(p => {
          grid.innerHTML += `
            <div class="card">
              <img src="${p.image_url}" class="productImage">
              <h4 style="margin:10px 0">${p.title}</h4>
              <div style="color:var(--accent); font-weight:bold; margin-bottom:10px;">R$ ${p.price.toFixed(2).replace('.',',')}</div>
              <button class="btn" style="width:100%" onclick="addToCart('${p.id}')">Adicionar</button>
            </div>`;
        });
        section.appendChild(grid);
        container.appendChild(section);
      });
    }

    // ADMIN - SALVAR SEM RELOAD
    document.getElementById("saveBtn").onclick = async function() {
      const btn = this;
      const id = document.getElementById("editingId").value;
      const title = document.getElementById("pTitle").value;
      const category = document.getElementById("pCategory").value;
      const price = parseFloat(document.getElementById("pPrice").value.replace(',', '.'));
      const file = document.getElementById("pImage").files[0];

      btn.disabled = true;
      btn.textContent = "Salvando...";

      let image_url = null;
      if (file) {
        const path = `produtos/${Date.now()}_${file.name}`;
        await _supabase.storage.from('imagens-produtos').upload(path, file);
        const { data } = _supabase.storage.from('imagens-produtos').getPublicUrl(path);
        image_url = data.publicUrl;
      }

      const payload = { title, category, price };
      if (image_url) payload.image_url = image_url;

      const { error } = id 
        ? await _supabase.from('produtos').update(payload).eq('id', id)
        : await _supabase.from('produtos').insert([payload]);

      if (error) alert("Erro ao salvar");
      else {
        // Limpa campos mas NÃO dá reload (o Realtime cuidará de atualizar a lista)
        document.getElementById("editingId").value = "";
        document.getElementById("pTitle").value = "";
        document.getElementById("pPrice").value = "";
        alert("Produto processado!");
      }
      btn.disabled = false;
      btn.textContent = "Salvar";
    };

    // ... (restante das funções de carrinho e login permanecem similares, mas sem chamar location.reload)
    async function checkUser() {
        const { data: { user } } = await _supabase.auth.getUser();
        if(user) document.getElementById("logoutBtn").style.display = "block";
    }

    function openAdminPanel() { document.getElementById("adminModal").classList.add("active"); renderAdminList(); }
    function closeAdmin() { document.getElementById("adminModal").classList.remove("active"); }

    init();
  </script>
</body>
</html>
