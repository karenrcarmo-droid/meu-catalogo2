<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kn2 Personalizados - Catálogo</title>
  <meta name="theme-color" content="#0b0f17">
  
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    :root {
      --bg: #0b0f17;
      --card: #111827;
      --text: #e5e7eb;
      --muted: #9ca3af;
      --border: rgba(255, 255, 255, .08);
      --accent: #22c55e;
      --danger: #ef4444;
    }

    * { box-sizing: border-box; }
    body { margin: 0; background: var(--bg); color: var(--text); font-family: system-ui, sans-serif; }
    .container { width: min(1100px, 92vw); margin: auto; }

    /* Topbar */
    .topbar { position: sticky; top: 0; z-index: 999; background: rgba(11, 15, 23, .92); backdrop-filter: blur(8px); border-bottom: 1px solid var(--border); }
    .topbar__inner { padding: 14px 0; display: flex; justify-content: space-between; align-items: center; }
    
    .adminBtn { border: none; background: var(--accent); color: white; padding: 10px 14px; border-radius: 10px; cursor: pointer; font-weight: bold; }
    .logoutBtn { background: #374151; margin-left: 10px; display: none; }

    /* Menu & Search */
    .menu { margin-top: 20px; }
    .menu__row { display: flex; gap: 10px; flex-wrap: wrap; }
    .menu__btn { border: 1px solid var(--border); background: transparent; color: white; padding: 8px 16px; border-radius: 999px; cursor: pointer; transition: 0.2s; }
    .menu__btn.active { background: rgba(34, 197, 94, .15); border-color: var(--accent); color: var(--accent); }

    .search { margin: 18px 0; }
    #searchInput { width: 100%; padding: 13px; border-radius: 12px; border: 1px solid var(--border); background: #111827; color: white; outline: none; }

    /* Grid */
    .categoryBlock { margin-bottom: 40px; }
    .categoryHeading { font-size: 24px; margin: 0 0 18px; padding-bottom: 10px; border-bottom: 1px solid var(--border); color: #fff; }
    .productsGrid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 14px; }

    .card { overflow: hidden; border-radius: 18px; background: var(--card); border: 1px solid var(--border); display: flex; flex-direction: column; transition: transform 0.2s; }
    .card:hover { transform: translateY(-4px); }
    .productImage { width: 100%; height: 220px; object-fit: cover; cursor: zoom-in; background: #1f2937; }

    .card__body { padding: 14px; display: flex; flex-direction: column; flex-grow: 1; }
    .card__title { margin: 0 0 10px; font-size: 18px; }
    .card__meta { display: flex; justify-content: space-between; align-items: center; margin-top: auto; margin-bottom: 14px; }
    .buyBtn { width: 100%; border: none; background: var(--accent); color: white; padding: 12px; border-radius: 12px; font-weight: bold; cursor: pointer; }

    /* Modais */
    .modal { position: fixed; inset: 0; background: rgba(0, 0, 0, .7); display: none; justify-content: center; align-items: center; z-index: 9999; backdrop-filter: blur(4px); }
    .modal.active { display: flex; }
    .modal__content { width: min(500px, 92vw); max-height: 90vh; overflow: auto; background: #111827; border-radius: 20px; padding: 25px; border: 1px solid var(--border); }

    .formGroup { margin-bottom: 15px; }
    .formGroup label { display: block; margin-bottom: 6px; color: var(--muted); font-size: 14px; }
    .formGroup input { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid var(--border); background: #0f172a; color: white; }

    .saveBtn { width: 100%; border: none; background: var(--accent); color: white; padding: 13px; border-radius: 12px; font-weight: bold; cursor: pointer; }
    .closeBtn { width: 100%; border: none; background: #374151; color: white; padding: 12px; border-radius: 12px; cursor: pointer; margin-top: 10px; }

    /* Admin List */
    .adminItem { display: flex; gap: 12px; align-items: center; background: #0f172a; padding: 10px; border-radius: 12px; margin-bottom: 10px; }
    .adminItem img { width: 50px; height: 50px; border-radius: 8px; object-fit: cover; }
    .adminItem__info { flex: 1; font-size: 14px; }
    .dangerBtn { background: var(--danger); color: white; border: none; padding: 6px 10px; border-radius: 6px; cursor: pointer; }

    .imagePreviewModal { position: fixed; inset: 0; background: rgba(0, 0, 0, .9); display: none; justify-content: center; align-items: center; z-index: 99999; }
    .imagePreviewModal.active { display: flex; }
    .imagePreviewModal img { max-width: 90%; max-height: 90%; border-radius: 10px; }

    @media(max-width:600px) { .productsGrid { grid-template-columns: 1fr; } }
  </style>
</head>

<body>

  <header class="topbar">
    <div class="container topbar__inner">
      <h1 style="margin:0; font-size: 20px;">Kn2 Catálogo</h1>
      <div>
        <button class="adminBtn" id="openAdminBtn">Painel Admin</button>
        <button class="adminBtn logoutBtn" id="logoutBtn">Sair</button>
      </div>
    </div>
  </header>

  <main class="container">
    <section class="menu">
      <div class="menu__row" id="menuRow"></div>
    </section>

    <section class="search">
      <input type="text" id="searchInput" placeholder="O que você está procurando?" />
    </section>

    <section id="catalogContainer"></section>
    <p id="emptyState" hidden style="text-align:center; padding:40px; color:gray;">Nenhum produto encontrado.</p>
  </main>

  <div class="modal" id="loginModal">
    <div class="modal__content">
      <h2 style="margin-top:0">Login Restrito</h2>
      <div class="formGroup">
        <label>E-mail do Admin</label>
        <input type="email" id="adminEmail" placeholder="seu@email.com" />
      </div>
      <div class="formGroup">
        <label>Senha</label>
        <input type="password" id="adminPassword" />
      </div>
      <button class="saveBtn" id="loginBtn">Entrar no Sistema</button>
      <button class="closeBtn" id="closeLoginBtn">Cancelar</button>
    </div>
  </div>

  <div class="modal" id="adminModal">
    <div class="modal__content" style="width: min(700px, 92vw);">
      <h2 style="margin-top:0">Novo Produto</h2>
      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
        <div class="formGroup">
          <label>Nome</label>
          <input type="text" id="productTitle" />
        </div>
        <div class="formGroup">
          <label>Categoria</label>
          <input type="text" id="productCategory" placeholder="Ex: Copos" />
        </div>
      </div>
      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
        <div class="formGroup">
          <label>Preço (R$)</label>
          <input type="number" id="productPrice" step="0.01" />
        </div>
        <div class="formGroup">
          <label>Foto do Produto</label>
          <input type="file" id="productImage" accept="image/*" />
        </div>
      </div>
      <button class="saveBtn" id="saveProductBtn">Salvar Produto</button>
      
      <hr style="opacity:0.1; margin: 25px 0;">
      <h3>Gerenciar Existentes</h3>
      <div id="adminList"></div>
      <button class="closeBtn" id="closeAdminBtn">Fechar Painel</button>
    </div>
  </div>

  <div class="imagePreviewModal" id="imagePreviewModal" onclick="this.classList.remove('active')">
    <img id="previewImage" src="" />
  </div>

  <script>
    /* CONFIGURAÇÃO */
    const SUPABASE_URL = "https://kdoxzjdvpbdwpzyaqary.supabase.co/";
    const SUPABASE_KEY = "sb_publishable_4WrcBi_Cy8yRg8v0D3_BQw_1XuBID4V";
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const WHATSAPP_NUMBER = "5531999683959";

    let products = [];
    let activeCategory = "Todos";
    let searchQuery = "";

    async function init() {
      await fetchProducts();
      checkUser(); // Verifica se já está logado
      renderMenu();
      renderGrid();
    }

    async function fetchProducts() {
      const { data, error } = await _supabase
        .from('produtos')
        .select('*')
        .order('created_at', { ascending: false });
      
      if (!error) products = data || [];
    }

    /* RENDERIZAÇÃO */
    function renderMenu() {
      const menuRow = document.getElementById("menuRow");
      menuRow.innerHTML = "";
      const categories = ["Todos", ...new Set(products.map(p => p.category))];
      
      categories.forEach(cat => {
        const btn = document.createElement("button");
        btn.className = `menu__btn ${cat === activeCategory ? 'active' : ''}`;
        btn.textContent = cat;
        btn.onclick = () => {
          activeCategory = cat;
          renderMenu();
          renderGrid();
        };
        menuRow.appendChild(btn);
      });
    }

    function renderGrid() {
      const container = document.getElementById("catalogContainer");
      container.innerHTML = "";

      const filtered = products.filter(p => {
        const matchCat = activeCategory === "Todos" || p.category === activeCategory;
        const matchSearch = p.title.toLowerCase().includes(searchQuery.toLowerCase());
        return matchCat && matchSearch;
      });

      document.getElementById("emptyState").hidden = filtered.length > 0;

      const grouped = {};
      filtered.forEach(p => {
        if(!grouped[p.category]) grouped[p.category] = [];
        grouped[p.category].push(p);
      });

      for (const cat in grouped) {
        const section = document.createElement("div");
        section.className = "categoryBlock";
        section.innerHTML = `<h2 class="categoryHeading">${cat}</h2>`;
        
        const grid = document.createElement("div");
        grid.className = "productsGrid";

        grouped[cat].forEach(p => {
          const card = document.createElement("div");
          card.className = "card";
          card.innerHTML = `
            <img class="productImage" src="${p.image_url}" onclick="showImg('${p.image_url}')" loading="lazy">
            <div class="card__body">
              <h3 class="card__title">${p.title}</h3>
              <div class="card__meta">
                <span style="color:var(--muted); font-size:14px;">${p.category}</span>
                <strong style="color:var(--accent)">R$ ${p.price.toFixed(2).replace('.',',')}</strong>
              </div>
              <button class="buyBtn" onclick="sendWhatapp('${p.title}', ${p.price})">Pedir via WhatsApp</button>
            </div>
          `;
          grid.appendChild(card);
        });
        section.appendChild(grid);
        container.appendChild(section);
      }
    }

    /* AÇÕES ADMIN */
    document.getElementById("saveProductBtn").onclick = async () => {
      const title = document.getElementById("productTitle").value;
      const category = document.getElementById("productCategory").value;
      const price = document.getElementById("productPrice").value;
      const fileInput = document.getElementById("productImage");
      const btn = document.getElementById("saveProductBtn");

      if(!title || !price || !fileInput.files[0]) return alert("Por favor, preencha todos os campos e selecione uma imagem.");

      btn.disabled = true;
      btn.textContent = "Processando...";

      try {
        const file = fileInput.files[0];
        const fileName = `${Date.now()}-${file.name}`;
        const filePath = `produtos/${fileName}`;

        // 1. Upload
        const { error: uploadError } = await _supabase.storage
          .from('imagens-produtos')
          .upload(filePath, file);

        if (uploadError) throw uploadError;

        // 2. URL
        const { data: { publicUrl } } = _supabase.storage
          .from('imagens-produtos')
          .getPublicUrl(filePath);

        // 3. Banco
        const { error: insertError } = await _supabase
          .from('produtos')
          .insert([{ title, category, price: parseFloat(price), image_url: publicUrl }]);

        if (insertError) throw insertError;

        alert("Produto cadastrado com sucesso!");
        location.reload();
      } catch (err) {
        alert("Erro técnico: " + err.message);
      } finally {
        btn.disabled = false;
        btn.textContent = "Salvar Produto";
      }
    };

    async function deleteProd(id, imageUrl) {
      if(!confirm("Tem certeza que deseja excluir este produto?")) return;
      
      const { error } = await _supabase.from('produtos').delete().eq('id', id);
      if(!error) {
        alert("Removido!");
        location.reload();
      } else {
        alert("Erro ao excluir: " + error.message);
      }
    }

    /* AUTH LOGIC */
    document.getElementById("loginBtn").onclick = async () => {
      const email = document.getElementById("adminEmail").value;
      const password = document.getElementById("adminPassword").value;

      const { data, error } = await _supabase.auth.signInWithPassword({ email, password });

      if (error) {
        alert("Acesso Negado: " + error.message);
      } else {
        document.getElementById("loginModal").classList.remove("active");
        checkUser();
        openAdminPanel();
      }
    };

    document.getElementById("logoutBtn").onclick = async () => {
      await _supabase.auth.signOut();
      location.reload();
    };

    async function checkUser() {
      const { data: { user } } = await _supabase.auth.getUser();
      if(user) {
        document.getElementById("logoutBtn").style.display = "block";
        document.getElementById("openAdminBtn").textContent = "Painel Aberto";
      }
    }

    function openAdminPanel() {
      document.getElementById("adminModal").classList.add("active");
      const list = document.getElementById("adminList");
      list.innerHTML = products.map(p => `
        <div class="adminItem">
          <img src="${p.image_url}">
          <div class="adminItem__info">
            <strong>${p.title}</strong><br>R$ ${p.price.toFixed(2)}
          </div>
          <button class="dangerBtn" onclick="deleteProd('${p.id}')">Excluir</button>
        </div>
      `).join('');
    }

    /* AUXILIARES */
    function sendWhatapp(nome, preco) {
      const msg = encodeURIComponent(`Olá! Tenho interesse no produto: ${nome} (R$ ${preco.toFixed(2)})`);
      window.open(`https://wa.me/${WHATSAPP_NUMBER}?text=${msg}`);
    }

    function showImg(url) {
      document.getElementById("previewImage").src = url;
      document.getElementById("imagePreviewModal").classList.add("active");
    }

    document.getElementById("openAdminBtn").onclick = async () => {
      const { data: { user } } = await _supabase.auth.getUser();
      if(user) openAdminPanel();
      else document.getElementById("loginModal").classList.add("active");
    };

    document.getElementById("closeLoginBtn").onclick = () => document.getElementById("loginModal").classList.remove("active");
    document.getElementById("closeAdminBtn").onclick = () => document.getElementById("adminModal").classList.remove("active");
    document.getElementById("searchInput").oninput = (e) => { searchQuery = e.target.value; renderGrid(); };

    init();
  </script>
</body>
</html>
