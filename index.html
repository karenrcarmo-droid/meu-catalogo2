<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kn2 Personalizados</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root { 
      --bg: #0b0f17; --card: #111827; --text: #e5e7eb; 
      --accent: #ff4d94; --border: rgba(255, 255, 255, .1); --danger: #ef4444; 
    }
    body { background: var(--bg); color: var(--text); font-family: system-ui, sans-serif; margin: 0; padding-bottom: 100px; }
    .container { width: 92%; margin: auto; max-width: 1100px; }
    
    .brand-title {
      margin: 0; font-size: 24px; font-weight: 900;
      background: linear-gradient(90deg, #ff4d94, #ffb3d1, #ff4d94);
      background-size: 200% auto; -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      animation: shine 3s linear infinite;
    }
    @keyframes shine { to { background-position: 200% center; } }

    .topbar { position: sticky; top: 0; z-index: 999; background: rgba(11, 15, 23, 0.95); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); padding: 12px 0; }
    .topbar__inner { display: flex; justify-content: space-between; align-items: center; }
    
    .btn { border: none; padding: 10px 16px; border-radius: 10px; cursor: pointer; font-weight: 600; font-size: 13px; transition: 0.2s; }
    .btn-primary { background: var(--accent); color: white; }
    .btn-outline { background: transparent; border: 1px solid var(--border); color: white; }
    
    .productsGrid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; margin-top: 25px; }
    .card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; padding: 12px; display: flex; flex-direction: column; }
    .card img { width: 100%; height: 180px; object-fit: cover; border-radius: 10px; background: #000; }

    .cart-pill { position: fixed; bottom: 20px; right: 20px; background: var(--accent); color: white; padding: 15px 22px; border-radius: 50px; cursor: pointer; display: none; z-index: 1000; box-shadow: 0 8px 20px rgba(255, 77, 148, 0.3); font-weight: 800; border: none; }

    .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: none; align-items: center; justify-content: center; z-index: 10001; backdrop-filter: blur(6px); }
    .modal.active { display: flex; }
    .modal-content { background: var(--card); padding: 25px; border-radius: 20px; width: 90%; max-width: 450px; border: 1px solid var(--border); max-height: 90vh; overflow-y: auto; }

    input, select { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #333; background: #05070a; color: white; box-sizing: border-box; }
    
    .admin-item { display: flex; align-items: center; gap: 10px; padding: 10px; border-bottom: 1px solid var(--border); }
    .admin-item img { width: 40px; height: 40px; object-fit: cover; border-radius: 5px; }
  </style>
</head>
<body>

<header class="topbar">
  <div class="container topbar__inner">
    <h1 class="brand-title">Kn2 Personalizados</h1>
    <div id="authControls">
      <button class="btn" id="adminBtn" style="display:none; color: var(--accent); border: 1px solid var(--accent); margin-right: 5px;" onclick="openAdminPanel()">GERENCIAR</button>
      <button class="btn btn-primary" id="loginBtn" onclick="toggleModal('loginModal')">LOGIN</button>
      <button class="btn" id="logoutBtn" style="display:none; color: #666;" onclick="handleLogout()">SAIR</button>
    </div>
  </div>
</header>

<main class="container">
  <div id="catalogContainer" class="productsGrid">
    <p id="statusMsg" style="text-align: center; grid-column: 1/-1;">Conectando ao banco de dados...</p>
  </div>
</main>

<button class="cart-pill" id="cartPill" onclick="toggleModal('cartModal')">
  🛒 VER PEDIDO (<span id="cartCount">0</span>)
</button>

<div class="modal" id="loginModal">
  <div class="modal-content">
    <h3 style="margin:0 0 15px 0">Login Gerente</h3>
    <input type="email" id="email" placeholder="E-mail">
    <input type="password" id="password" placeholder="Senha">
    <button onclick="handleLogin()" class="btn btn-primary" style="width:100%">ENTRAR</button>
    <button onclick="toggleModal('loginModal')" style="width:100%; background:none; color:gray; border:none; margin-top:10px; cursor:pointer;">FECHAR</button>
  </div>
</div>

<div class="modal" id="adminModal">
  <div class="modal-content">
    <h3 style="margin:0 0 15px 0; color:var(--accent)">Painel de Controle</h3>
    
    <div style="border-bottom: 1px solid #333; margin-bottom: 15px; padding-bottom: 15px;">
      <label style="font-size: 12px; color: gray;">Novo Produto:</label>
      <input type="text" id="newTitle" placeholder="Nome do Produto">
      <input type="number" id="newPrice" placeholder="Preço (Ex: 50.00)">
      <input type="file" id="newImage" accept="image/*">
      <button onclick="handleUpload()" id="uploadBtn" class="btn btn-primary" style="width:100%">SALVAR PRODUTO</button>
    </div>

    <div id="adminProductList" style="max-height: 200px; overflow-y: auto;">
      </div>

    <button onclick="toggleModal('adminModal')" class="btn btn-outline" style="width:100%; margin-top:15px;">FECHAR</button>
  </div>
</div>

<div class="modal" id="cartModal">
  <div class="modal-content">
    <h2 style="margin:0 0 15px 0; color:var(--accent)">Carrinho</h2>
    <div id="cartList" style="max-height: 250px; overflow-y: auto;"></div>
    <div style="border-top:2px solid #222; margin-top:15px; padding-top:15px;">
      <div style="display:flex; justify-content:space-between; font-size:18px; font-weight:800; margin-bottom:15px;">
        <span>Total:</span>
        <span id="cartTotal">R$ 0,00</span>
      </div>
      <button onclick="sendWhatsApp()" class="btn btn-primary" style="width:100%; padding:15px;">FINALIZAR NO WHATSAPP</button>
    </div>
  </div>
</div>

<script>
  const SB_URL = "https://kdoxzjdvpbdwpzyaqary.supabase.co";
  const SB_KEY = "sb_publishable_4WrcBi_Cy8yRg8v0D3_BQw_1XuBID4V"; 
  
  let _supabase;
  let products = [];
  let cart = [];

  async function init() {
    try {
      _supabase = supabase.createClient(SB_URL, SB_KEY);
      await checkUser();
      await loadProducts();
    } catch (err) {
      document.getElementById('statusMsg').innerText = "Erro ao conectar.";
    }
  }

  async function checkUser() {
    const { data: { session } } = await _supabase.auth.getSession();
    if (session) {
      document.getElementById('adminBtn').style.display = 'inline-block';
      document.getElementById('logoutBtn').style.display = 'inline-block';
      document.getElementById('loginBtn').style.display = 'none';
    }
  }

  async function loadProducts() {
    const { data, error } = await _supabase.from('produtos').select('*').order('created_at', { ascending: false });
    if (!error) {
      products = data || [];
      document.getElementById('statusMsg').style.display = 'none';
      renderGrid();
    }
  }

  function renderGrid() {
    const container = document.getElementById('catalogContainer');
    if (products.length === 0) {
        container.innerHTML = "<p style='grid-column: 1/-1; text-align:center;'>Nenhum produto encontrado.</p>";
        return;
    }
    container.innerHTML = products.map(p => `
      <div class="card">
        <img src="${p.image_url}" onerror="this.src='https://via.placeholder.com/300?text=Sem+Imagem'">
        <h3 style="margin:10px 0 5px; font-size:15px;">${p.title}</h3>
        <p style="color:var(--accent); font-weight:800; margin-bottom:10px;">R$ ${Number(p.price).toFixed(2)}</p>
        <div style="display:flex; gap:5px; margin-top:auto;">
          <input type="number" id="qty-${p.id}" value="1" min="1" style="width:45px; background:#000; color:#fff; border:1px solid #333; border-radius:5px; text-align:center;">
          <button onclick="addToCart('${p.id}')" class="btn btn-primary" style="flex:1">ADICIONAR</button>
        </div>
      </div>
    `).join('');
  }

  // FUNÇÕES DE ADMINISTRAÇÃO
  function openAdminPanel() {
    toggleModal('adminModal');
    const list = document.getElementById('adminProductList');
    list.innerHTML = products.map(p => `
      <div class="admin-item">
        <img src="${p.image_url}">
        <span style="flex:1; font-size:12px;">${p.title}</span>
        <button onclick="handleDelete('${p.id}')" style="background:none; border:none; color:var(--danger); cursor:pointer; font-weight:bold;">EXCLUIR</button>
      </div>
    `).join('');
  }

  async function handleUpload() {
    const title = document.getElementById('newTitle').value;
    const price = document.getElementById('newPrice').value;
    const file = document.getElementById('newImage').files[0];
    const btn = document.getElementById('uploadBtn');

    if (!title || !price || !file) return alert("Preencha todos os campos!");

    btn.disabled = true;
    btn.innerText = "CARREGANDO...";

    try {
      const fileName = `${Date.now()}_${file.name}`;
      const { data: upData, error: upErr } = await _supabase.storage.from('imagens').upload(fileName, file);
      if (upErr) throw upErr;

      const { data: { publicUrl } } = _supabase.storage.from('imagens').getPublicUrl(fileName);

      const { error: insErr } = await _supabase.from('produtos').insert([{ 
        title, price: parseFloat(price), image_url: publicUrl 
      }]);
      if (insErr) throw insErr;

      alert("Sucesso!");
      location.reload();
    } catch (err) {
      alert("Erro no upload: " + err.message);
      btn.disabled = false;
      btn.innerText = "SALVAR PRODUTO";
    }
  }

  async function handleDelete(id) {
    if (!confirm("Deseja excluir este produto?")) return;
    const { error } = await _supabase.from('produtos').delete().eq('id', id);
    if (error) alert("Erro ao excluir");
    else location.reload();
  }

  // CARRINHO E LOGIN
  function addToCart(id) {
    const product = products.find(p => p.id == id);
    const qty = parseInt(document.getElementById(`qty-${id}`).value) || 1;
    const existing = cart.find(item => item.id == id);
    if(existing) existing.qty += qty;
    else cart.push({...product, qty});
    updateCartUI();
  }

  function updateCartUI() {
    const count = cart.reduce((acc, i) => acc + i.qty, 0);
    document.getElementById('cartCount').innerText = count;
    document.getElementById('cartPill').style.display = count > 0 ? 'block' : 'none';
    let total = 0;
    document.getElementById('cartList').innerHTML = cart.map(item => {
      total += (item.price * item.qty);
      return `<div style="display:flex; justify-content:space-between; padding:8px 0; border-bottom:1px solid #222; font-size:14px;">
                <span>${item.qty}x ${item.title}</span>
                <strong>R$ ${(item.price * item.qty).toFixed(2)}</strong>
              </div>`;
    }).join('');
    document.getElementById('cartTotal').innerText = `R$ ${total.toFixed(2)}`;
  }

  async function handleLogin() {
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    const { error } = await _supabase.auth.signInWithPassword({ email, password });
    if (error) alert("Erro: " + error.message);
    else location.reload();
  }

  async function handleLogout() {
    await _supabase.auth.signOut();
    location.reload();
  }

  function toggleModal(id) {
    document.getElementById(id).classList.toggle('active');
  }

  function sendWhatsApp() {
    let msg = "*PEDIDO KN2*\n\n";
    cart.forEach(i => msg += `• ${i.qty}x ${i.title} (R$ ${(i.price * i.qty).toFixed(2)})\n`);
    msg += `\n*Total: ${document.getElementById('cartTotal').innerText}*`;
    window.open(`https://wa.me/5531999683959?text=${encodeURIComponent(msg)}`);
  }

  window.onload = init;
</script>
</body>
</html>
